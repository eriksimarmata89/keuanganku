<script>
/* PATCH UNDUH LOKAL v2: PDF dan Excel dibuat langsung di perangkat,
   dengan isi lengkap seperti laporan versi server:
   bagian Transaksi, Hutang & Piutang, dan Perpindahan Saldo.
   Menggantikan patch unduh lokal v1. */
(function(){

  /* ===== pemuat pustaka (biasanya sudah termuat dari tag script di atas) ===== */
  var _sudah={};
  function muatSkrip(src){
    return new Promise(function(res,rej){
      if(_sudah[src]){ res(); return; }
      var s=document.createElement('script');
      s.src=src;
      s.onload=function(){ _sudah[src]=1; res(); };
      s.onerror=function(){ rej(new Error('gagal memuat '+src)); };
      document.head.appendChild(s);
    });
  }
  var CDN_JSPDF='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  var CDN_AUTOTABLE='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
  var CDN_XLSX='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  async function pastikanPDF(){
    if(!(window.jspdf && window.jspdf.jsPDF)) await muatSkrip(CDN_JSPDF);
    var punyaAutoTable=false;
    try{ punyaAutoTable=typeof (new window.jspdf.jsPDF()).autoTable==='function'; }catch(e){}
    if(!punyaAutoTable) await muatSkrip(CDN_AUTOTABLE);
  }
  async function pastikanXLSX(){
    if(!window.XLSX) await muatSkrip(CDN_XLSX);
  }

  /* ===== pengunduh blob (browser dan APK) ===== */
  function unduhBlob(blob, nama){
    /* Tambah jam-menit-detik pada nama supaya selalu unik. DownloadBlob
       gagal diam-diam bila file bernama sama sudah ada di folder tujuan,
       sehingga dialog "berhasil" tidak pernah muncul. */
    var w=new Date(), pad=function(x){ return String(x).padStart(2,'0'); };
    nama=nama.replace(/(\.[A-Za-z0-9]+)$/,
      '-'+pad(w.getHours())+pad(w.getMinutes())+pad(w.getSeconds())+'$1');
    if(window.AppInventor && window.AppInventor.setWebViewString){
      try{ window.AppInventor.setWebViewString('SIMPAN|'+nama); }catch(e){}
    }
    var u=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=u; a.download=nama;
    document.body.appendChild(a); a.click();
    setTimeout(function(){
      try{ document.body.removeChild(a); URL.revokeObjectURL(u); }catch(e){}
    }, 60000);
  }

  /* ===== data laporan (sama seperti versi server) ===== */
  function namaAkunDari(id){
    var a=cariAkun(id); return (a && a.nama) ? a.nama : '-';
  }
  function dataTransaksi(){
    return TX.filter(function(t){ return inRange(t.tanggal,expRange,expAwal,expAkhir); })
      .slice().sort(function(a,b){ return a.tanggal<b.tanggal?-1:1; });
  }
  function dataUtang(){
    var label={lunas:'Lunas', sebagian:'Terbayar sebagian', belum:'Belum dibayar'};
    return UT.slice().sort(function(a,b){ return a.tanggal<b.tanggal?-1:1; })
      .map(function(u){
        return {
          jenis: u.jenis==='piutang'?'Piutang':'Hutang',
          pihak: u.pihak||'',
          pokok: +u.pokok||0,
          tanggal: u.tanggal||'',
          jatuhTempo: u.jatuhTempo||'',
          terbayar: utTerbayar(u),
          sisa: utSisa(u),
          status: label[utStatus(u)]||'',
          catatan: u.catatan||''
        };
      });
  }
  function dataTransfer(){
    return TR.filter(function(t){ return inRange(t.tanggal,expRange,expAwal,expAkhir); })
      .slice().sort(function(a,b){ return a.tanggal<b.tanggal?-1:1; });
  }
  function namaRentang(){
    return (labelRentang()||'periode').replace(/[^0-9A-Za-z]+/g,'-').replace(/^-+|-+$/g,'');
  }
  function angka(n){ return (Number(n)||0).toLocaleString('id-ID'); }

  /* ===== PDF (menggantikan unduhHTML) ===== */
  window.unduhHTML=async function(){
    var rows=dataTransaksi(), ut=dataUtang(), tr=dataTransfer();
    if(!rows.length && !ut.length && !tr.length){ toast('Tidak ada data pada rentang ini'); return; }
    toast('Menyiapkan PDF...');
    try{ await pastikanPDF(); }
    catch(e){ toast('Perlu internet sekali untuk memuat pembuat PDF'); return; }

    var masuk=rows.filter(function(t){return t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var keluar=rows.filter(function(t){return t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var piutangSisa=ut.filter(function(u){return u.jenis==='Piutang';}).reduce(function(s,u){return s+u.sisa;},0);
    var hutangSisa=ut.filter(function(u){return u.jenis==='Hutang';}).reduce(function(s,u){return s+u.sisa;},0);
    var totalTransfer=tr.reduce(function(s,r){return s+(+r.nominal||0);},0);

    var doc=new window.jspdf.jsPDF('p','mm','a4');
    var BIRU=[24,95,165];

    function judulBagian(teks){
      var y=doc.lastAutoTable ? doc.lastAutoTable.finalY+12 : 41;
      if(y>262){ doc.addPage(); y=16; }
      doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.setTextColor(BIRU[0],BIRU[1],BIRU[2]);
      doc.text(teks, 14, y);
      doc.setTextColor(0); doc.setFont('helvetica','normal');
      return y+3;
    }
    function badanKosong(n){
      return [[{content:'Tidak ada data', colSpan:n, styles:{halign:'center', textColor:130}}]];
    }

    /* Kop */
    doc.setFont('helvetica','bold'); doc.setFontSize(15);
    doc.text('Laporan Keuangan - KeuanganKu', 14, 16);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(110);
    doc.text('Pemilik: '+(((USER&&USER.name)||'-')+'  ('+((USER&&USER.phone)||'')+')'), 14, 22);
    doc.text('Rentang: '+labelRentang(), 14, 27);
    doc.text('Dicetak: '+new Date().toLocaleString('id-ID'), 14, 32);
    doc.setTextColor(0);

    /* Bagian 1: Transaksi */
    var y1=judulBagian('Transaksi');
    doc.autoTable({
      startY:y1,
      head:[['Tanggal','Jenis','Penampung','Kategori','Keterangan','Catatan','Nominal']],
      body: rows.length ? rows.map(function(t){
        var n=(+t.nominal)||0;
        return [t.tanggal,
                t.tipe==='pemasukan'?'Pemasukan':'Pengeluaran',
                namaAkunDari(t.akunId),
                t.kategori||'',
                t.keterangan||'',
                t.catatan||'',
                (t.tipe==='pemasukan'?'':'-')+angka(n)];
      }) : badanKosong(7),
      foot:[
        ['','','','','','Total pemasukan', angka(masuk)],
        ['','','','','','Total pengeluaran', angka(keluar)],
        ['','','','','','Selisih', angka(masuk-keluar)]
      ],
      styles:{ fontSize:7, cellPadding:1.4 },
      headStyles:{ fillColor:BIRU, fontSize:7 },
      footStyles:{ fillColor:[238,241,245], textColor:30, fontStyle:'bold', fontSize:7, halign:'right' },
      columnStyles:{ 6:{ halign:'right' } }
    });

    /* Bagian 2: Hutang & Piutang (seluruh catatan, seperti versi server) */
    var y2=judulBagian('Hutang & Piutang (per '+new Date().toLocaleDateString('id-ID')+')');
    doc.autoTable({
      startY:y2,
      head:[['Jenis','Pihak','Pokok','Tanggal','Jatuh Tempo','Dibayar','Sisa','Status','Catatan']],
      body: ut.length ? ut.map(function(u){
        return [u.jenis, u.pihak, angka(u.pokok), u.tanggal, u.jatuhTempo||'-',
                angka(u.terbayar), angka(u.sisa), u.status, u.catatan];
      }) : badanKosong(9),
      foot:[
        ['','','','','','','', 'Total piutang berjalan', angka(piutangSisa)],
        ['','','','','','','', 'Total hutang berjalan', angka(hutangSisa)]
      ],
      styles:{ fontSize:6.5, cellPadding:1.3 },
      headStyles:{ fillColor:BIRU, fontSize:6.5 },
      footStyles:{ fillColor:[238,241,245], textColor:30, fontStyle:'bold', fontSize:6.5, halign:'right' },
      columnStyles:{ 2:{halign:'right'}, 5:{halign:'right'}, 6:{halign:'right'} }
    });

    /* Bagian 3: Perpindahan Saldo */
    var y3=judulBagian('Perpindahan Saldo');
    doc.autoTable({
      startY:y3,
      head:[['Tanggal','Dari Penampung','Ke Penampung','Nominal','Catatan']],
      body: tr.length ? tr.map(function(r){
        return [r.tanggal, namaAkunDari(r.dariAkunId), namaAkunDari(r.keAkunId), angka(r.nominal), r.catatan||''];
      }) : badanKosong(5),
      foot:[['','','Total perpindahan', angka(totalTransfer), '']],
      styles:{ fontSize:7, cellPadding:1.4 },
      headStyles:{ fillColor:BIRU, fontSize:7 },
      footStyles:{ fillColor:[238,241,245], textColor:30, fontStyle:'bold', fontSize:7 },
      columnStyles:{ 3:{ halign:'right' } }
    });

    var yA=(doc.lastAutoTable?doc.lastAutoTable.finalY:41)+8;
    if(yA>285){ doc.addPage(); yA=16; }
    doc.setFontSize(8); doc.setTextColor(130);
    doc.text('Dibuat otomatis oleh KeuanganKu', 14, yA);

    unduhBlob(doc.output('blob'), 'Laporan-KeuanganKu-'+namaRentang()+'.pdf');
  };

  /* ===== Excel .xlsx 3 sheet (menggantikan unduhCSV) ===== */
  window.unduhCSV=async function(){
    var rows=dataTransaksi(), ut=dataUtang(), tr=dataTransfer();
    if(!rows.length && !ut.length && !tr.length){ toast('Tidak ada data pada rentang ini'); return; }
    toast('Menyiapkan Excel...');
    try{ await pastikanXLSX(); }
    catch(e){ toast('Perlu internet sekali untuk memuat pembuat Excel'); return; }

    var masuk=rows.filter(function(t){return t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var keluar=rows.filter(function(t){return t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var piutangSisa=ut.filter(function(u){return u.jenis==='Piutang';}).reduce(function(s,u){return s+u.sisa;},0);
    var hutangSisa=ut.filter(function(u){return u.jenis==='Hutang';}).reduce(function(s,u){return s+u.sisa;},0);
    var totalTransfer=tr.reduce(function(s,r){return s+(+r.nominal||0);},0);
    var pemilik=(USER&&USER.name)||'-';
    var cetak=new Date().toLocaleString('id-ID');

    var wb=XLSX.utils.book_new();

    /* Sheet 1: Transaksi */
    var d1=[
      ['Laporan Keuangan - KeuanganKu'],
      ['Pemilik: '+pemilik],
      ['Rentang: '+labelRentang()],
      ['Dicetak: '+cetak],
      [],
      ['Tanggal','Jenis','Penampung','Kategori','Keterangan','Catatan','Nominal']
    ];
    rows.forEach(function(t){
      var n=(+t.nominal)||0;
      d1.push([t.tanggal,
               t.tipe==='pemasukan'?'Pemasukan':'Pengeluaran',
               namaAkunDari(t.akunId),
               t.kategori||'',
               t.keterangan||'',
               t.catatan||'',
               t.tipe==='pemasukan'? n : -n]);
    });
    d1.push([]);
    d1.push(['','','','','','Total pemasukan', masuk]);
    d1.push(['','','','','','Total pengeluaran', keluar]);
    d1.push(['','','','','','Selisih', masuk-keluar]);
    var ws1=XLSX.utils.aoa_to_sheet(d1);
    ws1['!cols']=[{wch:11},{wch:12},{wch:16},{wch:14},{wch:28},{wch:22},{wch:13}];
    XLSX.utils.book_append_sheet(wb, ws1, 'Transaksi');

    /* Sheet 2: Hutang & Piutang */
    var d2=[
      ['Hutang & Piutang - KeuanganKu'],
      ['Pemilik: '+pemilik],
      ['Per tanggal: '+new Date().toLocaleDateString('id-ID')],
      [],
      ['Jenis','Pihak','Pokok','Tanggal','Jatuh Tempo','Sudah Dibayar','Sisa','Status','Catatan']
    ];
    ut.forEach(function(u){
      d2.push([u.jenis, u.pihak, u.pokok, u.tanggal, u.jatuhTempo, u.terbayar, u.sisa, u.status, u.catatan]);
    });
    d2.push([]);
    d2.push(['','','','','','Total piutang berjalan', piutangSisa]);
    d2.push(['','','','','','Total hutang berjalan', hutangSisa]);
    var ws2=XLSX.utils.aoa_to_sheet(d2);
    ws2['!cols']=[{wch:9},{wch:18},{wch:12},{wch:11},{wch:11},{wch:13},{wch:12},{wch:16},{wch:24}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Hutang & Piutang');

    /* Sheet 3: Perpindahan Saldo */
    var d3=[
      ['Perpindahan Saldo - KeuanganKu'],
      ['Pemilik: '+pemilik],
      ['Rentang: '+labelRentang()],
      [],
      ['Tanggal','Dari Penampung','Ke Penampung','Nominal','Catatan']
    ];
    tr.forEach(function(r){
      d3.push([r.tanggal, namaAkunDari(r.dariAkunId), namaAkunDari(r.keAkunId), +r.nominal||0, r.catatan||'']);
    });
    d3.push([]);
    d3.push(['','','Total perpindahan', totalTransfer, '']);
    var ws3=XLSX.utils.aoa_to_sheet(d3);
    ws3['!cols']=[{wch:11},{wch:18},{wch:18},{wch:13},{wch:24}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Perpindahan Saldo');

    var out=XLSX.write(wb, { bookType:'xlsx', type:'array' });
    var blob=new Blob([out], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    unduhBlob(blob, 'Laporan-KeuanganKu-'+namaRentang()+'.xlsx');
  };

})();
</script>
  

<script>
/* PATCH: tarik-untuk-menyegarkan (pull to refresh) v6.
   Cara pakai: dari posisi paling atas halaman, TAHAN jari di layar sampai
   terasa getar dan indikator mengintip, lalu tarik ke bawah dan lepaskan.
   Lama menahan diatur konstanta TAHAN di bawah (milidetik).
   Menyertakan pengaman CSS agar scroll satu jari selalu normal. */
(function(){
  var wadah=document.getElementById('scroll');
  if(!wadah) return;

  var ind=document.createElement('div');
  ind.id='ptrInd';
  ind.style.cssText='position:fixed;left:50%;z-index:70;'+
    'width:38px;height:38px;border-radius:50%;background:var(--card);'+
    'box-shadow:0 2px 10px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;'+
    'transform:translate(-50%,-60px);opacity:0;pointer-events:none';
  ind.innerHTML='<svg id="ptrIkon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--biru)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>';
  document.body.appendChild(ind);

  var st=document.createElement('style');
  st.textContent='@keyframes ptrPutar{to{transform:rotate(360deg)}} #ptrInd.putar #ptrIkon{animation:ptrPutar .8s linear infinite}'+
    ' .scroll{overscroll-behavior:auto !important; touch-action:pan-y pinch-zoom;}'+
    ' html,body{overscroll-behavior-y:auto !important;}';
  document.head.appendChild(st);

  var TAHAN=600;   /* lama menahan sebelum mode refresh siap (md); ubah sesuai selera */
  var GOYANG=12, AMBANG=70, MAKS=110;
  var y0=0, tarik=0, sibuk=false, siap=false, batal=false, pegang=false, timerTahan=null;

  function posAtas(){
    var b=document.scrollingElement || document.documentElement;
    return wadah.scrollTop<=0 && (!b || b.scrollTop<=0);
  }
  function aturPosisiDasar(){
    var pakaiAppbar=wadah.classList.contains('has-appbar');
    ind.style.top='calc(env(safe-area-inset-top,0px) + '+(pakaiAppbar?'72px':'12px')+')';
  }
  function gambar(t){
    ind.style.transition='none';
    ind.style.transform='translate(-50%,'+(t-60)+'px)';
    ind.style.opacity=Math.min(1, 0.35 + t/50);
    var ik=document.getElementById('ptrIkon');
    if(ik) ik.style.transform='rotate('+(t*2.6)+'deg)';
  }
  function intip(){
    ind.style.transition='transform .18s ease, opacity .18s ease';
    ind.style.transform='translate(-50%,-38px)';
    ind.style.opacity='.55';
  }
  function pulang(){
    ind.style.transition='transform .25s ease, opacity .25s ease';
    ind.style.transform='translate(-50%,-60px)';
    ind.style.opacity='0';
    ind.classList.remove('putar');
  }
  function bersihkanTimer(){
    if(timerTahan){ clearTimeout(timerTahan); timerTahan=null; }
  }
  function lepaskan(){
    siap=false; batal=true; pegang=false; tarik=0;
    bersihkanTimer(); pulang();
  }

  wadah.addEventListener('touchstart', function(e){
    bersihkanTimer();
    siap=false; batal=false; pegang=false; tarik=0;
    if(sibuk || e.touches.length>1 || !posAtas()){ batal=true; return; }
    y0=e.touches[0].clientY;
    timerTahan=setTimeout(function(){
      timerTahan=null;
      if(batal || sibuk || !posAtas()) return;
      siap=true;
      aturPosisiDasar();
      intip();
      try{ if(navigator.vibrate) navigator.vibrate(15); }catch(err){}
    }, TAHAN);
  }, {passive:true});

  wadah.addEventListener('touchmove', function(e){
    if(batal || sibuk) return;
    if(e.touches.length>1){ lepaskan(); return; }
    var dy=e.touches[0].clientY - y0;

    if(!siap){
      /* bergerak sebelum waktu tahan selesai: murni scroll biasa */
      if(Math.abs(dy)>GOYANG){ batal=true; bersihkanTimer(); }
      return;
    }
    if(!pegang){
      if(dy < -4){ lepaskan(); return; }   /* ternyata mau scroll: serahkan */
      if(dy < 4) return;
      pegang=true;
    }
    tarik=Math.max(0, Math.min(dy*0.5, MAKS));
    gambar(tarik);
    e.preventDefault();
  }, {passive:false});

  function selesaiSentuh(){
    bersihkanTimer();
    if(siap && pegang && !sibuk && tarik>=AMBANG){
      sibuk=true;
      ind.style.transition='transform .2s ease';
      ind.style.transform='translate(-50%,'+(AMBANG-60)+'px)';
      ind.style.opacity='1';
      ind.classList.add('putar');
      setTimeout(function(){
        try{ render(); }catch(err){}
        setTimeout(function(){ pulang(); sibuk=false; }, 350);
      }, 450);
    } else if(siap){
      pulang();
    }
    siap=false; batal=false; pegang=false; tarik=0;
  }
  wadah.addEventListener('touchend', selesaiSentuh, {passive:true});
  wadah.addEventListener('touchcancel', selesaiSentuh, {passive:true});
})();
</script>

<script>
/* PATCH: nonaktifkan pilih teks (select) & copy saat tekan lama di layar.
   Input, textarea, dan select tetap bisa diketik/dipilih seperti biasa
   supaya form (nominal, keterangan, dll) tidak terganggu.
   Tempel sebelum </body>, setelah patch-patch lainnya. */
(function(){
  var st=document.createElement('style');
  st.textContent =
    '*{ -webkit-user-select:none; -moz-user-select:none; user-select:none; '+
    '  -webkit-touch-callout:none; }'+
    'input, textarea, select, [contenteditable="true"]{ '+
    '  -webkit-user-select:text; -moz-user-select:text; user-select:text; '+
    '  -webkit-touch-callout:default; }';
  document.head.appendChild(st);

  /* Cegah menu klik-kanan / tekan lama pada elemen non-input */
  document.addEventListener('contextmenu', function(e){
    var t=e.target;
    if(!(t && /^(INPUT|TEXTAREA)$/.test(t.tagName))) e.preventDefault();
  });

  /* Cegah proses "mulai memilih teks" di luar input/textarea */
  document.addEventListener('selectstart', function(e){
    var t=e.target;
    if(!(t && /^(INPUT|TEXTAREA)$/.test(t.tagName))) e.preventDefault();
  });

  /* Opsional: blokir tombol pintasan salin/potong di keyboard eksternal */
  document.addEventListener('copy', function(e){
    var t=document.activeElement;
    if(!(t && /^(INPUT|TEXTAREA)$/.test(t.tagName))) e.preventDefault();
  });
})();
</script>

<script>
/* PATCH LAPORAN LENGKAP v3. Tempel sebelum </body>, menggantikan
   seluruh "PATCH LAPORAN LENGKAP v2".

   Perubahan dari v2:
   1. Perbandingan periode kini adil (period-to-date): bulan berjalan
      dibandingkan dengan bulan lalu SAMPAI TANGGAL YANG SAMA, dan
      12 bulan terakhir dibandingkan dengan 12 bulan sebelumnya.
   2. Periode "Tahunan" diseragamkan menjadi jendela bergulir 12 bulan
      untuk kartu, panel rata-rata, dan grafik (12 titik).
   3. Panel Insight diberi keterangan "analisis bulan berjalan".
   4. Proyeksi disembunyikan bila periode baru berjalan sebentar.
   5. Grafik per jam hanya memplot transaksi yang jamnya valid hari ini,
      sisanya diberi catatan, tidak menumpuk di 00:00.
   6. Mengganti periode laporan otomatis menyetel rentang unduh.
   7. Agregasi satu-pass per render (ringan untuk ribuan transaksi).
   Bonus: border donut ikut tema, halaman kosong bila belum ada data. */
(function(){

  /* ====== STATE ====== */
  window.repPeriode = window.repPeriode || 'bulanan';
  window.repKatMode = window.repKatMode || 'keluar';
  window.setRepKat  = function(m){ window.repKatMode = m; render(); };
  window._chartTren = null;

  /* (6) ganti periode laporan sekaligus menyetel rentang unduh */
  function setRepPeriode(p){
    repPeriode=p;
    expRange = p==='harian' ? 'hari' : p==='mingguan' ? 'minggu' : 'bulan';
    render();
  }
  window.setRepPeriode = setRepPeriode;

  function repPeriodeSeg(){
    var opsi=[['harian','Harian'],['mingguan','Mingguan'],['bulanan','Bulanan'],['tahunan','Tahunan']];
    return '<div class="seg" style="font-size:12px">'+opsi.map(function(p){
      return '<button style="font-size:12px" data-rp="'+p[0]+'" class="'+(repPeriode===p[0]?'on':'')+'">'+p[1]+'</button>';
    }).join('')+'</div>';
  }
  function wireRepPeriode(){
    document.querySelectorAll('.seg [data-rp]').forEach(function(b){
      b.onclick=function(){ setRepPeriode(b.dataset.rp); };
    });
  }

  /* ====== UTIL TANGGAL ====== */
  function hariIni(){ var n=new Date(); n.setHours(0,0,0,0); return n; }
  function isoDari(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function kunciBulan(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
  /* awal jendela bergulir 12 bulan: tanggal 1 dari 11 bulan lalu */
  function awalRolling12(now){ return new Date(now.getFullYear(), now.getMonth()-11, 1); }

  /* ====== (1)(2) FILTER PERIODE, PERBANDINGAN ADIL ====== */
  function dalamRepPeriode(tgl){
    var t=new Date(tgl+'T00:00:00'), now=hariIni();
    if(repPeriode==='harian') return t.getTime()===now.getTime();
    if(repPeriode==='mingguan'){ var a=new Date(now); a.setDate(now.getDate()-6); return t>=a && t<=now; }
    if(repPeriode==='tahunan'){ return t>=awalRolling12(now) && t<=now; }
    return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
  }
  function dalamRepPeriodeLalu(tgl){
    var t=new Date(tgl+'T00:00:00'), now=hariIni();
    if(repPeriode==='harian'){ var k=new Date(now); k.setDate(now.getDate()-1); return t.getTime()===k.getTime(); }
    if(repPeriode==='mingguan'){
      var a=new Date(now); a.setDate(now.getDate()-13);
      var b=new Date(now); b.setDate(now.getDate()-7);
      return t>=a && t<=b;
    }
    if(repPeriode==='tahunan'){
      /* jendela 12 bulan yang persis sebelumnya, digeser 1 tahun */
      var a2=new Date(awalRolling12(now)); a2.setFullYear(a2.getFullYear()-1);
      var b2=new Date(now); b2.setFullYear(b2.getFullYear()-1);
      return t>=a2 && t<=b2;
    }
    /* bulanan: bulan lalu SAMPAI tanggal yang sama (period-to-date) */
    var m=new Date(now.getFullYear(), now.getMonth()-1, 1);
    if(!(t.getMonth()===m.getMonth() && t.getFullYear()===m.getFullYear())) return false;
    var hariBulanLalu=new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    return t.getDate() <= Math.min(now.getDate(), hariBulanLalu);
  }
  function labelBanding(){
    return repPeriode==='harian' ? 'vs kemarin'
         : repPeriode==='mingguan' ? 'vs 7 hari sebelumnya'
         : repPeriode==='tahunan' ? 'vs 12 bulan sebelumnya'
         : 'vs bulan lalu (s.d. tgl sama)';
  }
  function labelPeriodeAktif(){
    return repPeriode==='harian' ? 'hari ini'
         : repPeriode==='mingguan' ? '7 hari terakhir'
         : repPeriode==='tahunan' ? '12 bulan terakhir'
         : 'bulan ini';
  }

  function deltaHTML(kini, lalu, burukJikaNaik){
    if(!lalu && !kini) return '';
    if(!lalu) return '<div style="font-size:10.5px;color:var(--tx3);margin-top:3px">'+labelBanding()+': belum ada data</div>';
    var d=(kini-lalu)/lalu*100;
    var naik=d>=0;
    var warna=Math.abs(d)<0.5 ? 'var(--tx3)' : (naik===burukJikaNaik ? 'var(--merah-tx)' : 'var(--hijau-tx)');
    var tanda=naik ? '&#9650;' : '&#9660;';
    return '<div style="font-size:10.5px;margin-top:3px;color:'+warna+'">'+tanda+' '+Math.abs(d).toFixed(0)+'% '+labelBanding()+'</div>';
  }

  /* ====== (7) AGREGASI SATU-PASS ====== */
  var AGG=null;
  function bangunAgregasi(){
    var perTanggal={}, perBulan={};
    TX.forEach(function(t){
      var isM=t.tipe==='pemasukan', isK=t.tipe==='pengeluaran';
      if(!isM && !isK) return;
      var n=+t.nominal||0, kb=String(t.tanggal||'').slice(0,7);
      var d=perTanggal[t.tanggal]||(perTanggal[t.tanggal]={m:0,k:0});
      var b=perBulan[kb]||(perBulan[kb]={m:0,k:0});
      if(isM){ d.m+=n; b.m+=n; } else { d.k+=n; b.k+=n; }
    });
    AGG={perTanggal:perTanggal, perBulan:perBulan};
  }
  function agBulan(kb){ return (AGG && AGG.perBulan[kb]) || {m:0,k:0}; }
  function agTgl(iso){ return (AGG && AGG.perTanggal[iso]) || {m:0,k:0}; }

  /* ====== PER PENAMPUNG SALDO, MENGIKUTI PERIODE LAPORAN ====== */
  function akunPeriodeRep(akunId){
    var aid=String(akunId);
    var pM=0, pK=0;
    TX.forEach(function(t){
      if(String(t.akunId)!==aid || !dalamRepPeriode(t.tanggal)) return;
      if(t.tipe==='pemasukan') pM+=(+t.nominal); else if(t.tipe==='pengeluaran') pK+=(+t.nominal);
    });
    var trM=0, trK=0;
    TR.forEach(function(t){
      if(!dalamRepPeriode(t.tanggal)) return;
      if(String(t.keAkunId)===aid) trM+=(+t.nominal);
      if(String(t.dariAkunId)===aid) trK+=(+t.nominal);
    });
    return {masuk:pM+trM, keluar:pK+trK};
  }

  /* ====== RENDER TAB LAPORAN ====== */
  window.renderReport=function(){
    var now=hariIni();
    bangunAgregasi();

    /* Halaman kosong besar bila belum ada data sama sekali */
    if(!TX.length && !UT.length && !TR.length){
      S().innerHTML=appBar()+
        '<div class="empty" style="padding:70px 30px">Belum ada data untuk dianalisis.<br><br>Mulai catat transaksi lewat tombol +, dan laporan lengkap akan tersusun otomatis di halaman ini.</div>';
      return;
    }

    var px=TX.filter(function(t){return dalamRepPeriode(t.tanggal);});
    var masuk=px.filter(function(t){return t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var keluar=px.filter(function(t){return t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);

    var pl=TX.filter(function(t){return dalamRepPeriodeLalu(t.tanggal);});
    var masukLalu=pl.filter(function(t){return t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
    var keluarLalu=pl.filter(function(t){return t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);

    /* ====== (4) PANEL RATA-RATA & PROYEKSI DENGAN PENJAGA ====== */
    function panelProyeksi(judulKiri,nilaiKiri,judulKanan,nilaiKanan,bahaya,pesanBahaya){
      return '<div class="panel" style="margin-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'+
        '<div><div style="font-size:11px;color:var(--tx2)">'+judulKiri+'</div><div style="font-size:15px;font-weight:700;margin-top:2px">'+nilaiKiri+'</div></div>'+
        (judulKanan?('<div style="text-align:right"><div style="font-size:11px;color:var(--tx2)">'+judulKanan+'</div><div style="font-size:15px;font-weight:700;margin-top:2px;color:'+(bahaya?'var(--merah-tx)':'var(--tx)')+'">'+nilaiKanan+'</div></div>'):'')+
        '</div>'+(bahaya&&pesanBahaya?('<div style="font-size:10.5px;color:var(--merah-tx);margin-top:8px">'+pesanBahaya+'</div>'):'')+'</div>';
    }
    var TEKS_BELUM='<span style="font-size:11px;color:var(--tx3);font-weight:400">Tersedia setelah data cukup</span>';
    var panelRata='';
    if(repPeriode==='harian'){
      var jamSkr=now0jam();
      if(jamSkr<6){
        panelRata=panelProyeksi('Pengeluaran hari ini', fmtRp(keluar), 'Proyeksi akhir hari', TEKS_BELUM, false, '');
      } else {
        var proyeksiHari=keluar/(jamSkr+1)*24;
        panelRata=panelProyeksi('Pengeluaran hari ini', fmtRp(keluar), 'Proyeksi akhir hari', fmtRp(proyeksiHari),
          proyeksiHari>masuk&&masuk>0, 'Dengan laju ini, pengeluaran hari ini berpotensi melebihi pemasukan.');
      }
    } else if(repPeriode==='mingguan'){
      panelRata=panelProyeksi('Rata-rata pengeluaran harian (7 hari)', fmtRp(keluar/7), '', '', false, '');
    } else if(repPeriode==='bulanan'){
      var tglSkr=now.getDate();
      if(tglSkr<5){
        panelRata=panelProyeksi('Rata-rata pengeluaran harian', fmtRp(tglSkr?keluar/tglSkr:0), 'Proyeksi akhir bulan', TEKS_BELUM, false, '');
      } else {
        var rata=keluar/tglSkr;
        var hariBulan=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        var proyeksi=rata*hariBulan;
        panelRata=panelProyeksi('Rata-rata pengeluaran harian', fmtRp(rata), 'Proyeksi akhir bulan', fmtRp(proyeksi),
          proyeksi>masuk&&masuk>0, 'Dengan laju ini, pengeluaran bulan ini berpotensi melebihi pemasukan.');
      }
    } else { /* tahunan: jendela bergulir 12 bulan, konsisten dengan kartu & grafik */
      var keluar12=0, masuk12=0;
      for(var moR=11; moR>=0; moR--){
        var dR=new Date(now.getFullYear(), now.getMonth()-moR, 1);
        var ag=agBulan(kunciBulan(dR));
        keluar12+=ag.k; masuk12+=ag.m;
      }
      panelRata=panelProyeksi('Rata-rata pengeluaran bulanan (12 bulan)', fmtRp(keluar12/12), 'Proyeksi 1 tahun ke depan', fmtRp(keluar12),
        keluar12>masuk12&&masuk12>0, 'Dengan laju ini, pengeluaran setahun ke depan berpotensi melebihi pemasukan.');
    }

    /* Kategori sesuai mode */
    var tipeKat = repKatMode==='masuk' ? 'pemasukan' : 'pengeluaran';
    var perKat={};
    px.filter(function(t){return t.tipe===tipeKat;}).forEach(function(t){ perKat[t.kategori]=(perKat[t.kategori]||0)+(+t.nominal); });
    var kats=Object.keys(perKat).map(function(k){return [k,perKat[k]];}).sort(function(a,b){return b[1]-a[1];});
    var totKat=kats.reduce(function(s,kv){return s+kv[1];},0)||1;

    /* Top 5 pengeluaran */
    var top5=px.filter(function(t){return t.tipe==='pengeluaran';})
      .slice().sort(function(a,b){return (+b.nominal)-(+a.nominal);}).slice(0,5);

    /* Hutang & piutang (saldo berjalan) */
    var piutangSisa=UT.filter(function(u){return u.jenis==='piutang';}).reduce(function(s,u){return s+utSisa(u);},0);
    var hutangSisa=UT.filter(function(u){return u.jenis==='hutang';}).reduce(function(s,u){return s+utSisa(u);},0);
    var belumLunas=UT.filter(function(u){return utSisa(u)>0;});
    var jt=belumLunas.filter(function(u){return u.jatuhTempo;})
      .sort(function(a,b){return a.jatuhTempo<b.jatuhTempo?-1:1;})[0];

    var repGab=daftarGabungan(px, TR.filter(function(t){return dalamRepPeriode(t.tanggal);}));
    var nExp=TX.filter(function(t){return inRange(t.tanggal,expRange,expAwal,expAkhir);}).length;

    var judulTren = repPeriode==='harian' ? 'Tren transaksi per jam (hari ini)'
                  : repPeriode==='mingguan' ? 'Tren transaksi 7 hari terakhir'
                  : repPeriode==='tahunan' ? 'Tren transaksi 12 bulan terakhir'
                  : 'Tren transaksi bulan ini (per tanggal)';

    S().innerHTML=
      appBar()+repPeriodeSeg()+

      '<div class="rep-cards">'+
        '<div class="rep-card"><div class="l">Pemasukan ('+labelPeriodeAktif()+')</div><div class="v" style="color:var(--hijau-tx)">'+fmtRp(masuk)+'</div>'+deltaHTML(masuk,masukLalu,false)+'</div>'+
        '<div class="rep-card"><div class="l">Pengeluaran ('+labelPeriodeAktif()+')</div><div class="v" style="color:var(--merah-tx)">'+fmtRp(keluar)+'</div>'+deltaHTML(keluar,keluarLalu,true)+'</div>'+
      '</div>'+

      panelRata+

      '<div class="sec-head" style="padding-top:14px"><div class="t">'+judulTren+'</div></div>'+
      '<div class="panel"><div style="height:200px"><canvas id="trenLine"></canvas></div>'+
        '<div id="trenNote" style="font-size:10.5px;color:var(--tx3);margin-top:8px;display:none"></div></div>'+

      '<div class="sec-head" style="padding-top:14px"><div class="t">'+(tipeKat==='pemasukan'?'Pemasukan':'Pengeluaran')+' per kategori</div></div>'+
      '<div class="chips">'+
        '<button class="chip '+(repKatMode==='keluar'?'on':'')+'" onclick="setRepKat(\'keluar\')">Pengeluaran</button>'+
        '<button class="chip '+(repKatMode==='masuk'?'on':'')+'" onclick="setRepKat(\'masuk\')">Pemasukan</button>'+
      '</div>'+
      (kats.length?'<div class="chartwrap"><canvas id="donut"></canvas></div><div class="catlist">'+
        kats.map(function(kv,i){return '<div class="catrow"><span class="dot" style="background:'+WARNA_KAT[i%WARNA_KAT.length]+'"></span><span class="cn">'+kv[0]+'</span><span class="cv">'+fmtRp(kv[1])+'</span><span class="cp">'+Math.round(kv[1]/totKat*100)+'%</span></div>';}).join('')+'</div>'
        :'<div class="empty">Belum ada '+(tipeKat==='pemasukan'?'pemasukan':'pengeluaran')+' pada periode ini.</div>')+

      (top5.length ? '<div class="sec-head" style="padding-top:14px"><div class="t">Pengeluaran terbesar ('+labelPeriodeAktif()+')</div></div>'+
      '<div class="panel">'+top5.map(function(t,i){
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;'+(i<top5.length-1?'border-bottom:.5px solid var(--line)':'')+'">'+
          '<span style="font-size:11px;color:var(--tx3);width:14px">'+(i+1)+'</span>'+
          '<span style="flex:1;font-size:12.5px">'+esc(t.keterangan||t.kategori)+' <span style="color:var(--tx3);font-size:10.5px">&middot; '+labelTanggalSingkat(t.tanggal)+'</span></span>'+
          '<b style="font-size:12.5px;color:var(--merah-tx)">'+fmtRp(t.nominal)+'</b></div>';
      }).join('')+'</div>' : '')+

      (AK.length ? '<div class="sec-head" style="padding-top:14px"><div class="t">Per penampung saldo ('+labelPeriodeAktif()+')</div></div>'+
      '<div class="panel">'+AK.map(function(a,i){
        var p=akunPeriodeRep(a.id);
        return '<div style="padding:9px 0;'+(i<AK.length-1?'border-bottom:.5px solid var(--line)':'')+'">'+
          '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12.5px;font-weight:600">'+esc(a.nama)+'</span><b style="font-size:12.5px">'+fmtRp(saldoAkunSaatIni(a.id))+'</b></div>'+
          '<div style="display:flex;gap:16px;font-size:10.5px;color:var(--tx3);margin-top:3px">'+
            '<span>Masuk <b style="color:var(--hijau-tx)">'+fmtRp(p.masuk)+'</b></span>'+
            '<span>Keluar <b style="color:var(--merah-tx)">'+fmtRp(p.keluar)+'</b></span></div></div>';
      }).join('')+'</div>' : '')+

      '<div class="sec-head" style="padding-top:14px"><div class="t">Hutang &amp; piutang berjalan</div></div>'+
      '<div class="rep-cards">'+
        '<div class="rep-card"><div class="l">Piutang berjalan</div><div class="v" style="color:var(--hijau-tx)">'+fmtRp(piutangSisa)+'</div></div>'+
        '<div class="rep-card"><div class="l">Hutang berjalan</div><div class="v" style="color:var(--merah-tx)">'+fmtRp(hutangSisa)+'</div></div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--tx3);padding:8px 18px 0">'+
        (belumLunas.length ? belumLunas.length+' catatan belum lunas.'+(jt?' Jatuh tempo terdekat: '+esc(jt.pihak)+', '+labelTanggalSingkat(jt.jatuhTempo)+'.':'') : 'Semua catatan hutang dan piutang sudah lunas.')+
      '</div>'+

      buatInsightHTML()+

      '<div class="sec-head" style="padding-top:14px"><div class="t">Unduh laporan</div></div>'+
      '<div class="chips">'+[['hari','Harian'],['minggu','Mingguan'],['bulan','Bulanan'],['kustom','Kustom']].map(function(c){return '<button class="chip '+(expRange===c[0]?'on':'')+'" onclick="setExpRange(\''+c[0]+'\')">'+c[1]+'</button>';}).join('')+'</div>'+
      (expRange==='kustom'?'<div class="panel"><div class="kustom-date"><div><label class="fl">Dari</label><input class="field" type="date" value="'+expAwal+'" onchange="expAwal=this.value;render();"></div>'+
        '<div><label class="fl">Sampai</label><input class="field" type="date" value="'+expAkhir+'" onchange="expAkhir=this.value;render();"></div></div></div>':'')+
      '<div class="panel"><div style="font-size:12px;color:var(--tx2);margin-bottom:12px">'+nExp+' transaksi pada rentang '+esc(labelRentang())+'.</div>'+
        '<div style="display:flex;gap:12px"><button class="btn-line" style="margin-top:0;flex:1" '+(nExp?'':'disabled')+' onclick="unduhHTML()">&#128196; PDF</button>'+
        '<button class="btn-line" style="margin-top:0;flex:1" '+(nExp?'':'disabled')+' onclick="unduhCSV()">&#128202; Excel</button></div>'+
        '<div style="font-size:11px;color:var(--tx3);margin-top:10px">Laporan dibuat langsung di perangkat dan tersimpan di folder Download/KeuanganKu.</div></div>'+

      '<div class="sec-head" style="padding-top:10px"><div class="t">Daftar transaksi</div><div style="font-size:11px;color:var(--tx3)">'+repGab.length+' catatan</div></div>'+
      limitChips(repLimit,'setRepLimit')+
      '<div class="list" style="padding-top:6px;padding-bottom:10px">'+(repGab.length?repGab.slice(0,repLimit||repGab.length).map(barisGabungan).join(''):'<div class="empty">Belum ada catatan pada periode ini.</div>')+'</div>';

    wireRepPeriode();
    if(kats.length) gambarDonut(kats);
    gambarTrenGaris();
  };
  function now0jam(){ return new Date().getHours(); }

  /* ====== DONUT: border mengikuti tema ====== */
  window.gambarDonut=function(kats){
    var ctx=document.getElementById('donut'); if(!ctx) return; if(chart) chart.destroy();
    var css=getComputedStyle(document.documentElement);
    var warnaKartu=(css.getPropertyValue('--card')||'').trim()||'#ffffff';
    chart=new Chart(ctx,{type:'doughnut',
      data:{labels:kats.map(function(k){return k[0];}),
        datasets:[{data:kats.map(function(k){return k[1];}),
          backgroundColor:kats.map(function(k,i){return WARNA_KAT[i%WARNA_KAT.length];}),
          borderWidth:2, borderColor:warnaKartu}]},
      options:{cutout:'62%',plugins:{legend:{display:false},
        tooltip:{callbacks:{label:function(c){return ' '+(HIDE_AMT?'Rp \u2022\u2022\u2022\u2022\u2022':rp(c.parsed));}}}},
        maintainAspectRatio:false}});
  };

  /* ====== GRAFIK GARIS TREN ====== */
  function gambarTrenGaris(){
    var ctx=document.getElementById('trenLine'); if(!ctx) return;
    if(window._chartTren){ try{ window._chartTren.destroy(); }catch(e){} window._chartTren=null; }

    var now=hariIni();
    var labels=[], dMasuk=[], dKeluar=[], catatan='';

    if(repPeriode==='harian'){
      /* (5) hanya transaksi yang punya jam valid HARI INI yang diplot per jam */
      var todayStr=todayISO(), jamSkr=now0jam();
      var perJamM=[], perJamK=[], lewat=0;
      for(var h=0; h<24; h++){ perJamM.push(0); perJamK.push(0); }
      TX.forEach(function(t){
        if(t.tanggal!==todayStr) return;
        if(t.tipe!=='pemasukan' && t.tipe!=='pengeluaran') return;
        var jam=-1;
        if(t.createdAt){
          try{ var cd=new Date(t.createdAt); if(isoDari(cd)===todayStr) jam=cd.getHours(); }catch(e){}
        }
        if(jam<0){ lewat++; return; }
        if(t.tipe==='pemasukan') perJamM[jam]+=(+t.nominal); else perJamK[jam]+=(+t.nominal);
      });
      for(var i=0;i<=jamSkr;i++){
        labels.push(String(i).padStart(2,'0')+':00');
        dMasuk.push(perJamM[i]); dKeluar.push(perJamK[i]);
      }
      if(lewat>0) catatan=lewat+' transaksi tanpa informasi jam tidak ditampilkan pada grafik (tetap terhitung di total).';
    } else if(repPeriode==='mingguan'){
      for(var d=6; d>=0; d--){
        var d0=new Date(now); d0.setDate(now.getDate()-d);
        var ag=agTgl(isoDari(d0));
        labels.push(d0.toLocaleDateString(window.LANG==='en'?'en-US':'id-ID', {weekday:'short', day:'numeric'}));
        dMasuk.push(ag.m); dKeluar.push(ag.k);
      }
    } else if(repPeriode==='bulanan'){
      var hariIniTgl=now.getDate();
      for(var tgl=1; tgl<=hariIniTgl; tgl++){
        var dd=new Date(now.getFullYear(), now.getMonth(), tgl);
        var ag2=agTgl(isoDari(dd));
        labels.push(String(tgl));
        dMasuk.push(ag2.m); dKeluar.push(ag2.k);
      }
    } else { /* tahunan: 12 titik jendela bergulir, konsisten dengan kartu & panel */
      for(var mo=11; mo>=0; mo--){
        var d1=new Date(now.getFullYear(), now.getMonth()-mo, 1);
        var ag3=agBulan(kunciBulan(d1));
        labels.push(d1.toLocaleDateString(window.LANG==='en'?'en-US':'id-ID', {month:'short', year:'2-digit'}));
        dMasuk.push(ag3.m); dKeluar.push(ag3.k);
      }
    }

    var noteEl=document.getElementById('trenNote');
    if(noteEl){ noteEl.textContent=catatan; noteEl.style.display=catatan?'block':'none'; }

    var css=getComputedStyle(document.documentElement);
    var hij=(css.getPropertyValue('--hijau-tx')||'').trim()||'#1D9E75';
    var mer=(css.getPropertyValue('--merah-tx')||'').trim()||'#D85A30';
    window._chartTren=new Chart(ctx,{
      type:'line',
      data:{ labels:labels, datasets:[
        {label:(window.LANG==='en'?'Income':'Pemasukan'), data:dMasuk, borderColor:hij, backgroundColor:hij, fill:false, tension:.35, pointRadius:2.5, pointHoverRadius:5, pointHitRadius:14, borderWidth:2},
        {label:(window.LANG==='en'?'Expenses':'Pengeluaran'), data:dKeluar, borderColor:mer, backgroundColor:mer, fill:false, tension:.35, pointRadius:2.5, pointHoverRadius:5, pointHitRadius:14, borderWidth:2}
      ]},
      options:{
        /* Kunci perbaikan untuk layar sentuh:
           mode 'index' + intersect false = ketuk di mana saja pada
           garis vertikal suatu titik, tooltip langsung muncul untuk
           kedua garis sekaligus, tidak perlu mengenai titiknya persis. */
        interaction:{ mode:'index', intersect:false },
        plugins:{
          legend:{display:true, labels:{boxWidth:10, font:{size:10}}},
          tooltip:{
            mode:'index', intersect:false,
            callbacks:{label:function(c){ return ' '+c.dataset.label+': '+(HIDE_AMT?'Rp \u2022\u2022\u2022\u2022\u2022':rp(c.parsed.y)); }}
          }
        },
        scales:{
          y:{ticks:{display:false}, grid:{color:'rgba(128,128,128,.12)'}},
          x:{grid:{display:false}, ticks:{font:{size:9}, maxRotation:0, autoSkip:true}}
        },
        maintainAspectRatio:false
      }
    });
  }

  /* ====== INSIGHT & SARAN (selalu analisis bulan berjalan) ====== */
  function sum(arr,tipe){ return arr.filter(function(t){return t.tipe===tipe;}).reduce(function(s,t){return s+(+t.nominal);},0); }

  function badgeSurplus(masukV, keluarV){
    if(masukV<=0) return {lbl:'Data terbatas', cls:'belum'};
    var r=keluarV/masukV;
    if(r>1) return {lbl:'Defisit', cls:'telat'};
    if(r>=0.8) return {lbl:'Ketat', cls:'seb'};
    return {lbl:'Surplus', cls:'lunas'};
  }
  function baris(label, masukV, keluarV, badge, catatan){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--line)">'+
      '<div><div style="font-size:12.5px;font-weight:600">'+label+'</div>'+
      '<div style="font-size:10.5px;color:var(--tx3);margin-top:2px">Masuk '+fmtRp(masukV)+' &middot; Keluar '+fmtRp(keluarV)+(catatan?(' &middot; '+catatan):'')+'</div></div>'+
      '<span class="ubadge '+badge.cls+'" style="flex-shrink:0;margin-left:10px">'+badge.lbl+'</span>'+
      '</div>';
  }

  function buatInsightHTML(){
    var now=hariIni();

    /* Harian */
    var todayStr=todayISO();
    var agHari=agTgl(todayStr);
    var keluarHari=agHari.k, masukHari=agHari.m;
    var d30=new Date(now); d30.setDate(d30.getDate()-30);
    var total30=0;
    for(var i=1;i<=30;i++){ var dh=new Date(now); dh.setDate(now.getDate()-i); total30+=agTgl(isoDari(dh)).k; }
    var rataHarian30=total30/30;
    var badgeHari;
    if(!rataHarian30){ badgeHari={lbl:'Data terbatas', cls:'belum'}; }
    else{
      var rH=keluarHari/rataHarian30;
      badgeHari = rH>1.3 ? {lbl:'Di atas rata-rata', cls:'telat'} : rH<0.7 ? {lbl:'Di bawah rata-rata', cls:'lunas'} : {lbl:'Sesuai rata-rata', cls:'belum'};
    }

    /* Mingguan */
    var masukMinggu=0, keluarMinggu=0;
    for(var j=0;j<7;j++){ var dm=new Date(now); dm.setDate(now.getDate()-j); var agm=agTgl(isoDari(dm)); masukMinggu+=agm.m; keluarMinggu+=agm.k; }

    /* Bulanan */
    var agB=agBulan(kunciBulan(now));
    var masukBulan=agB.m, keluarBulan=agB.k;

    /* 12 bulan terakhir (konsisten dengan definisi tahunan baru) */
    var masukTahun=0, keluarTahun=0;
    for(var mo=11; mo>=0; mo--){
      var dt=new Date(now.getFullYear(), now.getMonth()-mo, 1);
      var agt=agBulan(kunciBulan(dt)); masukTahun+=agt.m; keluarTahun+=agt.k;
    }

    /* Kategori dominan bulan ini */
    var katBulan={};
    TX.forEach(function(t){
      if(t.tipe!=='pengeluaran') return;
      var td=new Date(t.tanggal+'T00:00:00');
      if(td.getMonth()!==now.getMonth() || td.getFullYear()!==now.getFullYear()) return;
      katBulan[t.kategori]=(katBulan[t.kategori]||0)+(+t.nominal);
    });
    var katArr=Object.keys(katBulan).map(function(k){return [k,katBulan[k]];}).sort(function(a,b){return b[1]-a[1];});
    var katTop=katArr[0];
    var persenKatTop=(keluarBulan>0 && katTop)?(katTop[1]/keluarBulan*100):0;

    var hutangSisaAll=UT.filter(function(u){return u.jenis==='hutang';}).reduce(function(s,u){return s+utSisa(u);},0);

    var jmlTransBelanjaHiburan=TX.filter(function(t){
      if(t.tipe!=='pengeluaran' || (t.kategori!=='Hiburan'&&t.kategori!=='Belanja')) return false;
      var td=new Date(t.tanggal+'T00:00:00');
      return td.getMonth()===now.getMonth() && td.getFullYear()===now.getFullYear();
    }).length;

    var flags=[];
    var rasioTabunganBulan = masukBulan>0 ? ((masukBulan-keluarBulan)/masukBulan*100) : null;
    if(masukBulan>0 && keluarBulan>=masukBulan){
      flags.push('Pengeluaran bulan ini sudah menyamai atau melebihi pemasukan bulan ini, tanda gaya hidup mendekati atau melebihi kemampuan.');
    }
    if(katTop && persenKatTop>=45){
      flags.push('Kategori "'+katTop[0]+'" menyerap sekitar '+Math.round(persenKatTop)+'% dari total pengeluaran bulan ini, indikasi belanja terkonsentrasi pada kategori tersebut.');
    }
    if(jmlTransBelanjaHiburan>=12){
      flags.push('Frekuensi transaksi Belanja/Hiburan cukup tinggi bulan ini ('+jmlTransBelanjaHiburan+' transaksi), perlu diwaspadai potensi pembelian impulsif.');
    }
    if(hutangSisaAll>0 && masukBulan>0 && hutangSisaAll >= masukBulan*3){
      flags.push('Total hutang berjalan setara lebih dari 3x pemasukan bulan ini, beban hutang tergolong berat.');
    }
    if(rasioTabunganBulan!==null && rasioTabunganBulan>=70){
      flags.push('Tingkat tabungan bulan ini sangat tinggi (sekitar '+Math.round(rasioTabunganBulan)+'%), baik untuk cadangan dana namun perlu dicek apakah kebutuhan penting sudah terpenuhi.');
    }
    var flagsHtml = flags.length
      ? flags.map(function(f){ return '<div style="display:flex;gap:8px;padding:6px 0;font-size:12px;color:var(--tx2);line-height:1.5"><span>&#9888;</span><span>'+esc(f)+'</span></div>'; }).join('')
      : '<div style="font-size:12px;color:var(--tx2);line-height:1.5">Tidak terdeteksi pola mencolok. Kondisi pengeluaran relatif seimbang berdasarkan data yang tercatat.</div>';

    var paragraf;
    if(rasioTabunganBulan===null){
      paragraf='Belum cukup data pemasukan bulan ini untuk menilai keseimbangan pengeluaran secara menyeluruh. Catat juga transaksi pemasukan agar insight dapat lebih akurat.';
    } else if(rasioTabunganBulan<0){
      paragraf='Ketika pengeluaran rutin melebihi pemasukan, dana darurat akan tergerus dan berpotensi menambah hutang baru untuk menutup kekurangan. Bila pola ini berlanjut beberapa bulan berturut-turut, disarankan segera meninjau pos pengeluaran terbesar dan menyesuaikannya dengan pemasukan yang tersedia.';
    } else if(rasioTabunganBulan>70){
      paragraf='Tingkat hemat yang sangat tinggi umumnya baik untuk membangun tabungan atau dana darurat, namun bila dilakukan berlebihan dalam jangka panjang dapat mengorbankan kebutuhan penting atau membuat dana hanya mengendap tanpa berkembang. Pertimbangkan mengalokasikan sebagian surplus untuk instrumen yang lebih produktif.';
    } else {
      paragraf='Keseimbangan antara pemasukan dan pengeluaran saat ini tergolong wajar. Menjaga rasio tabungan pada level yang sehat (idealnya sekitar 20-30% dari pemasukan) akan membantu kondisi keuangan tetap stabil dalam jangka panjang tanpa terlalu membatasi kebutuhan sehari-hari.';
    }

    var saran=[];
    saran.push('Catat setiap transaksi sesegera mungkin (termasuk pemasukan) agar data lebih lengkap dan insight lebih akurat.');
    if(rasioTabunganBulan!==null && rasioTabunganBulan<0){
      saran.push('Evaluasi kategori pengeluaran terbesar bulan ini'+(katTop?(' ("'+katTop[0]+'")'):'')+' dan cari pos yang bisa dikurangi lebih dulu.');
    }
    if(hutangSisaAll>0){
      saran.push('Prioritaskan pelunasan hutang, mulai dari yang jatuh temponya paling dekat, untuk mengurangi beban kewajiban ke depan.');
    }
    if(jmlTransBelanjaHiburan>=12){
      saran.push('Terapkan jeda waktu (misalnya 24 jam) sebelum melakukan pembelian non-esensial, untuk mengurangi potensi pembelian impulsif.');
    }
    if(katTop && persenKatTop>=45){
      saran.push('Tetapkan anggaran bulanan khusus untuk kategori "'+katTop[0]+'" agar proporsinya lebih terkendali.');
    }
    if(rasioTabunganBulan!==null && rasioTabunganBulan>70){
      saran.push('Pertimbangkan mengalokasikan sebagian dana surplus untuk investasi atau kebutuhan pengembangan diri, bukan hanya disimpan diam.');
    }
    var saranHtml = saran.map(function(s,i){
      return '<div style="display:flex;gap:8px;padding:6px 0;font-size:12px;color:var(--tx2);line-height:1.5"><span style="color:var(--biru);font-weight:700">'+(i+1)+'.</span><span>'+esc(s)+'</span></div>';
    }).join('');

    return (
      '<div class="sec-head" style="padding-top:14px"><div class="t">Insight &amp; Saran Keuangan</div>'+
        '<div style="font-size:10.5px;color:var(--tx3)">analisis bulan berjalan</div></div>'+
      '<div class="panel">'+
        '<div style="font-size:12.5px;font-weight:600;margin-bottom:2px">Ringkasan kondisi</div>'+
        baris('Hari ini', masukHari, keluarHari, badgeHari, rataHarian30?('rata-rata harian '+fmtRp(rataHarian30)):'')+
        baris('7 hari terakhir', masukMinggu, keluarMinggu, badgeSurplus(masukMinggu,keluarMinggu), '')+
        baris('Bulan ini', masukBulan, keluarBulan, badgeSurplus(masukBulan,keluarBulan), '')+
        baris('12 bulan terakhir', masukTahun, keluarTahun, badgeSurplus(masukTahun,keluarTahun), '')+
      '</div>'+
      '<div class="panel" style="margin-top:10px">'+
        '<div style="font-size:12.5px;font-weight:600;margin-bottom:4px">Pola yang terdeteksi</div>'+
        flagsHtml+
      '</div>'+
      '<div class="panel" style="margin-top:10px">'+
        '<div style="font-size:12.5px;font-weight:600;margin-bottom:6px">Jika kondisi ini dipertahankan</div>'+
        '<div style="font-size:12px;color:var(--tx2);line-height:1.6">'+paragraf+'</div>'+
      '</div>'+
      '<div class="panel" style="margin-top:10px">'+
        '<div style="font-size:12.5px;font-weight:600;margin-bottom:2px">Saran perbaikan ke depan</div>'+
        saranHtml+
      '</div>'
    );
  }

})();
</script>

<script>
/* PATCH KAMERA v6: tata letak gaya Instagram Stories.
   Ganti seluruh PATCH KAMERA v5 dengan blok ini (tempel sebelum </body>).

   Perubahan dari v5 hanya pada tampilan:
   - Pratinjau kamera memenuhi seluruh layar.
   - Tombol X (batal) di kiri atas, pil status di tengah atas.
   - Ikon senter, balik kamera, dan fokus manual tersusun vertikal
     di sisi kanan atas, melayang di atas pratinjau. Ikon menyala
     kuning saat fiturnya aktif.
   - Tombol jepret bulat besar di bawah tengah, slider zoom tipis
     melayang di atasnya, slider fokus muncul bila mode manual aktif.

   cubit dua jari, ketuk-untuk-fokus, fokus manual, senter,
   auto-level, penajaman, dan pemotong bingkai struk. */
(function(){
  var HAMBANG_GELAP  = 55;

  var SISI_MAKS_STRUK = 2400;
  var SISI_MAKS_POLOS = 1600;

  var _stream=null, _cb=null, _gagalCb=null, _facing='environment';

  function hentikanStream(){

    _senterNyala=false; _ic=null; _fokusManual=false;
    if(_stream){ _stream.getTracks().forEach(function(t){ t.stop(); }); _stream=null; }
  }
  function trackAktif(){ return _stream ? _stream.getVideoTracks()[0] : null; }

  /* ================= UI GAYA STORIES ================= */
  var IKON={
    x:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
    kilat:'<svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M13 2L4.5 13.5H11L9.5 22 19 10h-6.5L13 2z"/></svg>',
    balik:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 8a8 8 0 0 0-14.9-2M4 16a8 8 0 0 0 14.9 2"/><path d="M20 3v5h-5M4 21v-5h5"/></svg>',
    fokus:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M4 8V5a1 1 0 0 1 1-1h3M20 8V5a1 1 0 0 0-1-1h-3M4 16v3a1 1 0 0 0 1 1h3M20 16v3a1 1 0 0 1-1 1h-3"/></svg>'
  };
  function tombolBulat(id, ikon, onclick){
    return '<button id="'+id+'" onclick="'+onclick+'" style="width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent">'+ikon+'</button>';
  }
  function nyalakanIkon(id, nyala){
    var b=document.getElementById(id); if(!b) return;
    b.style.background = nyala ? 'rgba(255,213,74,.95)' : 'rgba(0,0,0,.45)';
    var svg=b.querySelector('svg'); if(!svg) return;
    svg.querySelectorAll('[stroke]').forEach(function(el){ el.setAttribute('stroke', nyala?'#111':'#fff'); });
    svg.querySelectorAll('[fill]').forEach(function(el){ if(el.getAttribute('fill')!=='none') el.setAttribute('fill', nyala?'#111':'#fff'); });
  }

  function pastikanUI(){
    var lama=document.getElementById('kamMask');
    if(lama){ if(lama.dataset.versi==='6') return; lama.remove(); }
    var div=document.createElement('div');
    div.id='kamMask'; div.dataset.versi='6';
    div.style.cssText='position:fixed;inset:0;z-index:80;display:none;background:#000';
    div.innerHTML=
      '<div id="kamWrap" style="position:absolute;inset:0;overflow:hidden;touch-action:none">'+
        '<video id="kamVideo" autoplay playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transform-origin:center center"></video>'+
        '<div id="kamGelap" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:calc(env(safe-area-inset-top,0px) + 70px) 0 calc(env(safe-area-inset-bottom,0px) + 215px);box-sizing:border-box">'+
          '<div id="kamBingkai" style="width:72%;max-width:340px;aspect-ratio:3/4.6;max-height:100%;border:2.5px solid rgba(255,255,255,.95);border-radius:14px;box-shadow:0 0 0 4000px rgba(0,0,0,.45)"></div>'+
        '</div>'+
        '<div id="kamRing" style="position:absolute;width:64px;height:64px;border:2px solid #ffd54a;border-radius:50%;pointer-events:none;display:none;transform:translate(-50%,-50%);transition:opacity .3s"></div>'+
      '</div>'+

      /* lapisan kontrol di atas pratinjau */
      '<div style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);left:12px;z-index:2">'+
        tombolBulat('kamTutup', IKON.x, 'tutupKameraWeb()')+
      '</div>'+
      '<div id="kamStatus" style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 18px);left:50%;transform:translateX(-50%);z-index:1;background:rgba(0,0,0,.55);color:#fff;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:18px;white-space:nowrap;max-width:62%;overflow:hidden;text-overflow:ellipsis;transition:background .3s">Arahkan kamera</div>'+
      '<div style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:12px;z-index:2;display:flex;flex-direction:column;gap:12px">'+
        tombolBulat('kamSenter', IKON.kilat, 'senterKameraWeb()')+
        tombolBulat('kamBalik', IKON.balik, 'balikKameraWeb()')+
        tombolBulat('kamFokusBtn', IKON.fokus, 'fokusManualKameraWeb()')+
      '</div>'+

      /* panel bawah: slider fokus, slider zoom, tombol jepret */
      '<div style="position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none">'+
        '<div id="kamFokusRow" style="display:none;align-items:center;gap:8px;width:70%;max-width:320px;background:rgba(0,0,0,.45);border-radius:16px;padding:7px 12px;pointer-events:auto">'+
          '<span style="color:#eee;font-size:10.5px;flex:0 0 auto">Dekat</span>'+
          '<input id="kamFokusSlider" type="range" style="flex:1;accent-color:#ffd54a;height:18px">'+
          '<span style="color:#eee;font-size:10.5px;flex:0 0 auto">Jauh</span>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px;width:70%;max-width:320px;background:rgba(0,0,0,.45);border-radius:16px;padding:7px 12px;pointer-events:auto">'+
          '<input id="kamZoomSlider" type="range" style="flex:1;accent-color:#fff;height:18px">'+
          '<span id="kamZoomLbl" style="color:#fff;font-size:11px;font-weight:700;flex:0 0 32px;text-align:right">1.0x</span>'+
        '</div>'+
        '<button id="kamAmbil" onclick="jepretKameraWeb()" style="pointer-events:auto;width:74px;height:74px;border-radius:50%;border:4px solid rgba(255,255,255,.95);background:transparent;display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent">'+
          '<span id="kamAmbilInti" style="width:56px;height:56px;border-radius:50%;background:#fff;transition:transform .12s, background .2s"></span>'+
        '</button>'+
      '</div>';
    document.body.appendChild(div);

    var v=document.getElementById('kamVideo');
    if(v) v.addEventListener('click', fokusTitik);

    var zs=document.getElementById('kamZoomSlider');
    if(zs) zs.addEventListener('input', function(){ setZoom(parseFloat(zs.value)); });

    var fs=document.getElementById('kamFokusSlider');
    if(fs) fs.addEventListener('input', function(){ setFokusManual(parseFloat(fs.value)); });

    var wrap=document.getElementById('kamWrap');
    var jarakAwal=0, zoomAwal=1;
    function jarak(e){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      return Math.sqrt(dx*dx+dy*dy);
    }
    wrap.addEventListener('touchstart', function(e){
      if(e.touches.length===2){ jarakAwal=jarak(e); zoomAwal=_zoomVal; }
    }, {passive:true});
    wrap.addEventListener('touchmove', function(e){
      if(e.touches.length===2 && jarakAwal>0){
        e.preventDefault();
        setZoom(zoomAwal * (jarak(e)/jarakAwal));
      }
    }, {passive:false});
    wrap.addEventListener('touchend', function(e){
      if(e.touches.length<2) jarakAwal=0;
    }, {passive:true});
  }

  function sembunyikanUI(){ var m=document.getElementById('kamMask'); if(m) m.style.display='none'; }
  function pulihkanTombol(){
    var b=document.getElementById('kamAmbil');
    var inti=document.getElementById('kamAmbilInti');
    if(b) b.disabled=false;
    if(inti){ inti.style.background='#fff'; inti.style.transform='scale(1)'; }
  }
  function tombolMemproses(){
    var b=document.getElementById('kamAmbil');
    var inti=document.getElementById('kamAmbilInti');
    if(b) b.disabled=true;
    if(inti){ inti.style.background='#999'; inti.style.transform='scale(.82)'; }
  }
  function setStatus(teks, warna){
    var s=document.getElementById('kamStatus'); if(!s) return;
    s.textContent=teks;
    s.style.background = warna==='hijau' ? 'rgba(28,140,90,.9)'
                       : warna==='merah' ? 'rgba(180,60,50,.9)'
                       : 'rgba(0,0,0,.55)';
  }

  /* ================= ZOOM (logika sama dengan v5) ================= */
  function siapkanZoom(){
    var track=trackAktif();
    var caps=null;
    if(track && track.getCapabilities){ try{ caps=track.getCapabilities(); }catch(e){} }
    if(caps && caps.zoom && typeof caps.zoom.max==='number' && caps.zoom.max>caps.zoom.min){
      _zoomInfo={ min:caps.zoom.min||1, max:caps.zoom.max, step:caps.zoom.step||0.1, native:true };
    } else {
      _zoomInfo={ min:1, max:3, step:0.05, native:false };
    }
    _zoomVal=_zoomInfo.min<1?1:_zoomInfo.min;
    var zs=document.getElementById('kamZoomSlider');
    if(zs){ zs.min=_zoomInfo.min; zs.max=_zoomInfo.max; zs.step=_zoomInfo.step; zs.value=_zoomVal; }
    terapkanZoom();
  }
  function setZoom(v){
    if(v<_zoomInfo.min) v=_zoomInfo.min;
    if(v>_zoomInfo.max) v=_zoomInfo.max;
    _zoomVal=v;
    var zs=document.getElementById('kamZoomSlider');
    if(zs && Math.abs(parseFloat(zs.value)-v)>0.001) zs.value=v;
    terapkanZoom();
  }
  function terapkanZoom(){
    var lbl=document.getElementById('kamZoomLbl');
    if(lbl) lbl.textContent=_zoomVal.toFixed(1)+'x';
    var v=document.getElementById('kamVideo');
    if(_zoomInfo.native){
      var track=trackAktif();
      if(track) track.applyConstraints({advanced:[{zoom:_zoomVal}]}).catch(function(){});
      if(v) v.style.transform='none';
    } else {
      if(v) v.style.transform = _zoomVal>1.001 ? 'scale('+_zoomVal+')' : 'none';
    }
  }

  /* ================= FOKUS (logika sama dengan v5) ================= */
  function fokusTitik(ev){
    var track=trackAktif();
    if(!track || _fokusManual) return;
    var ring=document.getElementById('kamRing');
    if(ring){
      ring.style.left=ev.clientX+'px'; ring.style.top=ev.clientY+'px';
      ring.style.display='block'; ring.style.opacity='1';
      setTimeout(function(){ ring.style.opacity='0'; }, 900);
      setTimeout(function(){ ring.style.display='none'; }, 1200);
    }
    if(!track.getCapabilities) return;
    var caps; try{ caps=track.getCapabilities(); }catch(e){ return; }
    var r=ev.currentTarget.getBoundingClientRect();
    var x=Math.min(1,Math.max(0,(ev.clientX-r.left)/r.width));
    var y=Math.min(1,Math.max(0,(ev.clientY-r.top)/r.height));
    var adv=[];
    if(caps.focusMode && caps.focusMode.indexOf('single-shot')>-1) adv.push({focusMode:'single-shot'});
    if(caps.pointsOfInterest) adv.push({pointsOfInterest:[{x:x,y:y}]});
    if(!adv.length) return;
    track.applyConstraints({advanced:adv}).then(function(){
      setStatus('Menyesuaikan fokus...','');
      setTimeout(function(){
        try{ if(!_fokusManual) track.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){}
      },1500);
    }).catch(function(){});
  }

  function siapkanFokusManual(){
    var btn=document.getElementById('kamFokusBtn');
    var row=document.getElementById('kamFokusRow');
    _fokusManual=false;
    if(row) row.style.display='none';
    if(btn){ btn.style.display='none'; nyalakanIkon('kamFokusBtn', false); }
    var track=trackAktif();
    if(!track || !track.getCapabilities) return;
    var caps; try{ caps=track.getCapabilities(); }catch(e){ return; }
    if(caps.focusDistance && caps.focusMode && caps.focusMode.indexOf('manual')>-1){
      var fs=document.getElementById('kamFokusSlider');
      if(fs){
        fs.min=caps.focusDistance.min;
        fs.max=caps.focusDistance.max;
        fs.step=caps.focusDistance.step||0.01;
        fs.value=caps.focusDistance.min;
      }
      if(btn) btn.style.display='flex';
    }
  }
  window.fokusManualKameraWeb=function(){
    var row=document.getElementById('kamFokusRow');
    var track=trackAktif(); if(!track) return;
    _fokusManual=!_fokusManual;
    nyalakanIkon('kamFokusBtn', _fokusManual);
    if(_fokusManual){
      if(row) row.style.display='flex';

      if(fs) setFokusManual(parseFloat(fs.value));
      setStatus('Fokus manual: geser slider Dekat-Jauh','');
    } else {
      if(row) row.style.display='none';
      try{ track.applyConstraints({advanced:[{focusMode:'continuous'}]}).catch(function(){}); }catch(e){}
      setStatus('Fokus otomatis aktif','');
    }
  };
  function setFokusManual(nilai){
    var track=trackAktif(); if(!track) return;
    track.applyConstraints({advanced:[{focusMode:'manual', focusDistance:nilai}]}).catch(function(){});
  }

  /* ================= SENTER ================= */
  function cekSenter(){
    var btn=document.getElementById('kamSenter'); if(!btn) return;
    btn.style.display='none'; _senterNyala=false; nyalakanIkon('kamSenter', false);
    var track=trackAktif(); if(!track || !track.getCapabilities) return;

      var caps=track.getCapabilities();
