var obs=null, tundaan=null;

function amati(){
  if(!obs){
    obs=new MutationObserver(function(){
      if(LANG!=='en') return;
      jadwalkan();
    });
  }
  obs.observe(document.body,{childList:true,subtree:true});
}
function jadwalkan(){
  if(tundaan) return;
  tundaan=requestAnimationFrame(function(){
    tundaan=null;
    jalankanTerjemahan();
  });
}
function jalankanTerjemahan(){
  if(LANG!=='en') return;
  try{
    obs && obs.disconnect();
    lintasan(document.body, keInggris);
  }catch(e){}
  finally{ amati(); }
}
function kembalikanKeIndonesia(){
  try{
    obs && obs.disconnect();
    lintasan(document.body, keIndonesia);
  }catch(e){}
  finally{ amati(); }
}

<script>
/* ===== PATCH: Login Google via browser + polling sesi ===== */
var URL_AUTH='https://script.google.com/macros/s/AKfycbzOussSdotfWY4VKPKCZOZImxUyyfXc5SvYgQZCXnLSb4VL_Pk-n2sRF11L1CTwUBeoLQ/exec'; // URL /exec yang sama
var _sesiTimer=null;

function buatSesi(){
  var s='', k='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  for(var i=0;i<24;i++) s+=k.charAt(Math.floor(Math.random()*k.length));
  return s;
}

function mulaiLoginGoogle(){
  var sesi=buatSesi();
  localStorage.setItem('sesi_login', sesi);
  localStorage.setItem('sesi_mulai', String(Date.now()));
  window.AppInventor && window.AppInventor.setWebViewString(
    'BUKA_LINKI|'+URL_AUTH+'?gauth='+encodeURIComponent(sesi));
  mulaiPollingSesi();
}

function mulaiPollingSesi(){
  hentikanPollingSesi();
  _sesiTimer=setInterval(cekSesiLogin, 3000);
}
function hentikanPollingSesi(){
  if(_sesiTimer){ clearInterval(_sesiTimer); _sesiTimer=null; }
}

function cekSesiLogin(){
  var sesi=localStorage.getItem('sesi_login');
  if(!sesi){ hentikanPollingSesi(); return; }
  /* berhenti otomatis setelah 10 menit (selaras MASA_SESI_DETIK) */
  if(Date.now()-(+localStorage.getItem('sesi_mulai')||0) > 600000){
    hentikanPollingSesi(); localStorage.removeItem('sesi_login'); return;
  }
  fetch(URL_AUTH+'?cek='+encodeURIComponent(sesi))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.status==='ok'){
        hentikanPollingSesi();
        localStorage.removeItem('sesi_login');
        localStorage.setItem('user_email', d.email||'');
        localStorage.setItem('user_nama',  d.nama ||'');
        localStorage.setItem('user_foto',  d.foto ||'');
        localStorage.setItem('user_phone', d.phone||'');
        onLoginBerhasil(d);            /* fungsi Anda: tutup layar login, tampilkan app */
      } else if(d.status==='kedaluwarsa' || d.status==='tidak_ada'){
        hentikanPollingSesi();
        localStorage.removeItem('sesi_login');
        onLoginGagal && onLoginGagal(d.status);
      }
      /* status 'pending' ? biarkan polling lanjut */
    })
    .catch(function(){ /* jaringan sesaat bermasalah, coba lagi di tick berikut */ });
}

/* "OnResume" versi WebView: begitu aplikasi tampil lagi, cek langsung tanpa menunggu tick */
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible' && localStorage.getItem('sesi_login')){
    cekSesiLogin();
    mulaiPollingSesi();
  }
});

/* bila aplikasi dibuka ulang di tengah proses login yang belum selesai */
if(localStorage.getItem('sesi_login')) mulaiPollingSesi();
</script>

<script>
/* PATCH KONEKSI PENCADANGAN v2: baca via fetch anonim (credentials omit)
   agar tidak terkena redirect multi-akun Google /u/N/ yang berujung 404.
   JSONP tag-script lama dipertahankan sebagai cadangan bila fetch gagal. */
(function(){

function jsonpTagScript(params){
  return new Promise(function(res,rej){
    var url=getGasUrl();
    if(!url){ rej(new Error('Layanan pencadangan belum terhubung. Atur di tab Profil, menu Koneksi Pencadangan.')); return; }
    var cb='kk_cb_'+Date.now().toString(36)+Math.floor(Math.random()*1e4);
    var sep=url.indexOf('?')>=0?'&':'?';
    var s=document.createElement('script');
    var timer=setTimeout(function(){ cleanup(); rej(new Error('Layanan tidak merespons. Periksa kembali pengaturan koneksi lalu coba lagi.')); },20000);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=function(data){ cleanup(); res(data); };
    s.onerror=function(){ cleanup(); rej(new Error('Gagal terhubung ke layanan')); };
    s.src=url+sep+params+'&callback='+cb;
    document.body.appendChild(s);
  });
}

window.jsonp=function(params){
  var url=getGasUrl();
  if(!url) return Promise.reject(new Error('Layanan pencadangan belum terhubung. Atur di tab Profil, menu Koneksi Pencadangan.'));
  var sep=url.indexOf('?')>=0?'&':'?';
  return fetch(url+sep+params,{method:'GET',credentials:'omit',redirect:'follow'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .catch(function(){ return jsonpTagScript(params); });
};

})();
</script>

<script>
/* ===== PATCH PENAMPUNG SALDO KONSISTEN =====
   1. Mengingat penampung saldo terakhir yang dipilih (per pengguna).
   2. Menjadikannya bawaan di form Tambah Transaksi dan pemindai struk,
      menggantikan perilaku lama yang selalu memakai akun pertama (AK[0]).
   3. Mewariskan pilihan dari form Tambah ke pemindai struk saat foto diambil. */
(function(){

  /* ---------- penyimpanan pilihan terakhir ---------- */
  function kunciAkun(){
    var u = (typeof emailUser==='function' ? emailUser() : '') || '';
    return u ? ('kk_akun_terakhir_'+u) : 'kk_akun_terakhir';
  }
  function akunValid(id){
    return !!(id && typeof cariAkun==='function' && cariAkun(id));
  }
  function akunDefault(){
    var simpan;
    try{ simpan = localStorage.getItem(kunciAkun()); }catch(e){}
    if(akunValid(simpan)) return simpan;
    return (window.AK && AK[0]) ? AK[0].id : '';
  }
  window.ingatAkun = function(id){
    if(!akunValid(id)) return;
    try{ localStorage.setItem(kunciAkun(), id); }catch(e){}
  };

  /* ---------- bawaan form Tambah Transaksi ---------- */
  var _blankAdd = window.blankAdd;
  if(typeof _blankAdd==='function'){
    window.blankAdd = function(){
      var a = _blankAdd.apply(this, arguments);
      var d = akunDefault();
      if(d) a.akunId = d;
      return a;
    };
  }

  /* ---------- bawaan pemindai struk ---------- */
  var _blankStruk = window.blankStruk;
  if(typeof _blankStruk==='function'){
    window.blankStruk = function(){
      var s = _blankStruk.apply(this, arguments);
      var d = akunDefault();
      if(d) s.akunId = d;
      return s;
    };
  }

  /* ---------- catat setiap kali pilihan berubah ----------
     Kedua <select> memanggil renderAdd/renderStruk sesudah mengubah nilai,
     jadi cukup dicatat di sini tanpa mengubah markup mana pun. */
  var _renderAdd = window.renderAdd;
  if(typeof _renderAdd==='function'){
    window.renderAdd = function(){
      if(window.addState) ingatAkun(addState.akunId);
      return _renderAdd.apply(this, arguments);
    };
  }
  var _renderStruk = window.renderStruk;
  if(typeof _renderStruk==='function'){
    window.renderStruk = function(){
      if(window.strukState) ingatAkun(strukState.akunId);
      return _renderStruk.apply(this, arguments);
    };
  }

  /* ---------- wariskan pilihan saat beralih ke pemindai struk ---------- */
  var _mulaiStruk = window.mulaiStrukDariDataURL;
  if(typeof _mulaiStruk==='function'){
    window.mulaiStrukDariDataURL = function(dataUrl){
      var pilih   = (window.addState && addState.akunId) || akunDefault();
      var hutang  = !!(window.addState && addState.jadiHutang);
      var piutang = !!(window.addState && addState.jadiPiutang);
      var pihak   = (window.addState && addState.piutangPihak) || '';

      var hasil = _mulaiStruk.call(this, dataUrl);

      /* strukState direset di dalam img.onload yang asinkron,
         jadi pilihan ditanam ulang begitu gambar selesai dimuat */
      var coba=0, t=setInterval(function(){
        coba++;
        if(window.strukState && strukState.img){
          if(akunValid(pilih)){
            strukState.akunId      = pilih;
            strukState.jadiHutang  = hutang;
            strukState.jadiPiutang = piutang;
            strukState.piutangPihak= pihak;
            ingatAkun(pilih);
            if(typeof renderStruk==='function' && document.getElementById('scanCanvas')) renderStruk();
          }
          clearInterval(t);
        }
        if(coba>40) clearInterval(t);   /* menyerah setelah ~4 detik */
      }, 100);

      return hasil;
    };
  }

})();
</script>

<script>
/* ===== PATCH KATEGORI DWIBAHASA v2 (menggantikan v1) =====
   Patch bahasa menerjemahkan teks <option>, sedangkan option kategori dibuat
   tanpa atribut value, sehingga nilai select ikut berubah menjadi teks Inggris.
   Akibatnya pilihan tidak pernah cocok (tampilan lompat ke pilihan pertama)
   dan kategori tersimpan dalam bahasa Inggris.
   Patch ini menanamkan value kanonik (Indonesia) ke tiap option, sehingga
   terjemahan hanya mengubah label yang terlihat, bukan nilai yang disimpan. */
(function(){

  var LS_KAT='kk_kat_barang_terakhir';
  function katTerakhir(){ try{ return localStorage.getItem(LS_KAT)||''; }catch(e){ return ''; } }
  function simpanKat(v){ try{ if(v) localStorage.setItem(LS_KAT,v); }catch(e){} }

  function daftarKeluar(){ return window.KAT_PENGELUARAN||[]; }
  function daftarMasuk(){  return window.KAT_PEMASUKAN||[]; }

  /* tanam value kanonik ke option kategori (bukan select penampung saldo,
     yang optionnya sudah punya value berisi id akun) */
  function tanamValue(sel){
    if(!sel || !sel.options.length) return;
    var o0=sel.options[0];
    if(o0.getAttribute('value')!==null && o0.getAttribute('value')!==o0.textContent.trim()) return;
    var ref=null;
    if(sel.options.length===daftarKeluar().length) ref=daftarKeluar();
    else if(sel.options.length===daftarMasuk().length) ref=daftarMasuk();
    if(!ref) return;
    Array.prototype.forEach.call(sel.options, function(o,i){ o.value=ref[i]; });
  }

  function pasangNilai(sel, nilai){
    if(!sel || !nilai) return;
    var cocok=-1;
    Array.prototype.forEach.call(sel.options, function(o,i){
      if(cocok<0 && (o.value===nilai || o.textContent.trim()===nilai)) cocok=i;
    });
    if(cocok<0){
      var o=document.createElement('option');
      o.value=nilai; o.textContent=nilai;
      sel.appendChild(o);
      cocok=sel.options.length-1;
    }
    sel.selectedIndex=cocok;
  }

  function bereskan(daftar){
    document.querySelectorAll('select').forEach(tanamValue);
    if(!daftar || !daftar.length) return;
    var sel=document.querySelectorAll('select.psel');
    for(var i=0; i<sel.length && i<daftar.length; i++){
      if(daftar[i] && daftar[i].kategori) pasangNilai(sel[i], daftar[i].kategori);
    }
  }

  var _renderAdd=window.renderAdd;
  if(typeof _renderAdd==='function'){
    window.renderAdd=function(){
      var h=_renderAdd.apply(this, arguments);
      try{
        bereskan(window.addState ? addState.items : null);
        if(window.addState && addState.kategori){
          document.querySelectorAll('select').forEach(function(s){
            if(s.classList.contains('psel')) return;
            var ref=(addState.tipe==='pengeluaran'?daftarKeluar():daftarMasuk());
            if(s.options.length===ref.length) pasangNilai(s, addState.kategori);
          });
        }
      }catch(e){}
      return h;
    };
  }

  var _renderStruk=window.renderStruk;
  if(typeof _renderStruk==='function'){
    window.renderStruk=function(){
      var h=_renderStruk.apply(this, arguments);
      try{ bereskan(window.strukState ? strukState.pending : null); }catch(e){}
      return h;
    };
  }

  var _bukaItem=window.bukaItemManual;
  if(typeof _bukaItem==='function'){
    window.bukaItemManual=function(){
      var h=_bukaItem.apply(this, arguments);
      try{
        var sel=document.getElementById('miKat');
        var ket=(document.getElementById('miKet').value||'').trim();
        if(sel){
          tanamValue(sel);
          if(!ket){
            var t=katTerakhir(); if(t) pasangNilai(sel, t);
          } else {
            var sumber=((window.addState&&addState.items)||[])
              .concat((window.strukState&&strukState.pending)||[]);
            for(var i=0;i<sumber.length;i++){
              if(sumber[i] && sumber[i].keterangan===ket && sumber[i].kategori){
                pasangNilai(sel, sumber[i].kategori); break;
              }
            }
          }
        }
      }catch(e){}
      return h;
    };
  }

  var _simpanItem=window.simpanItemManual;
  if(typeof _simpanItem==='function'){
    window.simpanItemManual=function(){
      try{
        var sel=document.getElementById('miKat');
        tanamValue(sel);
        if(sel && sel.selectedIndex>=0) simpanKat(sel.options[sel.selectedIndex].value);
      }catch(e){}
      return _simpanItem.apply(this, arguments);
    };
  }

})();
</script>

<!-- =====================================================================
     PATCH KATEGORI ID v1  (KeuanganKu)
     Tempel PERSIS SEBELUM </body> di FILE HTML UTAMA, PALING AKHIR
     (setelah PATCH KATEGORI KUSTOM, PATCH BAHASA, PATCH MATA UANG,
     PATCH KATEGORI DWIBAHASA, dan PATCH ANGGARAN).

     MASALAH YANG DIPERBAIKI
     Kategori selama ini disimpan sebagai TEKS. Bila pengguna mencatat
     saat bahasa Inggris, tersimpan "Food & Drinks"; saat bahasa Indonesia
     tersimpan "Makan & Minum". Di Google Sheet keduanya jadi dua kategori
     berbeda, padahal sama.

     SOLUSI
     Kategori diikat ke ID stabil (mis. k_makan). Label Indonesia/Inggris
     hanya tampilan dari ID yang sama.

     CARA KERJA (tanpa membongkar 15 titik penulisan)
     - Semua penulisan transaksi bermuara ke idbPut/idbBulkPut. Kedua
       fungsi itu dibungkus: setiap record otomatis mendapat kategoriId,
       dan field kategori dinormalkan ke label Indonesia kanonik.
     - sortTX() dibungkus: TX di memori dinormalkan saat dimuat, sehingga
       laporan/daftar/anggaran otomatis MENYATUKAN data lama berbahasa
       Inggris dengan yang Indonesia — tanpa mengubah data lama di Sheet.
     - kirimNoCors dibungkus: payload 'sync' menyertakan kategoriId
       sehingga kolom baru di Google Sheet ikut terisi.

     DATA LAMA
     Sesuai pilihan: data lama di Sheet DIBIARKAN apa adanya. Hanya
     tampilan yang menyatu, dan hanya data baru (atau data lama yang
     kebetulan dicadangkan ulang) yang tersimpan dalam bentuk kanonik.

     BACKEND: tambahkan kolom kategoriId (lihat TAMBAHAN_GAS_KATEGORI_ID.txt)
====================================================================== -->
<script>
(function(){
  "use strict";

  /* ============ 1) REGISTRI KATEGORI ============
     id     : identitas stabil, tidak pernah berubah
     tipe   : 'pengeluaran' | 'pemasukan'
     id_lbl : label Bahasa Indonesia (kanonik untuk penyimpanan)
     en_lbl : label Bahasa Inggris (tampilan saja)
     Pasangan label mengikuti kamus terjemahan yang sudah dipakai aplikasi. */
  var REG = [
    /* --- pengeluaran bawaan --- */
    {id:'k_belanja',    tipe:'pengeluaran', id_lbl:'Belanja',              en_lbl:'Shopping'},
    {id:'k_makan',      tipe:'pengeluaran', id_lbl:'Makan & Minum',        en_lbl:'Food & Drinks'},
    {id:'k_transport',  tipe:'pengeluaran', id_lbl:'Transportasi',         en_lbl:'Transportation'},
    {id:'k_listrik',    tipe:'pengeluaran', id_lbl:'Listrik & Air',        en_lbl:'Electricity & Water'},
    {id:'k_pulsa',      tipe:'pengeluaran', id_lbl:'Pulsa & Internet',     en_lbl:'Phone & Internet'},
    {id:'k_kesehatan',  tipe:'pengeluaran', id_lbl:'Kesehatan',            en_lbl:'Health'},
    {id:'k_pendidikan', tipe:'pengeluaran', id_lbl:'Pendidikan',           en_lbl:'Education'},
    {id:'k_hiburan',    tipe:'pengeluaran', id_lbl:'Hiburan',              en_lbl:'Entertainment'},
    {id:'k_lainnya',    tipe:'pengeluaran', id_lbl:'Lainnya',              en_lbl:'Others'},
    /* --- kategori tambahan yang punya pasangan terjemahan di kamus --- */
    {id:'k_pakaian',    tipe:'pengeluaran', id_lbl:'Pakaian',              en_lbl:'Clothing'},
    {id:'k_perkakas',   tipe:'pengeluaran', id_lbl:'Peralatan & Perkakas', en_lbl:'Tools & Equipment'},
    {id:'k_sosial',     tipe:'pengeluaran', id_lbl:'Dana Sosial',          en_lbl:'Social Fund'},
    /* --- pemasukan bawaan --- */
    {id:'k_gaji',       tipe:'pemasukan',   id_lbl:'Gaji',                 en_lbl:'Salary'},
    {id:'k_bonus',      tipe:'pemasukan',   id_lbl:'Bonus',                en_lbl:'Bonus'},
    {id:'k_usaha',      tipe:'pemasukan',   id_lbl:'Usaha',                en_lbl:'Business'},
    {id:'k_hadiah',     tipe:'pemasukan',   id_lbl:'Hadiah',               en_lbl:'Gift'},
    {id:'k_lainnya_in', tipe:'pemasukan',   id_lbl:'Lainnya',              en_lbl:'Others'}
  ];

  /* indeks pencarian cepat: teks (apa pun bahasanya) -> entri */
  var byId={}, byTeks={};
  function daftarkan(e){
    byId[e.id]=e;
    byTeks[e.tipe+'|'+norm(e.id_lbl)]=e;
    byTeks[e.tipe+'|'+norm(e.en_lbl)]=e;
  }
  function norm(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
  REG.forEach(daftarkan);

  /* kategori tambahan bikinan pengguna: id diturunkan dari namanya agar stabil */
  function idKustom(teks){
    return 'k_c_'+norm(teks).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40);
  }

  /* ============ 2) API PUBLIK ============ */

  /* teks apa pun (ID/EN) + tipe  ->  id kategori */
  function katId(teks, tipe){
    if(!teks) return '';
    var t=String(teks).trim();
    if(byId[t]) return t;                       /* sudah berupa id */
    var e=byTeks[(tipe||'pengeluaran')+'|'+norm(t)];
    if(e) return e.id;
    /* coba tipe lain (jaga-jaga bila tipe tak dikirim / salah) */
    var lain=(tipe==='pemasukan')?'pengeluaran':'pemasukan';
    e=byTeks[lain+'|'+norm(t)];
    if(e) return e.id;
    return idKustom(t);                          /* kategori tambahan pengguna */
  }
  /* id -> label sesuai bahasa aktif (untuk tampilan) */
  function katLabel(id, teksCadangan){
    var e=byId[id];
    if(e) return (window.LANG==='en') ? e.en_lbl : e.id_lbl;
    return teksCadangan || teksKustomDari(id) || '';
  }
  /* id -> label Indonesia kanonik (untuk penyimpanan) */
  function katKanonik(id, teksCadangan){
    var e=byId[id];
    if(e) return e.id_lbl;
    return teksCadangan || teksKustomDari(id) || '';
  }
  /* untuk id kustom, cari teks aslinya dari daftar kategori yang aktif */
  function teksKustomDari(id){
    var semua=[].concat(window.KAT_PENGELUARAN||[], window.KAT_PEMASUKAN||[]);
    for(var i=0;i<semua.length;i++){ if(idKustom(semua[i])===id) return semua[i]; }
    return '';
  }

  window.katId=katId;
  window.katLabel=katLabel;
  window.katKanonik=katKanonik;

  /* ============ 3) NORMALISASI RECORD ============
     Setiap record transaksi dipastikan punya:
     - kategoriId : id stabil
     - kategori   : label Indonesia kanonik (agar Sheet mudah dibaca)   */
  function normalkanRecord(r){
    if(!r || typeof r!=='object') return r;
    if(!('kategori' in r) && !('kategoriId' in r)) return r;   /* bukan record transaksi */
    var tipe=r.tipe||'pengeluaran';
    var id=r.kategoriId || katId(r.kategori, tipe);
    if(!id) return r;
    r.kategoriId=id;
    var kanonik=katKanonik(id, r.kategori);
    if(kanonik) r.kategori=kanonik;
    return r;
  }
  window.normalkanKategoriRecord=normalkanRecord;

  /* ============ 4) HOOK PENULISAN (idbPut / idbBulkPut) ============
     Semua jalur simpan transaksi (manual, struk, OCR, multi-barang,
     diskon) bermuara ke sini, jadi cukup satu tempat. */
  (function(){
    var _put=window.idbPut;
    if(typeof _put==='function' && !_put.__katHooked){
      window.idbPut=function(item){ try{ normalkanRecord(item); }catch(e){} return _put.call(this, item); };
      window.idbPut.__katHooked=true;
    }
    var _bulk=window.idbBulkPut;
    if(typeof _bulk==='function' && !_bulk.__katHooked){
      window.idbBulkPut=function(items){
        try{ (items||[]).forEach(normalkanRecord); }catch(e){}
        return _bulk.call(this, items);
      };
      window.idbBulkPut.__katHooked=true;
    }
  })();

  /* ============ 5) HOOK PEMUATAN (sortTX) ============
     Menyatukan tampilan data lama: record berbahasa Inggris dinormalkan
     di MEMORI saja, sehingga laporan/daftar/anggaran melihatnya sebagai
     satu kategori. Data di Google Sheet tidak diubah. */
  (function(){
    var _sort=window.sortTX;
    if(typeof _sort==='function' && !_sort.__katHooked){
      window.sortTX=function(){
        try{ (window.TX||[]).forEach(normalkanRecord); }catch(e){}
        return _sort.apply(this, arguments);
      };
      window.sortTX.__katHooked=true;
    }
  })();

  /* ============ 6) HOOK PENGIRIMAN KE GAS ============
     Menyertakan kategoriId pada payload sinkron transaksi. */
  (function(){
    var _kirim=window.kirimNoCors;
    if(typeof _kirim==='function' && !_kirim.__katHooked){
      window.kirimNoCors=function(action, extra){
        try{
          if(action==='sync' && extra && Array.isArray(extra.items)){
            extra.items.forEach(function(it){
              if(it && (it.kategori || it.kategoriId)){
                var id=it.kategoriId || katId(it.kategori, it.tipe);
                it.kategoriId=id;
                var kan=katKanonik(id, it.kategori);
                if(kan) it.kategori=kan;
              }
            });
          }
        }catch(e){}
        return _kirim.call(this, action, extra);
      };
      window.kirimNoCors.__katHooked=true;
    }
  })();

  /* ============ 7) HOOK PENARIKAN DARI GAS ============
     Record dari Sheet ikut dinormalkan saat masuk ke IndexedDB
     (lewat idbBulkPut yang sudah dibungkus di atas), jadi tidak perlu
     penanganan khusus. Bagian ini hanya memastikan TX di memori ikut
     rapi setelah pemulihan. */
  (function(){
    var _tarik=window.tarikDariSheet;
    if(typeof _tarik==='function' && !_tarik.__katHooked){
      window.tarikDariSheet=async function(){
        var r=await _tarik.apply(this, arguments);
        try{ (window.TX||[]).forEach(normalkanRecord); if(typeof render==='function') render(); }catch(e){}
        return r;
      };
      window.tarikDariSheet.__katHooked=true;
    }
  })();

  /* ============ 8) ANGGARAN IKUT MEMAKAI ID ============
     Record anggaran diberi kategoriId agar cocok lintas bahasa. */
  (function(){
    if(!window.AG) return;
    try{
      (window.AG||[]).forEach(function(r){
        if(r && r.kategori && !r.kategoriId){
          r.kategoriId=katId(r.kategori, r.tipe);
          var kan=katKanonik(r.kategoriId, r.kategori);
          if(kan) r.kategori=kan;
        }
      });
    }catch(e){}
  })();

  /* ============ 9) NORMALISASI SAAT PATCH DIMUAT ============ */
  (function(){
    var coba=0;
    (function tunggu(){
      coba++;
      if(window.TX && window.TX.length!==undefined){
        try{
          TX.forEach(normalkanRecord);
          if(typeof render==='function' && typeof view!=='undefined' && view) render();
        }catch(e){}
      } else if(coba<80){ setTimeout(tunggu, 100); }
    })();
  })();

})();
</script>

<!-- =====================================================================
     PATCH ANGGARAN FINAL (KeuanganKu) — SATU BLOK MANDIRI
     Menggantikan SEMUA patch anggaran sebelumnya. HAPUS blok-blok berikut
     dari file (masing-masing dari "<!-- ===" pembuka sampai "</script>"
     penutupnya):
       1. PATCH ANGGARAN v4
       2. PATCH ANGGARAN FIX v7
       3. PATCH ANGGARAN SINKRON v8
       4. PATCH ANGGARAN HAPUS v9
       5. PATCH ANGGARAN v11.1 (kalkulator & desimal)
       6. PATCH ANGGARAN PROGRES TUNGGAL v12
     JANGAN hapus "PATCH KATEGORI ID v1" (bukan bagian anggaran).
     Lalu tempel blok ini PALING AKHIR sebelum </body>.

     PRASYARAT (sudah terpasang dari langkah sebelumnya):
     - openDB() memakai versi 5 dan membuat store 'anggaran'
     - Backend GAS memiliki listAnggaran / syncAnggaran / deleteAnggaran

     ISI LENGKAP
     - Input anggaran PEMASUKAN: rupiah per kategori, total otomatis.
     - Input anggaran PENGELUARAN: persen per kategori (mendukung desimal,
       koma/titik), target rupiah = persen x total pemasukan, kalkulator
       bawaan aplikasi di tiap baris (hasil rupiah -> persen otomatis).
     - Basis bulanan/mingguan, navigasi periode, salin periode sebelumnya.
     - Ikhtisar dengan status kirim per baris (merah=belum, hijau=terkirim).
     - Hapus per periode: langsung terhapus di IndexedDB DAN Google Sheet
       (dengan verifikasi; offline masuk antrean, terkirim saat Cadangkan).
     - Laporan: kartu "Realisasi vs Anggaran" + sub-baris tiap kategori di
       daftar per kategori, angka menghormati tombol mata (fmtRp).
     - Pencadangan: hitungan "pada rentang" & "belum tercadang" menyertakan
       anggaran; badge ikon Pencadangan ikut menghitung; pengiriman lewat
       tombol Cadangkan (hapus dulu, lalu data, lalu verifikasi); penarikan
       lewat tombol Pulihkan (hanya menambah, tak pernah menghapus di Sheet);
       progres SATU modal untuk seluruh proses.
     - Tombol masuk "Buat Anggaran" di bottom sheet Tambah Transaksi.
     - Dwibahasa penuh dan header menetap tanpa garis bawah.
====================================================================== -->
<script>
(function(){
  "use strict";
  if(window.__PATCH_ANGGARAN_FINAL) return;   /* cegah pemasangan ganda */
  window.__PATCH_ANGGARAN_FINAL=true;

  /* ================= UTIL DASAR ================= */
  function La(id,en){ return (window.LANG==='en') ? en : id; }
  function u(){ return (typeof emailUser==='function' && emailUser()) || ''; }
  function samaUser(a,b){ return String(a||'').trim().toLowerCase()===String(b||'').trim().toLowerCase(); }
  function tersambung(){ return !!(typeof getGasUrl==='function' && getGasUrl()); }
  function pad2(n){ return (n<10?'0':'')+n; }
  function jeda(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
  function uangS(n){ return (typeof fmtRp==='function') ? fmtRp(n) : rp(n); }  /* hormati tombol mata */

  var HIJAU='#1D9E75', AMBER='#EF9F27', MERAH='#E24B4A';

  /* ================= GAYA ================= */
  (function(){
    if(document.getElementById('agf-style')) return;
    var st=document.createElement('style');
    st.id='agf-style';
    st.textContent=
      '.ag-fhead{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);'+
        'z-index:30;display:flex;align-items:center;gap:10px;box-sizing:border-box;'+
        'padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;background:var(--page)}'+
      '.ag-fhead .bk{background:none;border:none;font-size:22px;color:var(--tx);line-height:1;padding:4px;cursor:pointer}'+
      '.ag-fhead .ti{font-size:17px;font-weight:700;color:var(--tx)}'+
      '.scroll.has-aghead{padding-top:calc(60px + env(safe-area-inset-top,0px))}'+
      '.ag-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:2px 10px;margin-bottom:14px}'+
      '.ag-row .nm{grid-column:1;grid-row:1;font-size:14px;color:var(--tx);line-height:1.3;word-break:break-word}'+
      '.ag-row .ct{grid-column:2;grid-row:1;display:flex;align-items:center;gap:6px}'+
      '.ag-row .ct input{width:72px;min-width:0;text-align:right;margin:0;padding:9px 10px;box-sizing:border-box}'+
      '.ag-row .ct .pc{color:var(--tx3);font-size:13px}'+
      '.ag-row .rpv{grid-column:1 / -1;grid-row:2;text-align:right;font-size:11.5px;color:var(--tx3)}'+
      '.ag-kalk{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:36px;height:36px;'+
        'padding:0;border:1px solid var(--line);border-radius:10px;background:transparent;color:var(--tx2);cursor:pointer}'+
      '.ag-rowin{display:flex;align-items:center;gap:10px;margin-bottom:10px}'+
      '.ag-rowin .nm{flex:1 1 auto;min-width:0;font-size:14px;color:var(--tx);'+
        'overflow:hidden;text-overflow:ellipsis;white-space:nowrap}'+
      '.ag-rowin .nominal-wrap{flex:0 0 auto;margin:0}'+
      '.ag-rowin .nominal-wrap input{width:13ch;min-width:0;box-sizing:border-box;text-align:right}';
    document.head.appendChild(st);
  })();
  function setAgHead(aktif){
    try{ var s=(typeof S==='function')?S():document.getElementById('scroll');
      if(s) s.classList.toggle('has-aghead', !!aktif); }catch(e){}
  }

  var IKON_KALK='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" '+
    'stroke-width="1.8" stroke-linecap="round"><rect x="5" y="3" width="14" height="18" rx="2"/>'+
    '<path d="M8.5 7h7"/><path d="M8.5 11.5h.01M12 11.5h.01M15.5 11.5h.01M8.5 14.5h.01M12 14.5h.01'+
    'M15.5 14.5h.01M8.5 17.5h.01M12 17.5h.01M15.5 17.5h.01"/></svg>';

  /* ================= INDEXEDDB ================= */
  function adaStore(){
    try{ return !!(typeof DB!=='undefined' && DB && DB.objectStoreNames.contains('anggaran')); }catch(e){ return false; }
  }
  function pastikanStore(){
    return new Promise(function(res){
      if(adaStore()){ res(true); return; }
      try{
        if(!window.DB){ res(false); return; }
        var v=DB.version; DB.close();
        var req=indexedDB.open('keuanganku', Math.max(5, v+1));
        req.onupgradeneeded=function(e){
          var db=e.target.result;
          if(!db.objectStoreNames.contains('anggaran')) db.createObjectStore('anggaran',{keyPath:'id'});
        };
        req.onsuccess=function(e){ window.DB=e.target.result; res(true); };
        req.onerror=function(){ res(false); };
      }catch(err){ res(false); }
    });
  }
  function agTulis(puts, dels){
    return new Promise(function(res){
      if(!adaStore()){ res(); return; }
      try{
        var t=DB.transaction('anggaran','readwrite'), st=t.objectStore('anggaran');
        (puts||[]).forEach(function(r){ st.put(r); });
        (dels||[]).forEach(function(id){ st.delete(id); });
        t.oncomplete=function(){ res(); }; t.onerror=function(){ res(); };
      }catch(e){ res(); }
    });
  }
  window.AG=window.AG||[];
  async function muatAnggaran(){
    if(!adaStore()){ window.AG=[]; return; }
    try{
      var all=await new Promise(function(res,rej){
        var r=DB.transaction('anggaran','readonly').objectStore('anggaran').getAll();
        r.onsuccess=function(){ res(r.result||[]); }; r.onerror=function(){ rej(r.error); };
      });
      window.AG=all.filter(function(a){ return samaUser(a.user, u()); });
    }catch(e){ window.AG=[]; }
  }
  window.muatAnggaran=muatAnggaran;

  /* ================= ANTREAN HAPUS ================= */
  var LSQ='kk_delqueue_anggaran';
  function qGet(){ try{ var a=JSON.parse(localStorage.getItem(LSQ)||'[]'); return Array.isArray(a)?a.map(String):[]; }catch(e){ return []; } }
  function qSet(a){ try{ localStorage.setItem(LSQ, JSON.stringify(a||[])); }catch(e){} }
  function qAdd(ids){ var q=qGet(); (ids||[]).forEach(function(id){ if(q.indexOf(String(id))<0) q.push(String(id)); }); qSet(q); }
  function qRemove(ids){ var s={}; (ids||[]).forEach(function(id){ s[String(id)]=1; }); qSet(qGet().filter(function(id){ return !s[id]; })); }

  /* ================= MODEL & PERIODE ================= */
  function idAnggaran(tipe,basis,periode,kategori){ return tipe+'|'+basis+'|'+periode+'|'+kategori; }
  function bulanIni(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
  function seninDari(x){
    var d=new Date(x); d.setHours(0,0,0,0);
    var h=d.getDay(); d.setDate(d.getDate()-(h===0?6:h-1));
    return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  }
  var NB_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  var NB_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  function labelPeriode(basis,periode){
    if(basis==='minggu'){
      var a=new Date(periode+'T00:00:00'), b=new Date(a); b.setDate(a.getDate()+6);
      function f(d){ return pad2(d.getDate())+'/'+pad2(d.getMonth()+1); }
      return La('Minggu ','Week of ')+f(a)+' - '+f(b)+' '+a.getFullYear();
    }
    var p=periode.split('-');
    return (window.LANG==='en'?NB_EN:NB_ID)[(+p[1])-1]+' '+p[0];
  }
  function geserPeriode(basis,periode,arah){
    if(basis==='minggu'){ var d=new Date(periode+'T00:00:00'); d.setDate(d.getDate()+7*arah); return seninDari(d); }
    var p=periode.split('-'); var b=new Date(+p[0], (+p[1])-1+arah, 1);
    return b.getFullYear()+'-'+pad2(b.getMonth()+1);
  }
  function tglDalamPeriode(tgl,basis,periode){
    if(!tgl) return false;
    if(basis==='minggu'){
      var bo=new Date(periode+'T00:00:00'); bo.setDate(bo.getDate()+6);
      var b=bo.getFullYear()+'-'+pad2(bo.getMonth()+1)+'-'+pad2(bo.getDate());
      return tgl>=periode && tgl<=b;
    }
    return String(tgl).slice(0,7)===periode;
  }
  function ambil(tipe,basis,periode){
    return (window.AG||[]).filter(function(r){ return r.tipe===tipe && r.basis===basis && r.periode===periode; });
  }
  function totalPemasukan(basis,periode){
    return ambil('pemasukan',basis,periode).reduce(function(s,r){ return s+(Number(r.nilai)||0); },0);
  }
  function targetKeluarKat(kategori,basis,periode){
    var rec=ambil('pengeluaran',basis,periode).filter(function(r){ return r.kategori===kategori; })[0];
    if(!rec) return 0;
    return Math.round(totalPemasukan(basis,periode)*(Number(rec.persen)||0)/100);
  }
  function realisasi(tipe,kategori,basis,periode){
    return (window.TX||[]).filter(function(t){
      return t.tipe===tipe && (kategori===null || t.kategori===kategori) && tglDalamPeriode(t.tanggal,basis,periode);
    }).reduce(function(s,t){ return s+(Number(t.nominal)||0); },0);
  }
  function agBelum(){ return (window.AG||[]).filter(function(r){ return !r.terkirim; }); }

  /* ================= WARNA & KOMPONEN KECIL ================= */
  function wKeluar(p){ return p>100?MERAH:(p>=80?AMBER:HIJAU); }
  function wMasuk(p){ return p>=100?HIJAU:(p>=60?AMBER:MERAH); }
  function bar(p,w,h){
    var x=Math.max(0,Math.min(100,p));
    return '<div style="height:'+(h||8)+'px;background:var(--page,#eee);border-radius:99px;overflow:hidden">'+
      '<div style="width:'+x+'%;height:100%;background:'+w+';border-radius:99px"></div></div>';
  }
  function dotKirim(r){
    var t=!!(r&&r.terkirim), c=t?HIJAU:MERAH;
    return '<span title="'+(t?La('Tersimpan di cloud','Saved to cloud'):La('Belum dikirim ke cloud','Not sent to cloud yet'))+'" '+
      'style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';margin-right:6px;vertical-align:middle;flex:0 0 auto"></span>';
  }
  function labelKirim(r){
    var t=!!(r&&r.terkirim), c=t?HIJAU:MERAH;
    return '<span style="font-size:10.5px;color:'+c+';font-weight:600">'+(t?La('Terkirim','Sent'):La('Belum dikirim','Not sent'))+'</span>';
  }

  /* ================= PERSEN DESIMAL ================= */
  function keAngka(teks){
    var v=parseFloat(String(teks||'').replace(/[^0-9.,]/g,'').replace(',', '.'));
    return isFinite(v) ? Math.max(0, Math.min(100, Math.round(v*100)/100)) : 0;
  }
  function tampilAngka(v){
    if(!isFinite(v)||v===0) return '';
    var s=(Math.round(v*100)/100).toString();
    return (window.LANG==='en') ? s : s.replace('.', ',');
  }

  /* ================= STATE VIEW ================= */
  var vTipe='pengeluaran', vBasis='bulan', vPeriode=bulanIni();
  var eNilai={}, ePersen={};       /* state form */
  function defaultPeriode(){ return (vBasis==='minggu') ? seninDari(new Date()) : bulanIni(); }

  window.bukaAnggaran=function(){ vPeriode=defaultPeriode(); goView('anggaran'); };
  window.agSetTipe=function(t){ vTipe=t; render(); };
  window.agSetBasis=function(b){ vBasis=b; vPeriode=defaultPeriode(); render(); };
  window.agGeser=function(arah){ vPeriode=geserPeriode(vBasis,vPeriode,arah); render(); };

  /* ================= VIEW: IKHTISAR ================= */
  function headerA(judul,balik){
    return '<div class="ag-fhead"><button class="bk" onclick="goView(\''+balik+'\')">&#8592;</button>'+
      '<div class="ti">'+judul+'</div></div>';
  }
  function segTipe(){
    return '<div class="tipe2" style="margin-bottom:12px">'+
      '<button class="peng '+(vTipe==='pengeluaran'?'on':'')+'" onclick="agSetTipe(\'pengeluaran\')">'+La('Pengeluaran','Expense')+'</button>'+
      '<button class="pem '+(vTipe==='pemasukan'?'on':'')+'" onclick="agSetTipe(\'pemasukan\')">'+La('Pemasukan','Income')+'</button></div>';
  }
  function segBasis(){
    function b(k,l){ return '<button class="chip '+(vBasis===k?'on':'')+'" onclick="agSetBasis(\''+k+'\')">'+l+'</button>'; }
    return '<div class="chips" style="margin-bottom:12px">'+b('bulan',La('Bulanan','Monthly'))+b('minggu',La('Mingguan','Weekly'))+'</div>';
  }
  function navPeriode(){
    return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px">'+
      '<button class="chip" style="padding:6px 12px" onclick="agGeser(-1)">&#8592;</button>'+
      '<div style="flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--tx)">'+esc(labelPeriode(vBasis,vPeriode))+'</div>'+
      '<button class="chip" style="padding:6px 12px" onclick="agGeser(1)">&#8594;</button></div>';
  }
  function kartuRingkas(target,pakai,tipe){
    var sisa=target-pakai;
    var wS = tipe==='pengeluaran' ? (sisa<0?MERAH:'var(--tx)') : (sisa>0?AMBER:HIJAU);
    function kt(l,v,c){ return '<div style="flex:1;background:var(--card);border-radius:12px;padding:12px">'+
      '<div style="font-size:11px;color:var(--tx3)">'+l+'</div>'+
      '<div style="font-size:15px;font-weight:600;color:'+(c||'var(--tx)')+'">'+uangS(v)+'</div></div>'; }
    return '<div style="display:flex;gap:10px;margin-bottom:14px">'+
      kt(La('Target','Target'),target)+kt(La('Realisasi','Actual'),pakai)+
      kt(tipe==='pengeluaran'?La('Sisa','Left'):La('Selisih','Diff'),Math.abs(sisa),wS)+'</div>';
  }

  function renderAnggaran(){
    var isi='', totalPem=totalPemasukan(vBasis,vPeriode);

    if(vTipe==='pemasukan'){
      var recs=ambil('pemasukan',vBasis,vPeriode);
      var pakai=realisasi('pemasukan',null,vBasis,vPeriode);
      isi+=kartuRingkas(totalPem,pakai,'pemasukan');
      var pT=totalPem>0?Math.round(pakai/totalPem*100):0;
      isi+='<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--tx2);margin-bottom:5px">'+
        '<span>'+La('Pencapaian total','Total achieved')+'</span><span style="color:'+wMasuk(pT)+'">'+pT+'%</span></div>'+bar(pT,wMasuk(pT))+'</div>';
      if(!recs.length){
        isi+='<div class="empty">'+La('Belum ada target pemasukan untuk periode ini.','No income target set for this period.')+'</div>';
      } else {
        isi+='<div class="sec-head"><div class="t">'+La('Target per kategori','Target by category')+'</div></div>';
        recs.sort(function(a,b){ return (+b.nilai)-(+a.nilai); }).forEach(function(r){
          var t=Number(r.nilai)||0, pk=realisasi('pemasukan',r.kategori,vBasis,vPeriode);
          var pr=t>0?Math.round(pk/t*100):0, w=wMasuk(pr);
          isi+='<div style="margin-bottom:14px">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--tx);margin-bottom:5px">'+
              '<span style="display:flex;align-items:center">'+dotKirim(r)+esc(r.kategori)+'</span>'+
              '<span style="color:var(--tx2)">'+uangS(pk)+' / '+uangS(t)+'</span></div>'+
            bar(pr,w)+
            '<div style="display:flex;justify-content:space-between;margin-top:4px">'+
              '<span style="font-size:11px;color:'+w+'">'+pr+'%</span>'+labelKirim(r)+'</div></div>';
        });
      }
    } else {
      var recs2=ambil('pengeluaran',vBasis,vPeriode);
      var totTarget=recs2.reduce(function(s,r){ return s+targetKeluarKat(r.kategori,vBasis,vPeriode); },0);
      var totPakai=recs2.reduce(function(s,r){ return s+realisasi('pengeluaran',r.kategori,vBasis,vPeriode); },0);
      isi+=kartuRingkas(totTarget,totPakai,'pengeluaran');
      if(totalPem<=0){
        isi+='<div class="empty" style="line-height:1.5">'+La('Tetapkan target pemasukan dahulu, karena anggaran pengeluaran dihitung dari persentase total pemasukan.','Set the income target first, since expense budgets are computed as a percentage of total income.')+'</div>';
      } else if(!recs2.length){
        isi+='<div class="empty">'+La('Belum ada alokasi pengeluaran untuk periode ini.','No expense allocation set for this period.')+'</div>';
      } else {
        isi+='<div class="sec-head"><div class="t">'+La('Alokasi per kategori','Allocation by category')+'</div></div>';
        recs2.sort(function(a,b){ return (+b.persen)-(+a.persen); }).forEach(function(r){
          var target=targetKeluarKat(r.kategori,vBasis,vPeriode);
          var pakai2=realisasi('pengeluaran',r.kategori,vBasis,vPeriode);
          var pr=target>0?Math.round(pakai2/target*100):0, w=wKeluar(pr);
          isi+='<div style="margin-bottom:14px">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--tx);margin-bottom:5px">'+
              '<span style="display:flex;align-items:center">'+dotKirim(r)+esc(r.kategori)+
                ' <span style="color:var(--tx3);font-size:12px;margin-left:4px">('+tampilAngka(Number(r.persen)||0)+'%)</span></span>'+
              '<span style="color:var(--tx2)">'+uangS(pakai2)+' / '+uangS(target)+'</span></div>'+
            bar(pr,w)+
            '<div style="display:flex;justify-content:space-between;margin-top:4px">'+
              '<span style="font-size:11px;color:'+w+'">'+pr+'%'+(pr>100?(' &middot; '+La('lewat ','over ')+uangS(pakai2-target)):'')+'</span>'+
              labelKirim(r)+'</div></div>';
        });
      }
    }

    S().innerHTML=headerA(La('Anggaran','Budget'),'home')+
      '<div class="form" style="padding-bottom:24px">'+
        segTipe()+segBasis()+navPeriode()+isi+
        '<button class="save '+(vTipe==='pengeluaran'?'':'pem')+'" style="margin-top:6px" onclick="agEdit(\''+vTipe+'\')">'+
          (vTipe==='pemasukan'?La('+ Atur target pemasukan','+ Set income target'):La('+ Atur alokasi pengeluaran','+ Set expense allocation'))+'</button>'+
        (ambil(vTipe,vBasis,vPeriode).length?
          '<button class="save" style="background:transparent;color:var(--merah-tx,#c0392b);box-shadow:none;border:1px solid var(--merah-tx,#c0392b);margin-top:4px" onclick="agHapusPeriode(\''+vTipe+'\')">'+
            (vTipe==='pemasukan'?La('Hapus target pemasukan periode ini','Delete this period income target'):La('Hapus alokasi pengeluaran periode ini','Delete this period expense allocation'))+'</button>':'')+
      '</div>';
  }

  /* ================= VIEW: FORM ================= */
  window.agEdit=function(tipe){
    if(tipe==='pemasukan'){
      eNilai={};
      ambil('pemasukan',vBasis,vPeriode).forEach(function(r){ eNilai[r.kategori]=Number(r.nilai)||0; });
    } else {
      ePersen={};
      ambil('pengeluaran',vBasis,vPeriode).forEach(function(r){ ePersen[r.kategori]=Number(r.persen)||0; });
    }
    goView(tipe==='pemasukan'?'anggaranEditIn':'anggaranEditOut');
  };

  function idKatDom(k){ try{ return btoa(unescape(encodeURIComponent(k))).replace(/=/g,''); }catch(e){ return ''; } }
  function infoPeriode(){
    return '<div style="font-size:12px;color:var(--tx3);margin-bottom:12px">'+esc(labelPeriode(vBasis,vPeriode))+
      ' &middot; '+(vBasis==='minggu'?La('Mingguan','Weekly'):La('Bulanan','Monthly'))+'</div>';
  }
  function adaPeriodeLalu(tipe){
    var prev=geserPeriode(vBasis,vPeriode,-1);
    return (window.AG||[]).some(function(r){ return r.tipe===tipe && r.basis===vBasis && r.periode===prev; });
  }

  function renderAnggaranEditIn(){
    var rows=(window.KAT_PEMASUKAN||[]).map(function(k){
      var val=eNilai[k]||0;
      return '<div class="ag-rowin"><span class="nm">'+esc(k)+'</span>'+
        '<div class="nominal-wrap"><span class="rp">Rp</span>'+
        '<input inputmode="numeric" placeholder="0" value="'+(val?(+val).toLocaleString('id-ID'):'')+'" '+
          'oninput="agInNilai(\''+esc(k)+'\',this)"></div></div>';
    }).join('');
    S().innerHTML=headerA(La('Target pemasukan','Income target'),'anggaran')+
      '<div class="form">'+infoPeriode()+
        '<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">'+La('Isi perkiraan pemasukan tiap kategori. Total dihitung otomatis.','Enter expected income per category. Total is computed automatically.')+'</div>'+
        rows+
        '<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600;color:var(--tx);margin:10px 2px 14px;padding-top:10px;border-top:1px solid var(--line)">'+
          '<span>'+La('Total pemasukan','Total income')+'</span><span id="agTotPem">'+uangS(0)+'</span></div>'+
        '<button class="save pem" onclick="agSimpanPemasukan()">'+La('Simpan target','Save target')+'</button>'+
        (adaPeriodeLalu('pemasukan')?'<button class="save" style="background:var(--card);color:var(--tx);box-shadow:none;border:1px solid var(--line)" onclick="agSalinLalu(\'pemasukan\')">'+La('Salin dari periode sebelumnya','Copy from previous period')+'</button>':'')+
      '</div>';
    hitungTotalIn();
  }
  window.agInNilai=function(k,el){
    var angka=(el.value||'').replace(/[^0-9]/g,'');
    eNilai[k]=+angka||0;
    el.value=angka?(+angka).toLocaleString('id-ID'):'';
    hitungTotalIn();
  };
  function hitungTotalIn(){
    var sum=0; (window.KAT_PEMASUKAN||[]).forEach(function(k){ sum+=(eNilai[k]||0); });
    var el=document.getElementById('agTotPem'); if(el) el.textContent=uangS(sum);
    return sum;
  }

  function renderAnggaranEditOut(){
    var totalPem=totalPemasukan(vBasis,vPeriode);
    var peringatan = totalPem<=0
      ? '<div class="empty" style="line-height:1.5;margin-bottom:12px">'+La('Total pemasukan masih 0. Isi target pemasukan dahulu agar alokasi pengeluaran bisa dihitung.','Total income is still 0. Set the income target first so expense allocation can be computed.')+'</div>'
      : '<div style="font-size:12px;color:var(--tx2);margin-bottom:12px">'+La('Total pemasukan','Total income')+': <b>'+uangS(totalPem)+'</b></div>';
    var rows=(window.KAT_PENGELUARAN||[]).map(function(k){
      var val=ePersen[k]||0;
      return '<div class="ag-row">'+
        '<span class="nm">'+esc(k)+'</span>'+
        '<div class="ct">'+
          '<input class="field" inputmode="decimal" placeholder="0" value="'+tampilAngka(val)+'" '+
            'oninput="agOutPersen(\''+esc(k)+'\',this)">'+
          '<span class="pc">%</span>'+
          '<button type="button" class="ag-kalk" title="'+La('Kalkulator','Calculator')+'" '+
            'onclick="agKalk(\''+esc(k)+'\')">'+IKON_KALK+'</button>'+
        '</div>'+
        '<span class="rpv" id="agTk_'+idKatDom(k)+'">'+uangS(Math.round(totalPem*val/100))+'</span>'+
      '</div>';
    }).join('');
    S().innerHTML=headerA(La('Alokasi pengeluaran','Expense allocation'),'anggaran')+
      '<div class="form">'+infoPeriode()+peringatan+
        '<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">'+La('Isi persentase tiap kategori. Target rupiah = persen x total pemasukan.','Enter a percentage per category. Rupiah target = percent x total income.')+'</div>'+
        rows+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin:6px 2px 4px">'+
          '<span>'+La('Jumlah persentase','Total percentage')+'</span><span id="agSumPct">0%</span></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin:0 2px 14px">'+
          '<span>'+La('Total dialokasikan','Total allocated')+'</span><span id="agSumRp">'+uangS(0)+'</span></div>'+
        '<button class="save" onclick="agSimpanPengeluaran()">'+La('Simpan alokasi','Save allocation')+'</button>'+
        (adaPeriodeLalu('pengeluaran')?'<button class="save" style="background:var(--card);color:var(--tx);box-shadow:none;border:1px solid var(--line)" onclick="agSalinLalu(\'pengeluaran\')">'+La('Salin dari periode sebelumnya','Copy from previous period')+'</button>':'')+
      '</div>';
    hitungOut();
  }
  window.agOutPersen=function(k,el){
    ePersen[k]=keAngka(el.value);
    hitungOut();
  };
  function hitungOut(){
    var total=totalPemasukan(vBasis,vPeriode), sum=0;
    (window.KAT_PENGELUARAN||[]).forEach(function(k){
      var v=ePersen[k]||0; sum+=v;
      var span=document.getElementById('agTk_'+idKatDom(k));
      if(span) span.textContent=uangS(total>0?Math.round(total*v/100):0);
    });
    sum=Math.round(sum*100)/100;
    var elP=document.getElementById('agSumPct');
    if(elP){ elP.textContent=(tampilAngka(sum)||'0')+'%';
      elP.style.color = sum>100?MERAH:(sum===100?HIJAU:'var(--tx2)'); }
    var elR=document.getElementById('agSumRp');
    if(elR) elR.textContent=uangS(Math.round(total*sum/100));
    return sum;
  }

  /* ---- kalkulator bawaan: hasil rupiah -> persen ---- */
  var kalkKat=null;
  function penyangga(){
    var b=document.getElementById('agKalkBuf');
    if(b) return b;
    b=document.createElement('input');
    b.id='agKalkBuf'; b.type='text';
    b.style.cssText='position:absolute;left:-9999px;width:1px;height:1px;opacity:0';
    document.body.appendChild(b);
    b.addEventListener('input', function(){
      if(!kalkKat) return;
      var rupiah=parseFloat(String(b.value||'').replace(/[^0-9]/g,''))||0;
      var t=totalPemasukan(vBasis,vPeriode);
      if(t<=0){ toast(La('Isi target pemasukan dahulu','Set the income target first')); kalkKat=null; return; }
      var persen=Math.max(0,Math.min(100,Math.round((rupiah/t)*10000)/100));
      ePersen[kalkKat]=persen;
      var input=document.querySelector('input[oninput="agOutPersen(\''+kalkKat+'\',this)"]');
      if(input) input.value=tampilAngka(persen);
      hitungOut();
      kalkKat=null;
    });
    return b;
  }
  window.agKalk=function(k){
    if(typeof window.bukaKalkulator!=='function'){ toast(La('Kalkulator tidak tersedia','Calculator unavailable')); return; }
    kalkKat=k;
    var t=totalPemasukan(vBasis,vPeriode);
    var awal=Math.round(t*(ePersen[k]||0)/100);
    var b=penyangga();
    b.value = awal>0 ? String(awal) : '';
    window.bukaKalkulator('agKalkBuf');
  };

  /* ================= SIMPAN / SALIN / HAPUS ================= */
  function siapkan(rec){
    rec.user=u(); rec.updatedAt=new Date().toISOString();
    if(!rec.createdAt) rec.createdAt=rec.updatedAt;
    rec.terkirim=false;
    return rec;
  }
  function terapkanMemori(puts,dels){
    var buang={}; (dels||[]).forEach(function(id){ buang[id]=1; });
    window.AG=(window.AG||[]).filter(function(x){ return !buang[x.id]; });
    (puts||[]).forEach(function(r){
      var i=window.AG.findIndex(function(x){ return x.id===r.id; });
      if(i>=0) window.AG[i]=r; else window.AG.push(r);
    });
  }
  function selesaiSimpan(puts,dels,pesan){
    terapkanMemori(puts,dels);
    qRemove(puts.map(function(r){ return r.id; }));   /* id deterministik: jangan sampai terhapus lagi */
    if(typeof updatePip==='function') updatePip();
    toast(pesan);
    goView('anggaran');
    agTulis(puts,dels).then(function(){
      if(dels.length) hapusDiSheet(dels,true);
    });
  }
  window.agSimpanPemasukan=function(){
    var sum=hitungTotalIn();
    if(!(sum>0)){ toast(La('Isi minimal satu kategori pemasukan','Enter at least one income category')); return; }
    var puts=[],dels=[];
    (window.KAT_PEMASUKAN||[]).forEach(function(k){
      var v=eNilai[k]||0, id=idAnggaran('pemasukan',vBasis,vPeriode,k);
      if(v>0) puts.push(siapkan({id:id,tipe:'pemasukan',basis:vBasis,periode:vPeriode,kategori:k,nilai:v,persen:0,mode:'rupiah'}));
      else if((window.AG||[]).some(function(r){ return r.id===id; })) dels.push(id);
    });
    selesaiSimpan(puts,dels,La('Target pemasukan tersimpan','Income target saved'));
  };
  window.agSimpanPengeluaran=function(){
    var sum=hitungOut();
    if(sum>100){ toast(La('Jumlah persentase melebihi 100%','Total percentage exceeds 100%')); return; }
    if(!(sum>0)){ toast(La('Isi minimal satu alokasi','Enter at least one allocation')); return; }
    var puts=[],dels=[];
    (window.KAT_PENGELUARAN||[]).forEach(function(k){
      var v=ePersen[k]||0, id=idAnggaran('pengeluaran',vBasis,vPeriode,k);
      if(v>0) puts.push(siapkan({id:id,tipe:'pengeluaran',basis:vBasis,periode:vPeriode,kategori:k,nilai:0,persen:v,mode:'persen'}));
      else if((window.AG||[]).some(function(r){ return r.id===id; })) dels.push(id);
    });
    selesaiSimpan(puts,dels,La('Alokasi pengeluaran tersimpan','Expense allocation saved'));
  };
  window.agSalinLalu=function(tipe){
    var prev=geserPeriode(vBasis,vPeriode,-1);
    var sumber=(window.AG||[]).filter(function(r){ return r.tipe===tipe && r.basis===vBasis && r.periode===prev; });
    if(!sumber.length){ toast(La('Tidak ada anggaran periode sebelumnya','No budget in previous period')); return; }
    var puts=sumber.map(function(s){
      return siapkan({id:idAnggaran(s.tipe,s.basis,vPeriode,s.kategori),tipe:s.tipe,basis:s.basis,
        periode:vPeriode,kategori:s.kategori,nilai:Number(s.nilai)||0,persen:Number(s.persen)||0,mode:s.mode});
    });
    terapkanMemori(puts,[]);
    qRemove(puts.map(function(r){ return r.id; }));
    if(typeof updatePip==='function') updatePip();
    toast(La('Anggaran disalin','Budget copied'));
    agTulis(puts,[]);
    agEdit(tipe);
  };
  window.agHapusPeriode=async function(tipe){
    var target=ambil(tipe,vBasis,vPeriode);
    if(!target.length) return;
    var pesan = tipe==='pemasukan'
      ? La('Hapus target pemasukan untuk periode ini?','Delete the income target for this period?')
      : La('Hapus alokasi pengeluaran untuk periode ini?','Delete the expense allocation for this period?');
    var ok=(typeof confirmModal==='function') ? await confirmModal(pesan,{danger:true}) : window.confirm(pesan);
    if(!ok) return;
    var ids=target.map(function(r){ return r.id; });
    terapkanMemori([],ids);
    if(typeof updatePip==='function') updatePip();
    render();
    await agTulis([],ids);
    hapusDiSheet(ids,false);
  };

  /* ================= SINKRON GAS ================= */
  async function bacaSheet(){
    if(!tersambung() || typeof jsonp!=='function') return {ok:false, data:[], alasan:'takTersambung'};
    var d;
    try{ d=await jsonp('action=listAnggaran&user='+encodeURIComponent(u())); }
    catch(e){ return {ok:false, data:[], alasan:'jaringan', pesan:(e&&e.message)||String(e)}; }
    if(!d || typeof d!=='object') return {ok:false, data:[], alasan:'balasanAneh'};
    if(!('data' in d)) return {ok:false, data:[], alasan:'perintahTakDikenal'};
    return {ok:true, data:Array.isArray(d.data)?d.data:[]};
  }
  function rapikan(r){
    return { id:String(r.id), tipe:r.tipe, basis:r.basis,
      periode:String(r.periode||'').replace(/^'/,''), kategori:r.kategori,
      nilai:Number(r.nilai)||0, persen:Number(r.persen)||0, mode:r.mode||'',
      user:u(), createdAt:r.createdAt||'', updatedAt:r.updatedAt||'', terkirim:true };
  }

  /* hapus di Sheet seketika (dengan verifikasi); offline -> antrean */
  async function hapusDiSheet(ids,diam){
    if(!ids||!ids.length) return 0;
    qAdd(ids);
    if(!tersambung() || typeof kirimNoCors!=='function'){
      if(!diam) toast(La('Terhapus di perangkat. Akan dihapus di cadangan saat Anda menekan Cadangkan.','Deleted on device. It will be removed from the backup when you press Back up.'));
      return 0;
    }
    try{ await kirimNoCors('deleteAnggaran',{ids:ids.map(String), user:u()}); }
    catch(e){
      if(!diam) toast(La('Gagal menghapus di cadangan. Akan dicoba lagi saat mencadangkan.','Failed to delete in backup. It will retry on the next backup.'));
      return 0;
    }
    var cek=await bacaSheet();
    if(!cek.ok){ qRemove(ids); if(!diam) toast(La('Anggaran dihapus dari perangkat dan cadangan.','Budget deleted from device and backup.')); return ids.length; }
    var masih={}; cek.data.forEach(function(r){ masih[String(r.id)]=1; });
    var sukses=ids.filter(function(id){ return !masih[String(id)]; });
    qRemove(sukses);
    if(!diam){
      toast(sukses.length===ids.length
        ? La('Anggaran dihapus dari perangkat dan cadangan.','Budget deleted from device and backup.')
        : (sukses.length? sukses.length+'/'+ids.length+' '+La('terhapus di cadangan, sisanya dicoba lagi nanti.','deleted in backup, the rest will retry later.')
                        : La('Belum terhapus di cadangan. Akan dicoba lagi saat mencadangkan.','Not deleted in backup yet. It will retry on the next backup.')));
    }
    if(typeof updatePip==='function') updatePip();
    return sukses.length;
  }

  /* kirim penghapusan tertunda (dipanggil sebelum kirim data) */
  async function kirimPenghapusanTertunda(){
    var q=qGet();
    if(!q.length) return 0;
    /* pengaman id deterministik: yang masih ada secara lokal tidak dihapus */
    var punya={}; (window.AG||[]).forEach(function(r){ punya[String(r.id)]=1; });
    var bentrok=q.filter(function(id){ return punya[id]; });
    if(bentrok.length){ qRemove(bentrok); q=qGet(); }
    if(!q.length || !tersambung() || typeof kirimNoCors!=='function') return 0;
    try{
      await kirimNoCors('deleteAnggaran',{ids:q, user:u()});
      var cek=await bacaSheet();
      if(cek.ok){
        var masih={}; cek.data.forEach(function(r){ masih[String(r.id)]=1; });
        var sudah=q.filter(function(id){ return !masih[id]; });
        qRemove(sudah);
        return sudah.length;
      }
      qSet([]); return q.length;
    }catch(e){ return 0; }
  }

  /* kirim data belum terkirim + verifikasi */
  async function kirimAnggaranBelum(){
    var belum=agBelum();
    if(!belum.length) return {n:0,total:0};
    if(!tersambung() || typeof kirimNoCors!=='function') return {n:0,total:belum.length};
    var items=belum.map(function(r){
      return {id:r.id,tipe:r.tipe,basis:r.basis,periode:r.periode,kategori:r.kategori,
        nilai:Number(r.nilai)||0,persen:Number(r.persen)||0,mode:r.mode||'',
        user:r.user||u(),createdAt:r.createdAt||'',updatedAt:r.updatedAt||''};
    });
    try{ await kirimNoCors('syncAnggaran',{items:items}); }
    catch(e){ return {n:0,total:belum.length}; }
    var cek=await bacaSheet(), ok=belum;
    if(cek.ok){
      var ada={}; cek.data.forEach(function(r){ ada[String(r.id)]=1; });
      var cocok=belum.filter(function(r){ return ada[String(r.id)]; });
      if(cocok.length) ok=cocok;
    }
    ok.forEach(function(r){ r.terkirim=true; });
    await agTulis(ok.slice(),[]);
    return {n:ok.length,total:belum.length};
  }

  /* tarik dari Sheet: HANYA MENAMBAH, tidak pernah menghapus di cloud */
  async function tarikAnggaran(diam){
    if(!tersambung()){
      if(!diam) toast(La('Layanan pencadangan belum terhubung.','Backup service is not connected.'));
      return 0;
    }
    var hasil=await bacaSheet();
    if(!hasil.ok){
      if(!diam){
        toast(hasil.alasan==='perintahTakDikenal'
          ? La('Server belum mengenali perintah anggaran. Buka Apps Script lalu Deploy > Manage deployments > New version.','Server does not recognize the budget command yet. Open Apps Script then Deploy > Manage deployments > New version.')
          : (hasil.alasan==='jaringan' ? La('Jaringan bermasalah: ','Network problem: ')+(hasil.pesan||'')
             : La('Gagal membaca data anggaran dari cadangan.','Failed to read budget data from backup.')));
      }
      return 0;
    }
    var semua=hasil.data.filter(function(r){ return r && r.id; });
    var milik=semua.filter(function(r){ return !r.user || samaUser(r.user,u()); }).map(rapikan);
    if(milik.length){
      await agTulis(milik,[]);
      qRemove(milik.map(function(r){ return r.id; }));
    }
    await muatAnggaran();
    if(typeof updatePip==='function') updatePip();
    try{ render(); }catch(e){}
    if(!diam){
      toast(milik.length ? (milik.length+' '+La('data anggaran dipulihkan','budget records restored'))
        : (semua.length ? La('Data anggaran di cadangan milik akun lain ('+semua.length+' baris).','Budget data in backup belongs to another account ('+semua.length+' rows).')
                        : La('Belum ada data anggaran di cadangan.','No budget data in backup yet.')));
    }
    return milik.length;
  }
  window.anggaranTarik=tarikAnggaran;

  /* ================= INTEGRASI: NAVIGASI & RENDER ================= */
  (function(){
    var _render=window.render;
    if(typeof _render!=='function' || _render.__agF) return;
    window.render=function(){
      var v=(typeof view!=='undefined')?view:window.view;
      if(v==='anggaran'){ if(typeof setNav==='function') setNav(); setAgHead(true); return renderAnggaran(); }
      if(v==='anggaranEditIn'){ if(typeof setNav==='function') setNav(); setAgHead(true); return renderAnggaranEditIn(); }
      if(v==='anggaranEditOut'){ if(typeof setNav==='function') setNav(); setAgHead(true); return renderAnggaranEditOut(); }
      setAgHead(false);
      return _render.apply(this, arguments);
    };
    window.render.__agF=true;
  })();

  /* ================= INTEGRASI: BOTTOM SHEET (+) ================= */
  function isiTeksSheet(btn){
    var at=btn.querySelector('.at'), as=btn.querySelector('.as');
    if(at) at.textContent=La('Buat Anggaran','Create Budget');
    if(as) as.textContent=La('Rencana pemasukan dan pengeluaran','Plan income and expenses');
  }
  function pasangItemSheet(){
    var acts=document.getElementById('acts');
    if(!acts) return false;
    var card=acts.querySelector('.acts-card');
    if(!card) return false;
    /* Bila tombol sudah ada, JANGAN berhenti: perbarui teksnya. Bottom sheet
       berada di luar area render(), jadi pergantian bahasa tidak menyentuhnya
       sendiri. Frasa ini juga tidak ada di KAMUS, sehingga penerjemah balik
       tidak bisa memulihkannya. */
    var lama=card.querySelector('#agSheetBtn');
    if(lama){ isiTeksSheet(lama); return true; }

    var anchor=null;
    card.querySelectorAll('.acts-btn').forEach(function(b){
      if((b.getAttribute('onclick')||'').indexOf("actAdd('akun')")>=0) anchor=b;
    });
    var btn=document.createElement('button');
    btn.className='acts-btn'; btn.id='agSheetBtn';
    btn.setAttribute('onclick',"actAdd('anggaran')");
    btn.innerHTML='<span class="acts-ic" style="background:#0F6E56">&#128202;</span>'+
      '<div class="acts-tx"><div class="at"></div><div class="as"></div></div>';
    isiTeksSheet(btn);
    if(anchor && anchor.parentNode){
      if(anchor.nextSibling) anchor.parentNode.insertBefore(btn, anchor.nextSibling);
      else anchor.parentNode.appendChild(btn);
    } else {
      var cancel=card.querySelector('.acts-cancel');
      if(cancel) card.insertBefore(btn, cancel); else card.appendChild(btn);
    }
    return true;
  }
  (function(){
    if(!pasangItemSheet()){
      var c=0,t=setInterval(function(){ c++; if(pasangItemSheet()||c>40) clearInterval(t); },100);
    }
    var _actAdd=window.actAdd;
    if(typeof _actAdd==='function' && !_actAdd.__agF){
      window.actAdd=function(kind){
        if(kind==='anggaran'){ try{ closeSheet(); }catch(e){} bukaAnggaran(); return; }
        return _actAdd.apply(this, arguments);
      };
      window.actAdd.__agF=true;
    }
    /* pergantian bahasa: segarkan teks tombol di bottom sheet */
    var _setLang=window.setLang;
    if(typeof _setLang==='function' && !_setLang.__agF){
      window.setLang=function(){
        var r=_setLang.apply(this, arguments);
        try{ setTimeout(pasangItemSheet, 0); }catch(e){}
        return r;
      };
      window.setLang.__agF=true;
    }
    /* jaring pengaman: segarkan juga tiap kali sheet dibuka */
    var _openFab=window.openFabMenu;
    if(typeof _openFab==='function' && !_openFab.__agF){
      window.openFabMenu=function(){
        var r=_openFab.apply(this, arguments);
        try{ pasangItemSheet(); }catch(e){}
        return r;
      };
      window.openFabMenu.__agF=true;
    }
  })();

  /* ================= INTEGRASI: LAPORAN ================= */
  function fmtTgl(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
  function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
  function irisan(a,b,y,m){
    var A=new Date(y,m-1,1), B=new Date(y,m,0);
    var lo=a>A?a:A, hi=b<B?b:B;
    return hi<lo?0:Math.round((hi-lo)/86400000)+1;
  }
  function rentangLaporan(){
    var now=new Date(); now.setHours(0,0,0,0);
    var rpd=window.repPeriode||'bulanan';
    var awal, akhir=new Date(now);
    if(rpd==='harian') awal=new Date(now);
    else if(rpd==='mingguan'){ awal=new Date(now); awal.setDate(now.getDate()-6); }
    else if(rpd==='tahunan') awal=new Date(now.getFullYear(), now.getMonth()-11, 1);
    else { awal=new Date(now.getFullYear(),now.getMonth(),1); akhir=new Date(now.getFullYear(),now.getMonth()+1,0); }
    return {awal:fmtTgl(awal), akhir:fmtTgl(akhir), tipe:rpd};
  }
  function targetRentang(tipe,kategori,awalStr,akhirStr){
    var awal=new Date(awalStr+'T00:00:00'), akhir=new Date(akhirStr+'T00:00:00');
    var total=0;
    var cur=new Date(awal.getFullYear(),awal.getMonth(),1);
    var stop=new Date(akhir.getFullYear(),akhir.getMonth(),1);
    while(cur<=stop){
      var periode=cur.getFullYear()+'-'+pad2(cur.getMonth()+1);
      var tb=0;
      if(tipe==='pemasukan'){
        var r1=ambil('pemasukan','bulan',periode).filter(function(r){ return r.kategori===kategori; })[0];
        tb=r1?(Number(r1.nilai)||0):0;
      } else tb=targetKeluarKat(kategori,'bulan',periode);
      if(tb>0) total+=tb*(irisan(awal,akhir,cur.getFullYear(),cur.getMonth()+1)/daysInMonth(cur.getFullYear(),cur.getMonth()+1));
      cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    }
    return Math.round(total);
  }
  function realRentang(tipe,kategori,a,b){
    return (window.TX||[]).filter(function(t){ return t.tipe===tipe && t.kategori===kategori && t.tanggal>=a && t.tanggal<=b; })
      .reduce(function(s,t){ return s+(Number(t.nominal)||0); },0);
  }
  function suntikLaporan(){
    var list=document.querySelector('.catlist');
    if(!list) return;
    var tipe=(window.repKatMode==='masuk')?'pemasukan':'pengeluaran';
    var rg=rentangLaporan();
    var rows=list.querySelectorAll('.catrow');
    var ada=false, data=[];
    rows.forEach(function(row){
      var cn=row.querySelector('.cn'); if(!cn) return;
      var kategori=cn.textContent.trim();
      var target=targetRentang(tipe,kategori,rg.awal,rg.akhir);
      if(target>0) ada=true;
      data.push({row:row,kategori:kategori,target:target});
    });
    if(!ada) return;

    var totT=0, totP=0;
    data.forEach(function(d){ totT+=d.target; totP+=realRentang(tipe,d.kategori,rg.awal,rg.akhir); });
    var pT=totT>0?Math.round(totP/totT*100):0;
    var wT=tipe==='pengeluaran'?wKeluar(pT):wMasuk(pT);
    var judul=tipe==='pengeluaran'?La('Realisasi vs Anggaran Pengeluaran','Actual vs Expense Budget')
                                  :La('Realisasi vs Anggaran Pemasukan','Actual vs Income Budget');
    if(!list.parentNode.querySelector('.ag-cap')){
      var cap=document.createElement('div');
      cap.className='ag-cap';
      cap.style.cssText='margin:2px 18px 12px;background:var(--card);border-radius:12px;padding:14px 16px';
      cap.innerHTML=
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">'+
          '<span style="font-size:12.5px;font-weight:600;color:var(--tx)">'+judul+'</span>'+
          '<span style="font-size:11px;color:'+wT+';font-weight:600">'+pT+'%</span></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);margin-bottom:6px">'+
          '<span>'+La('Realisasi','Actual')+' <b style="color:var(--tx)">'+uangS(totP)+'</b></span>'+
          '<span>'+La('Anggaran','Budget')+' <b style="color:var(--tx)">'+uangS(totT)+'</b></span></div>'+
        bar(pT,wT,7)+
        (rg.tipe!=='bulanan'?('<div style="font-size:10px;color:var(--tx3);margin-top:8px">'+La('Anggaran diprorata dari anggaran bulanan sesuai rentang.','Budget prorated from monthly budget to the range.')+'</div>'):'');
      list.parentNode.insertBefore(cap,list);
    }
    data.forEach(function(d){
      if(d.row.nextSibling && d.row.nextSibling.className==='ag-sub') return;
      var sub=document.createElement('div');
      sub.className='ag-sub';
      sub.style.cssText='padding:0 0 12px;margin-top:-6px';
      if(d.target>0){
        var pakai=realRentang(tipe,d.kategori,rg.awal,rg.akhir);
        var pr=Math.round(pakai/d.target*100);
        var w=tipe==='pengeluaran'?wKeluar(pr):wMasuk(pr);
        sub.innerHTML=
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<div style="flex:1">'+bar(pr,w,5)+'</div>'+
            '<span style="font-size:10.5px;color:'+w+';font-weight:600;flex:0 0 auto;min-width:34px;text-align:right">'+pr+'%</span></div>'+
          '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:3px">'+
            '<span>'+La('Anggaran','Budget')+' '+uangS(d.target)+'</span>'+
            ((tipe==='pengeluaran'&&pr>100)?('<span style="color:'+MERAH+'">'+La('lewat ','over ')+uangS(pakai-d.target)+'</span>'):'')+'</div>';
      } else {
        sub.innerHTML='<div style="font-size:10px;color:var(--tx3)">'+La('Belum dianggarkan','Not budgeted')+'</div>';
      }
      if(d.row.nextSibling) d.row.parentNode.insertBefore(sub,d.row.nextSibling);
      else d.row.parentNode.appendChild(sub);
    });
  }
  (function(){
    var _rr=window.renderReport;
    if(typeof _rr==='function' && !_rr.__agF){
      window.renderReport=function(){
        var r=_rr.apply(this, arguments);
        try{ suntikLaporan(); }catch(e){}
        return r;
      };
      window.renderReport.__agF=true;
    }
  })();

  /* ================= INTEGRASI: TAB PENCADANGAN ================= */
  (function(){
    var _jb=window.jumlahBelum;
    if(typeof _jb==='function' && !_jb.__agF){
      window.jumlahBelum=function(){
        var n=_jb.apply(this, arguments)||0;
        try{ n+=agBelum().length; }catch(e){}
        return n;
      };
      window.jumlahBelum.__agF=true;
    }
  })();
  function hitungUlangSinkron(){
    if(typeof dalamRentang!=='function') return;
    var nAg=agBelum().length;
    var dalam=(window.TX||[]).filter(function(t){ return dalamRentang(t.tanggal); });
    var dalamTr=(window.TR||[]).filter(function(t){ return dalamRentang(t.tanggal); });
    var belum=dalam.filter(function(t){ return !t.terkirim; }).length
            + dalamTr.filter(function(t){ return !t.terkirim; }).length;
    var stat=document.querySelector('.big-stat');
    if(stat){
      var kotak=stat.querySelectorAll('.bs');
      if(kotak.length>=2){
        var e0=kotak[0].querySelector('.n'), e1=kotak[1].querySelector('.n');
        if(e0) e0.textContent=(dalam.length+nAg);
        if(e1) e1.textContent=(belum+nAg);
        var k0=kotak[0].querySelector('.k');
        if(k0 && nAg) k0.textContent=La('data pada rentang (termasuk anggaran)','records in range (incl. budget)');
      }
    }
    var btn=document.getElementById('btnKirim');
    if(btn && nAg){
      btn.disabled=!tersambung();
      btn.textContent=La('Cadangkan ','Back up ')+(dalam.length+nAg)+La(' data',' records');
    }
    document.querySelectorAll('.sec-head .t').forEach(function(el){
      var m=(el.textContent||'').match(/^(.*)\((\d+)\)\s*$/);
      if(m && /rentang|range/i.test(m[1])) el.textContent=m[1]+'('+(dalam.length+dalamTr.length+nAg)+')';
    });
  }
  (function(){
    var _rs=window.renderSinkron;
    if(typeof _rs==='function' && !_rs.__agF){
      window.renderSinkron=function(){
        var r=_rs.apply(this, arguments);
        try{ hitungUlangSinkron(); }catch(e){}
        return r;
      };
      window.renderSinkron.__agF=true;
    }
  })();

  /* ================= INTEGRASI: CADANGKAN & PULIHKAN (1 modal) ================= */
  var adaProg=(typeof showProgress==='function' && typeof setProgress==='function' && typeof hideProgress==='function');
  function bungkusSatuModal(jalan){
    return async function(){
      if(!adaProg) return jalan.apply(this, arguments);
      var _hide=window.hideProgress;
      window.hideProgress=function(){};
      try{ return await jalan.apply(this, arguments); }
      finally{ window.hideProgress=_hide; try{ _hide(); }catch(e){} }
    };
  }
  (function(){
    var _kr=window.kirimRentang;
    if(typeof _kr==='function' && !_kr.__agF){
      window.kirimRentang=bungkusSatuModal(async function(){
        var nAg=agBelum().length;
        var adaTx=false;
        try{ adaTx=(window.TX||[]).some(function(t){ return dalamRentang(t.tanggal); }); }catch(e){}

        var hasilKirim={n:0,total:nAg};
        if(nAg>0 && tersambung()){
          if(adaProg){ showProgress(La('Mencadangkan data','Backing up data'));
            setProgress(5, La('Menghapus anggaran usang...','Removing stale budget...')); }
          await kirimPenghapusanTertunda();
          if(adaProg) setProgress(12, La('Mengirim anggaran ('+nAg+')...','Sending budget ('+nAg+')...'));
          hasilKirim=await kirimAnggaranBelum();
          await muatAnggaran();
        } else if(qGet().length && tersambung()){
          await kirimPenghapusanTertunda();
        }

        var r;
        if(adaTx){ r=await _kr.apply(this, arguments); }
        else if(hasilKirim.n>0){
          if(adaProg) setProgress(100, La('Anggaran tercadang','Budget backed up'));
          await jeda(450);
          toast(hasilKirim.n+' '+La('data anggaran tercadang','budget records backed up'));
        } else {
          r=await _kr.apply(this, arguments);   /* biarkan pesan asli tampil */
        }
        if(adaTx && hasilKirim.n>0) toast(hasilKirim.n+' '+La('data anggaran tercadang','budget records backed up'));
        if(typeof updatePip==='function') updatePip();
        try{ render(); }catch(e){}
        return r;
      });
      window.kirimRentang.__agF=true;
    }
  })();
  (function(){
    var _td=window.tarikDariSheet;
    if(typeof _td==='function' && !_td.__agF){
      window.tarikDariSheet=bungkusSatuModal(async function(){
        /* Selama fungsi asli berjalan, nilai progresnya diskalakan ke
           0-82% dan teks "Selesai" ditahan, sehingga tahap anggaran
           menyambung mulus (85 -> 100) tanpa pernah mundur dari 100%. */
        var _set=window.setProgress;
        if(adaProg && tersambung()){
          window.setProgress=function(p,s){
            var teks=s;
            if((Number(p)||0)>=100){ teks=La('Mengambil anggaran...','Fetching budget...'); }
            try{ _set(Math.min(82, Math.round((Number(p)||0)*0.82)), teks); }catch(e){}
          };
        }
        var r;
        try{ r=await _td.apply(this, arguments); }
        finally{ if(adaProg) window.setProgress=_set; }
        try{
          if(tersambung()){
            if(adaProg){ showProgress(La('Memulihkan data','Restoring data'));
              setProgress(85, La('Mengambil anggaran...','Fetching budget...')); }
            var n=await tarikAnggaran(true);
            if(adaProg){ setProgress(100, La('Selesai','Done')); await jeda(350); }
            toast(n>0 ? (n+' '+La('data anggaran dipulihkan','budget records restored'))
                      : La('Tidak ada data anggaran baru','No new budget data'));
            if(typeof updatePip==='function') updatePip();
            try{ render(); }catch(e){}
          }
        }catch(e){}
        return r;
      });
      window.tarikDariSheet.__agF=true;
    }
  })();

  /* ================= INTEGRASI: MUAT ULANG SAAT LOGIN ================= */
  (function(){
    var _mAk=window.muatAkun;
    if(typeof _mAk==='function' && !_mAk.__agF){
      window.muatAkun=async function(){
        var r=await _mAk.apply(this, arguments);
        try{ await muatAnggaran(); }catch(e){}
        return r;
      };
      window.muatAkun.__agF=true;
    }
  })();

  /* ================= BOOT ================= */
  (function(){
    var c=0;
    (function tunggu(){
      c++;
      if(window.DB && typeof goView==='function' && typeof render==='function' && typeof S==='function'){
        (async function(){
          await pastikanStore();
          await muatAnggaran();
          if(typeof updatePip==='function') updatePip();
          if(typeof view!=='undefined' && view){ try{ render(); }catch(e){} }
        })();
      } else if(c<80) setTimeout(tunggu,100);
    })();
  })();

})();
