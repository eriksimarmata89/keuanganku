<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>KeuanganKu</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%233D8BD4'/%3E%3Cstop offset='100%25' stop-color='%230C447C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='11' fill='url(%23g)'/%3E%3Ctext x='20' y='27.5' font-family='Arial' font-size='18' font-weight='800' fill='white' text-anchor='middle'%3ERp%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cdefs%3E%3ClinearGradient id='g2' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%233D8BD4'/%3E%3Cstop offset='100%25' stop-color='%230C447C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='40' height='40' rx='11' fill='url(%23g2)'/%3E%3Ctext x='20' y='27.5' font-family='Arial' font-size='18' font-weight='800' fill='white' text-anchor='middle'%3ERp%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --biru:#185FA5; --biru-tua:#0C447C;
    --hijau:#1D9E75; --hijau-bg:#E1F5EE; --hijau-tx:#0F6E56;
    --merah:#C0392B; --merah-bg:#FCEBEB; --merah-tx:#A32D2D;
    --kuning-bg:#FAEEDA; --kuning-tx:#854F0B;
    --page:#F4F4F2; --card:#FFFFFF; --line:#E7E7E2;
    --tx:#2C2C2A; --tx2:#6B6B66; --tx3:#9A9A93;
    --radius:12px;
    --maxw:520px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#e9e9e6; color:var(--tx);}
  #app{max-width:var(--maxw); margin:0 auto; min-height:100vh; background:var(--page); position:relative; display:flex; flex-direction:column;}
  .scroll{flex:1; overflow-y:auto; padding-bottom:90px;}
  .scroll.has-appbar{padding-top:calc(66px + env(safe-area-inset-top,0px));}
  h1,h2,h3,p{margin:0;}
  button{font-family:inherit; cursor:pointer;}

  .topbar{padding:18px 18px 0;}
  .greet{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .greet .hi{font-size:13px; color:var(--tx2);}
  .greet .nm{font-size:16px; font-weight:600; margin-top:2px;}
  .eye-pill{display:flex; align-items:center; gap:6px; border:none; background:var(--card); color:var(--tx2); font-size:12px; font-weight:600; padding:8px 13px; border-radius:20px;}
  .eye-pill:active{opacity:.7;}
  .ava{width:38px; height:38px; border-radius:50%; background:#E6F1FB; color:var(--biru); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; object-fit:cover;}

  .saldo{background:var(--biru); border-radius:16px; padding:18px 20px; color:#fff; position:relative;}
  .saldo-carousel{display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-padding:0 18px; padding:0 18px; box-sizing:border-box; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .saldo-carousel::-webkit-scrollbar{display:none;}
  .saldo-carousel{cursor:grab;}
  .saldo-carousel.men-drag{scroll-snap-type:none; cursor:grabbing; user-select:none;}
  .saldo-dot{cursor:pointer;}
  .saldo-slide{scroll-snap-align:start; flex:none; width:100%; box-sizing:border-box;}
  .saldo-dots{display:flex; justify-content:center; gap:6px; margin:9px 0 2px;}
  .saldo-dot{width:6px; height:6px; border-radius:50%; background:var(--line); transition:.2s;}
  .saldo-dot.on{background:var(--biru); width:16px; border-radius:4px;}
  .saldo .lbl{font-size:12px; color:#B5D4F4;}
  .saldo .amt{font-size:26px; font-weight:600; margin:4px 0 14px; letter-spacing:-.3px;}
  .saldo .row{display:flex; gap:16px;}
  .saldo .row>div{flex:1;}
  .saldo .mini{font-size:11px; color:#B5D4F4;}
  .saldo .val{font-size:14px; font-weight:600; margin-top:2px;}
  .saldo-eye{position:absolute; top:14px; right:14px; width:28px; height:28px; border-radius:50%; border:none; background:rgba(255,255,255,.18); color:#fff; display:flex; align-items:center; justify-content:center; padding:0;}
  .saldo-eye:active{background:rgba(255,255,255,.3);}
  .appbar-ava{background:none; border:none; padding:0; display:flex; align-items:center; justify-content:center; line-height:0;}

  .seg{display:flex; background:#EDEDE8; border-radius:10px; padding:3px; margin:14px 18px;}
  .seg button{flex:1; border:none; background:transparent; padding:8px 0; font-size:13px; color:var(--tx2); border-radius:8px;}
  .seg button.on{background:#fff; color:var(--tx); font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,.08);}

  .sec-head{display:flex; justify-content:space-between; align-items:baseline; padding:6px 18px 8px;}
  .sec-head .t{font-size:14px; font-weight:600;}
  .list{padding:0 18px;}
  .item{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:.5px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .ic{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .item .mid{flex:1; min-width:0;}
  .item .nm{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .dt{font-size:11px; color:var(--tx3); margin-top:1px; display:flex; align-items:center; gap:5px;}
  .item .amt{font-size:13px; font-weight:600; white-space:nowrap;}
  .pos{color:var(--hijau-tx);} .neg{color:var(--merah-tx);}
  .empty{text-align:center; color:var(--tx3); font-size:13px; padding:40px 20px; line-height:1.6;}
  .sdot{width:7px; height:7px; border-radius:50%; display:inline-block;}
  .sdot.belum{background:#E0A11B;} .sdot.kirim{background:var(--hijau);}

  .nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:var(--maxw); background:#fff; border-top:.5px solid var(--line); display:flex; justify-content:space-around; align-items:center; padding:8px 0 14px;}
  .nav button{background:none; border:none; color:var(--biru); opacity:.45; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10px; padding:4px 8px; position:relative;}
  .nav button.on{color:var(--biru); opacity:1;}
  .nav .ico{font-size:21px; line-height:1;}
  .nav .pip{position:absolute; top:0; right:6px; min-width:16px; height:16px; background:var(--merah); color:#fff; border-radius:9px; font-size:9px; font-weight:600; display:flex; align-items:center; justify-content:center; padding:0 3px;}
  .fab{width:50px; height:50px; border-radius:50%; background:var(--biru); color:#fff; border:none; font-size:28px; margin-top:-24px; box-shadow:0 4px 12px rgba(24,95,165,.4); display:flex; align-items:center; justify-content:center; line-height:1;}

  .form{padding:8px 18px 24px;}
  .fhead{display:flex; align-items:center; gap:12px; padding:calc(18px + env(safe-area-inset-top,0px)) 18px 14px;}
  .fhead .bk{background:none; border:none; font-size:22px; color:var(--tx); line-height:1; padding:0;}
  .fhead .ti{font-size:16px; font-weight:600;}
  .tipe2{display:flex; gap:10px; margin-bottom:18px;}
  .tipe2 button{flex:1; padding:12px 0; border-radius:12px; border:1.5px solid var(--line); background:#fff; font-size:14px; font-weight:600; color:var(--tx2);}
  .tipe2 button.peng.on{border-color:var(--merah); color:var(--merah-tx); background:var(--merah-bg);}
  .tipe2 button.pem.on{border-color:var(--hijau); color:var(--hijau-tx); background:var(--hijau-bg);}
  .metode{display:flex; background:#EDEDE8; border-radius:10px; padding:3px; margin-bottom:18px;}
  .metode button{flex:1; border:none; background:transparent; padding:9px 0; font-size:13px; color:var(--tx2); border-radius:8px; display:flex; align-items:center; justify-content:center; gap:6px;}
  .metode button.on{background:#fff; color:var(--tx); font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,.06);}
  label.fl{display:block; font-size:11px; color:var(--tx2); margin:0 0 6px 2px;}
  .cklabel{display:flex; align-items:flex-start; gap:9px; font-size:12.5px; line-height:1.5; background:var(--kuning-bg); color:var(--kuning-tx); border-radius:10px; padding:10px 12px; margin:-2px 0 14px;}
  .cklabel input{margin-top:2px; flex-shrink:0;}
  .field{width:100%; border:.5px solid var(--line); border-radius:10px; padding:11px 12px; font-size:15px; color:var(--tx); background:#fff; font-family:inherit; margin-bottom:14px;}
  .field:focus{outline:none; border-color:var(--biru);}
  select.field{appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="%236B6B66" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>'); background-repeat:no-repeat; background-position:right 12px center;}
  .nominal-wrap{display:flex; align-items:center; border:.5px solid var(--biru); border-radius:10px; padding:8px 12px; margin-bottom:14px; background:#fff;}
  .nominal-wrap .rp{font-size:18px; color:var(--tx2); margin-right:6px;}
  .nominal-wrap input{border:none; outline:none; font-size:22px; font-weight:600; width:100%; font-family:inherit; color:var(--tx); background:transparent;}
  .duo{display:flex; gap:12px;}
  .duo>div{flex:1;}
  .save{width:100%; border:none; border-radius:12px; padding:14px 0; font-size:15px; font-weight:600; color:#fff; background:var(--merah); margin-top:6px;}
  .save.pem{background:var(--hijau);}
  .save:disabled{opacity:.5;}

  .upload{border:1.5px dashed #C9C9C2; border-radius:12px; padding:26px 16px; text-align:center; color:var(--tx2); margin-bottom:16px; background:#fff;}
  .upload .big{font-size:30px; color:var(--biru);}
  .upload .ut{font-size:13px; font-weight:600; margin-top:6px;}
  .upload .us{font-size:11px; color:var(--tx3); margin-top:3px;}
  .scanbox{display:flex; gap:12px; margin-bottom:16px;}
  .scanbox img{width:78px; height:104px; object-fit:cover; border-radius:10px; border:.5px solid var(--line); flex-shrink:0;}
  .scaninfo{flex:1; border-radius:10px; padding:11px 13px; display:flex; flex-direction:column; justify-content:center; font-size:12px; line-height:1.45;}
  .scaninfo.ok{background:var(--hijau-bg); color:var(--hijau-tx);}
  .scaninfo.load{background:#E6F1FB; color:var(--biru-tua);}
  .scaninfo.err{background:var(--merah-bg); color:var(--merah-tx);}
  .scanhint{font-size:12px; color:var(--tx2); line-height:1.5; margin:0 2px 12px;}
  .canvaswrap{position:relative; border-radius:12px; overflow:hidden; border:.5px solid var(--line); margin-bottom:14px; background:#000;}
  #scanCanvas{display:block; width:100%; height:auto; touch-action:none;}
  .ocrbusy{position:absolute; inset:0; background:rgba(255,255,255,.72); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--biru-tua); font-weight:600;}
  .chooser{background:#E6F1FB; border-radius:10px; padding:12px 13px; margin-bottom:14px;}
  .chooser .ct{font-size:13px; color:var(--biru-tua); margin-bottom:10px; word-break:break-word;}
  .cbtns{display:flex; flex-wrap:wrap; gap:8px;}
  .cb{border:.5px solid var(--biru); background:#fff; color:var(--biru); border-radius:8px; padding:8px 12px; font-size:13px; font-weight:600;}
  .cb.k{border-color:var(--hijau); color:var(--hijau-tx);} .cb.n{border-color:var(--merah); color:var(--merah-tx);} .cb.x{border-color:var(--tx3); color:var(--tx2);}
  .penbar{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .penbtn{flex:1; min-width:calc(50% - 4px); border:1.5px solid var(--line); background:#fff; border-radius:10px; padding:11px 8px; font-size:13px; font-weight:600; color:var(--tx2); display:flex; align-items:center; justify-content:center; gap:7px;}
  .penbtn .pdot{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
  .penbtn.on{color:#fff;}
  .penbtn.on.k{background:var(--hijau); border-color:var(--hijau);} .penbtn.on.n{background:var(--merah); border-color:var(--merah);}
  .penbtn.on.t{background:#7F77DD; border-color:#7F77DD;} .penbtn.on.c{background:#888780; border-color:#888780;}
  .penbtn.on.d{background:#BA7517; border-color:#BA7517;}
  .penbtn.on .pdot{background:#fff !important;}
  .peninfo{font-size:12px; line-height:1.45; margin:0 2px 12px; padding:8px 11px; border-radius:8px;}
  .peninfo.idle{background:var(--kuning-bg); color:var(--kuning-tx);}
  .peninfo.aktif{background:#E6F1FB; color:var(--biru-tua);}
  .linetap{position:absolute; border:1px dashed rgba(24,95,165,.6); background:rgba(24,95,165,.06); border-radius:3px; padding:0; margin:0;}
  .linetap:active{background:rgba(24,95,165,.22);}
  .mini-clear{border:none; background:none; color:var(--biru); font-size:11px; font-weight:600; padding:0;}
  .pedit{width:100%; border:.5px solid var(--biru); border-radius:6px; padding:5px 7px; font-size:13px; font-family:inherit; color:var(--tx); outline:none; background:#fff;}
  .pedit-num{width:118px; text-align:right; font-weight:600;}
  .pnm,.pamt{cursor:pointer;}
  .draftbox{background:#F4F4F2; border-radius:10px; padding:10px 13px; margin-bottom:14px;}
  .draftbox .dl{font-size:11px; color:var(--tx2); margin-bottom:6px;}
  .slot{display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:4px 0; gap:12px;}
  .slot span{color:var(--tx2); flex-shrink:0;} .slot b{font-weight:600; text-align:right; word-break:break-word;} .slot i{color:var(--tx3); font-weight:400;}
  .dl{font-size:11px; color:var(--tx2);}
  .pend{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:.5px solid var(--line);}
  .pend .pmid{flex:1; min-width:0;} .pend .pnm{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .psel{margin-top:3px; font-size:11px; border:.5px solid var(--line); border-radius:6px; padding:3px 6px; background:#fff; color:var(--tx2);}
  .pend .pamt{font-size:13px; font-weight:600; color:var(--merah-tx); white-space:nowrap;}
  .spin{display:inline-block; width:13px; height:13px; border:2px solid #B5D4F4; border-top-color:var(--biru); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:5px;}
  @keyframes sp{to{transform:rotate(360deg)}}

  .rep-cards{display:flex; gap:12px; padding:6px 18px 4px;}
  .rep-card{flex:1; background:#fff; border-radius:12px; padding:12px 14px;}
  .rep-card .l{font-size:11px; color:var(--tx2);}
  .rep-card .v{font-size:17px; font-weight:600; margin-top:3px;}
  .chartwrap{background:#fff; margin:14px 18px; border-radius:12px; padding:16px; position:relative; height:240px;}
  .catlist{padding:0 18px 20px;}
  .catrow{display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:.5px solid var(--line);}
  .dot{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
  .catrow .cn{flex:1; font-size:13px;}
  .catrow .cv{font-size:13px; font-weight:600;}
  .catrow .cp{font-size:11px; color:var(--tx3); margin-left:6px;}

  .chips{display:flex; flex-wrap:wrap; gap:8px; padding:0 18px 4px;}
  .chip{padding:8px 14px; border-radius:20px; border:.5px solid var(--line); background:#fff; font-size:13px; color:var(--tx2);}
  .chip.on{background:var(--biru); color:#fff; border-color:var(--biru);}
  .panel{background:#fff; border-radius:12px; margin:12px 18px; padding:16px;}
  .panel .big-stat{display:flex; gap:14px; margin-bottom:4px;}
  .panel .bs{flex:1; text-align:center; background:var(--page); border-radius:10px; padding:12px 6px;}
  .panel .bs .n{font-size:22px; font-weight:700;}
  .panel .bs .k{font-size:11px; color:var(--tx2); margin-top:2px;}
  .panel .bs.warn .n{color:var(--kuning-tx);}
  .kustom-date{display:flex; gap:10px; margin:12px 0 0;}
  .kustom-date>div{flex:1;}
  .set{padding:8px 18px 24px;}
  .set p.hint{font-size:12px; color:var(--tx2); line-height:1.6; margin:0 2px 14px;}
  .set .ok-msg{font-size:12px; margin:10px 2px 0;}
  .btn-line{width:100%; border:.5px solid var(--biru); color:var(--biru); background:#fff; border-radius:10px; padding:12px 0; font-size:14px; font-weight:600; margin-top:10px;}
  .btn-line:disabled{opacity:.5;}
  .divider{height:1px; background:var(--line); margin:20px 18px;}
  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:#2C2C2A; color:#fff; padding:10px 18px; border-radius:24px; font-size:13px; z-index:50; opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center;}
  .toast.show{opacity:1;}
  .delbtn{background:none; border:none; color:var(--tx3); font-size:16px; padding:4px 0 4px 8px;}
  .login-wrap{padding:calc(46px + env(safe-area-inset-top,0px)) 24px 24px;}
  .login-wrap .logo-mark{display:flex; justify-content:center; margin-bottom:10px;}
  .login-wrap .logo{font-size:26px; font-weight:700; color:var(--biru); text-align:center;}
  .login-wrap .logo-sub{font-size:13px; color:var(--tx2); text-align:center; margin:6px 0 24px;}
  .gbox{display:flex; justify-content:center; margin-bottom:10px; min-height:44px;}
  .atau{text-align:center; font-size:12px; color:var(--tx3); margin:6px 0 12px;}
  .prof-card{display:flex; align-items:center; gap:12px; background:#fff; border-radius:12px; padding:14px; margin-bottom:12px;}
  .pava{width:48px; height:48px; border-radius:50%; object-fit:cover; flex-shrink:0;}
  .pava-i{background:#E6F1FB; color:var(--biru); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px;}
  .prof-card .pn{font-size:15px; font-weight:600;}
  .prof-card .pe{font-size:12px; color:var(--tx2); margin-top:2px; word-break:break-all;}
  .btn-danger{width:100%; border:.5px solid var(--merah); color:var(--merah-tx); background:#fff; border-radius:10px; padding:12px 0; font-size:14px; font-weight:600; margin-top:10px;}
  .prof-hero{display:flex; flex-direction:column; align-items:center; text-align:center; padding:8px 0 18px;}
  .prof-hero .pava, .prof-hero .pava-i{width:74px; height:74px; font-size:26px; margin-bottom:10px;}
  .ava-edit-wrap{position:relative; display:inline-block;}
  .ava-edit-btn{position:absolute; right:-2px; bottom:12px; width:26px; height:26px; border-radius:50%; background:var(--biru); border:2px solid var(--page); color:#fff; display:flex; align-items:center; justify-content:center; padding:0;}
  .ava-edit-btn:active{background:var(--biru-tua);}
  .prof-hero .pava-logo{margin-bottom:10px; display:flex;}
  .prof-hero .pn{font-size:18px; font-weight:700;}
  .prof-hero .pe{font-size:12px; color:var(--tx2); margin-top:3px; word-break:break-all;}
  .grp-label{font-size:11px; color:var(--tx2); font-weight:600; letter-spacing:.5px; text-transform:uppercase; margin:14px 2px 8px;}
  .menu{background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .menu-row{display:flex; align-items:center; gap:12px; padding:13px 14px; border-bottom:.5px solid var(--line); width:100%; text-align:left; background:#fff; border:none;}
  .menu-row:last-child{border-bottom:none;}
  .menu-row:active{background:#F4F4F2;}
  .menu-ic{width:34px; height:34px; border-radius:9px; background:#E6F1FB; color:var(--biru); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .menu-tx{flex:1; min-width:0;}
  .menu-tx .mt{font-size:14px; font-weight:600; color:var(--tx);}
  .menu-tx .ms{font-size:11px; color:var(--tx2); margin-top:2px; display:flex; align-items:center; gap:6px;}
  .menu-arr{color:var(--tx3); font-size:20px; line-height:1; flex-shrink:0;}
  .stat-dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0;}
  .stat-dot.on{background:var(--hijau);} .stat-dot.off{background:#C9A227;}
  .statcard{display:flex; align-items:center; gap:10px; border-radius:12px; padding:13px 14px; margin-bottom:16px; font-size:13px; line-height:1.4;}
  .statcard.on{background:var(--hijau-bg); color:var(--hijau-tx);}
  .statcard.off{background:var(--kuning-bg); color:var(--kuning-tx);}
  .statcard .sc-ic{font-size:18px;}
  .btn-logout{width:100%; border:.5px solid var(--line); color:var(--merah-tx); background:#fff; border-radius:10px; padding:13px 0; font-size:14px; font-weight:600; margin-top:22px;}
  .btn-logout:active{background:#FCEBEB;}
  .about-line{display:flex; justify-content:space-between; font-size:13px; padding:11px 14px; border-bottom:.5px solid var(--line);}

  .about-line span{color:var(--tx2);} .about-line b{font-weight:600;}
  .guide-toggle{width:100%; border:.5px solid var(--biru); color:var(--biru); background:#fff; border-radius:10px; padding:12px 0; font-size:14px; font-weight:600; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px;}
  .guide{margin-top:14px;}
  .gstep{display:flex; gap:12px; margin-bottom:16px;}
  .gnum{width:26px; height:26px; border-radius:50%; background:var(--biru); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;}
  .gbody{flex:1; min-width:0;}
  .gbody .gt{font-size:14px; font-weight:600; margin-bottom:3px;}
  .gbody .gd{font-size:12.5px; color:var(--tx2); line-height:1.55;}
  .gbody .gd b{color:var(--tx); font-weight:600;}
  .codebox{position:relative; background:#0F1B2A; border-radius:10px; margin:10px 0 4px; overflow:hidden;}
  .codebox pre{margin:0; padding:13px 13px 13px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:11px; line-height:1.5; color:#D7E3F2; overflow-x:auto; max-height:240px; overflow-y:auto; white-space:pre;}
  .copy-btn{position:absolute; top:8px; right:8px; background:rgba(255,255,255,.14); color:#fff; border:none; border-radius:7px; padding:6px 11px; font-size:12px; font-weight:600;}

  /* ====== HEADER APLIKASI ====== */

  .appbar .brand{display:flex; align-items:center; gap:9px;}

  .appbar .brand .bt{font-size:16px; font-weight:700; letter-spacing:-.2px;}
  .appbar .eye{width:38px; height:38px; border-radius:50%; border:none; background:var(--card); color:var(--tx2); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.05);}

  /* ====== RINGKASAN HUTANG/PIUTANG DI BERANDA ====== */
  .uring{display:flex; align-items:center; background:var(--card); border-radius:14px; margin:14px 18px 0; padding:14px 16px; box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .uring .ur{flex:1; min-width:0;}
  .uring .url{font-size:11px; color:var(--tx2);}
  .uring .urv{font-size:16px; font-weight:700; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .uring .ursep{width:1px; align-self:stretch; background:var(--line); margin:0 14px;}
  .uring .urarr{color:var(--tx3); font-size:22px; line-height:1; margin-left:12px; flex-shrink:0;}

  /* ====== DAFTAR & RINCIAN HUTANG/PIUTANG ====== */
  .uitem{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:none; border:none; padding:12px 0; border-bottom:.5px solid var(--line);}

  .uic{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}
  .uic.p{background:var(--hijau-bg); color:var(--hijau-tx);}
  .uic.h{background:var(--merah-bg); color:var(--merah-tx);}
  .umid{flex:1; min-width:0;}
  .umid .unm{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .umid .usub{font-size:11px; color:var(--tx3); margin-top:2px;}
  .umid .ubw{margin-top:5px;}
  .uamt{font-size:14px; font-weight:700; white-space:nowrap;}
  .ubadge{font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; white-space:nowrap;}

  .ubadge.telat{background:var(--merah-bg); color:var(--merah-tx);}
  .ubadge.seb{background:var(--kuning-bg); color:var(--kuning-tx);}
  .ubadge.belum{background:#E6F1FB; color:var(--biru-tua);}

  .udetail.h{background:var(--merah);}

  .udetail .udcap{font-size:12px; opacity:.85; margin-top:2px;}

  /* ====== MODAL KONFIRMASI ====== */

  .cmbtn.ok.danger{background:var(--merah);}

  /* ====== OVERLAY PROGRES (KIRIM / TARIK DATA) ====== */
  .pmask{position:fixed; inset:0; z-index:75; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.5); padding:24px;}
  .pmask.show{display:flex;}

  .pgbar{height:100%; width:0%; background:var(--biru); border-radius:6px; transition:width .35s ease;}
  .pgpct{font-size:11px; color:var(--tx3); margin-top:6px;}

  /* ====== MODAL LAPORAN (PRATINJAU) ====== */
  .lapcard{background:var(--card); border-radius:16px; padding:18px 18px 16px; width:100%; max-width:440px; max-height:88vh; display:flex; flex-direction:column; box-shadow:0 12px 32px rgba(0,0,0,.22); position:relative;}
  .lapclose{position:absolute; top:12px; right:12px; width:28px; height:28px; border-radius:50%; background:var(--page); color:var(--tx2); display:flex; align-items:center; justify-content:center; font-size:18px; border:none; padding:0;}
  .lapclose:active{background:var(--line);}
  .laphead{display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; padding-right:32px;}
  .laphead .cmicon{margin-bottom:0; flex-shrink:0;}
  .lapframe-wrap{position:relative; flex:1; min-height:280px; border-radius:10px; overflow:hidden; border:.5px solid var(--line); background:var(--page); margin-bottom:14px;}
  .lapframe{width:100%; height:100%; min-height:280px; display:block; background:#fff; border:none;}
  .lapframe-loading{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; font-size:12px; color:var(--tx2); background:var(--page);}
  .lapbtns{display:flex; gap:10px;}

  /* ====== PENYESUAIAN TABLET / LAYAR LEBAR ====== */
  @media (min-width:700px){
    :root{ --maxw:680px; }
    body{ background:#dedede; }
    /* Carousel: tampilkan 2 kartu berdampingan bila muat */
    .saldo-slide{ width:calc((100% - 12px)/2); }
    .saldo-slide.solo{ width:100%; }
    /* Form dan beberapa area beri sedikit napas lebih */
    .form,.set{ padding-left:22px; padding-right:22px; }
    .list{ padding-left:22px; padding-right:22px; }
    /* Item lebih tinggi sedikit supaya sentuhan nyaman di tablet */
    .item{ padding:13px 0; }
    .nav button .ico{ font-size:23px; }
  }
  @media (min-width:900px){
    :root{ --maxw:760px; }
  }

  /* ====== TEMA GELAP ====== */
  [data-theme="dark"]{
    --biru:#3D8BD4; --biru-tua:#2A6CB0;
    --hijau:#2BB387; --hijau-bg:#13322A; --hijau-tx:#62D7AD;
    --merah:#E0594C; --merah-bg:#3A1E1C; --merah-tx:#F0897F;
    --kuning-bg:#33291A; --kuning-tx:#E0B468;
    --page:#14161A; --card:#1E2127; --line:#2C2F36;
    --tx:#ECECEA; --tx2:#A6A6A0; --tx3:#76766F;
  }

  [data-theme="dark"] .nominal-wrap,
  [data-theme="dark"] .tipe2 button,
  [data-theme="dark"] .upload,
  [data-theme="dark"] .chip,
  [data-theme="dark"] .rep-card,
  [data-theme="dark"] .chartwrap,

  [data-theme="dark"] .menu-row,

  [data-theme="dark"] .btn-logout,
  [data-theme="dark"] .guide-toggle,
  [data-theme="dark"] .btn-danger,

  [data-theme="dark"] .psel{ background:var(--card); }
  [data-theme="dark"] .seg,
  [data-theme="dark"] .metode{ background:#0F1216; }
  [data-theme="dark"] .seg button.on,
  [data-theme="dark"] .metode button.on{ background:var(--card); color:var(--tx); }
  [data-theme="dark"] .ava,
  [data-theme="dark"] .pava-i,
  [data-theme="dark"] .menu-ic,
  [data-theme="dark"] .peninfo.aktif,
  [data-theme="dark"] .scaninfo.load,
  [data-theme="dark"] .chooser{ background:#1B2A3A; color:var(--biru); }
  [data-theme="dark"] .draftbox,
  [data-theme="dark"] .panel .bs,
  [data-theme="dark"] .menu-row:active{ background:#181B20; }
  [data-theme="dark"] .chart-legend, [data-theme="dark"] .catrow{ color:var(--tx); }
  [data-theme="dark"] .appbar .eye,
  [data-theme="dark"] .uring,
  [data-theme="dark"] .acts-card{ background:var(--card); }
  [data-theme="dark"] .acts-cancel{ background:#181B20; }
  [data-theme="dark"] .ubadge.belum{ background:#1B2A3A; color:var(--biru); }
</style>
</head>

<script type="text/plain" id="gasCode">
var SHEET_NAME = 'Transaksi';
var HEADERS = ['id', 'tanggal', 'tipe', 'kategori', 'nominal', 'keterangan', 'catatan', 'createdAt', 'user', 'akunId'];
var SHEET_UTANG = 'Utang';
var HEADERS_UTANG = ['id', 'jenis', 'pihak', 'pokok', 'tanggal', 'jatuhTempo', 'catatan', 'pembayaran', 'createdAt', 'user', 'akunId'];
var SHEET_AKUN = 'Akun';
var HEADERS_AKUN = ['id', 'nama', 'jenis', 'saldoAwal', 'catatan', 'createdAt', 'user'];
var SHEET_TRANSFER = 'Transfer';
var HEADERS_TRANSFER = ['id', 'tanggal', 'dariAkunId', 'keAkunId', 'nominal', 'catatan', 'createdAt', 'user'];

function doPost(e) {
  try {
    var body = JSON.parse(e.postData.contents);
    var action = body.action;
    var out;
    if (action === 'list') out = listTransaksi(body.user);
    else if (action === 'sync') out = syncTransaksi(body.items);
    else if (action === 'add') out = syncTransaksi([body.item]);
    else if (action === 'delete') out = deleteMany([body.id]);
    else if (action === 'deleteMany') out = deleteMany(body.ids);
    else if (action === 'listUtang') out = listUtang(body.user);
    else if (action === 'syncUtang') out = syncUtang(body.items);
    else if (action === 'deleteUtang') out = deleteUtang(body.ids);
    else if (action === 'listAkun') out = listAkun(body.user);
    else if (action === 'syncAkun') out = syncAkun(body.items);
    else if (action === 'deleteAkun') out = deleteAkun(body.ids);
    else if (action === 'listTransfer') out = listTransfer(body.user);
    else if (action === 'syncTransfer') out = syncTransfer(body.items);
    else if (action === 'deleteTransfer') out = deleteTransfer(body.ids);
    else if (action === 'kirimOtp') out = kirimOtp(body.phone);
    else if (action === 'verifikasiOtp') out = verifikasiOtp(body.phone, body.code);
    else out = { ok: false, error: 'Aksi tidak dikenal: ' + action };
    return json(out);
  } catch (err) {
    return json({ ok: false, error: String(err) });
  }
}

function doGet(e) {
  var p = (e && e.parameter) || {};
  var out = { ok: true, message: 'KeuanganKu API aktif' };
  if (p.action === 'list') out = listTransaksi(p.user);
  if (p.action === 'listUtang') out = listUtang(p.user);
  if (p.action === 'listAkun') out = listAkun(p.user);
  if (p.action === 'listTransfer') out = listTransfer(p.user);
  if (p.action === 'cekKuota') out = cekKuota();
  if (p.callback) {
    return ContentService.createTextOutput(p.callback + '(' + JSON.stringify(out) + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return json(out);
}

function json(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);

function kirimOtp(phone) {
  try {
    phone = String(phone || '').replace(/\D/g, '');
    if (!phone) return { ok: false, error: 'Nomor tidak valid' };
    var token = PropertiesService.getScriptProperties().getProperty('FONNTE_TOKEN');
    if (!token) return { ok: false, error: 'FONNTE_TOKEN belum diatur di Script Properties' };

    var code = String(Math.floor(100000 + Math.random() * 900000));
    var expiresAt = Math.floor(Date.now() / 1000) + OTP_MASA_BERLAKU_DETIK;

    var sh = sheetOtp();
    var values = sh.getDataRange().getValues();
    var baris = -1;
    for (var i = 1; i < values.length; i++) { if (String(values[i][0]) === phone) { baris = i + 1; break; } }
    if (baris > 0) sh.getRange(baris, 1, 1, 3).setValues([[phone, code, expiresAt]]);
    else sh.appendRow([phone, code, expiresAt]);

    var resp = UrlFetchApp.fetch('https://api.fonnte.com/send', {
      method: 'post',
      headers: { Authorization: token },
      payload: { target: phone, message: 'Kode verifikasi KeuanganKu Anda: ' + code + '\nBerlaku 5 menit. Jangan bagikan kode ini ke siapa pun.' },
      muteHttpExceptions: true
    });
    var hasil = JSON.parse(resp.getContentText() || '{}');
    if (hasil.status === false) return { ok: false, error: hasil.reason || 'Gagal mengirim pesan' };
    return { ok: true };
  } catch (err) {
    return { ok: false, error: String(err) };
  }
}

function verifikasiOtp(phone, code) {
  try {
    phone = String(phone || '').replace(/\D/g, '');
    code = String(code || '').trim();
    var sh = sheetOtp();
    var values = sh.getDataRange().getValues();
    for (var i = 1; i < values.length; i++) {
      if (String(values[i][0]) === phone) {
        var cocok = String(values[i][1]) === code;
        var belumKedaluwarsa = Math.floor(Date.now() / 1000) <= Number(values[i][2]);
        if (cocok && belumKedaluwarsa) { sh.deleteRow(i + 1); return { ok: true }; }
        if (cocok && !belumKedaluwarsa) return { ok: false, error: 'Kode sudah kedaluwarsa' };
        return { ok: false, error: 'Kode salah' };
      }
    }
    return { ok: false, error: 'Belum ada permintaan kode untuk nomor ini' };
  } catch (err) {
    return { ok: false, error: String(err) };
  }
}

<script>

var LS_URL='kk_gas_url';
/* Alamat pencadangan disimpan terpisah per nomor Telepon yang sedang login,
   supaya kalau logout lalu login dengan nomor lain, alamatnya menyesuaikan
   nomor itu sendiri (kosong kalau nomor tersebut belum pernah mengatur). */
function gasUrlKey(){ var p=(typeof emailUser==='function'?emailUser():''); return p ? (LS_URL+'_'+p) : LS_URL; }
function getGasUrl(){
  var key=gasUrlKey();
  var v=localStorage.getItem(key);
  if(v==null && key!==LS_URL){
    /* migrasi ramah untuk pengguna lama: alamat tunggal sebelumnya (belum per-nomor)
       dipindahkan sekali ke nomor yang sedang login saat ini. */
    var lama=localStorage.getItem(LS_URL);
    if(lama){ localStorage.setItem(key, lama); return lama; }
    return '';
  }
  return v||'';
}
function setGasUrl(u){ localStorage.setItem(gasUrlKey(), u.trim()); }

  var d=String(v||'').replace(/\D/g,'');

/* ====== INDEXEDDB ====== */
var DB=null;
function openDB(){
  return new Promise(function(res,rej){
    var req=indexedDB.open('keuanganku',4);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('transaksi')){
        var st=db.createObjectStore('transaksi',{keyPath:'id'});
        st.createIndex('tanggal','tanggal',{unique:false});
        st.createIndex('terkirim','terkirim',{unique:false});
      }
      if(!db.objectStoreNames.contains('utang')){
        db.createObjectStore('utang',{keyPath:'id'});
      }
      /* Foto profil disimpan lokal saja per nomor Telepon, tidak pernah dikirim
         ke layanan pencadangan/Drive, supaya tetap ada tiap login dengan nomor yang sama. */
      if(!db.objectStoreNames.contains('avatars')){
        db.createObjectStore('avatars',{keyPath:'phone'});
      }
      if(!db.objectStoreNames.contains('akun')){
        db.createObjectStore('akun',{keyPath:'id'});
      }
      if(!db.objectStoreNames.contains('transfer')){
        db.createObjectStore('transfer',{keyPath:'id'});
      }
    };
    req.onsuccess=function(e){ DB=e.target.result; res(DB); };
    req.onerror=function(e){ rej(e.target.error); };
  });
}
function tx(mode){ return DB.transaction('transaksi',mode).objectStore('transaksi'); }
function idbGetAll(){ return new Promise(function(res,rej){ var r=tx('readonly').getAll(); r.onsuccess=function(){res(r.result||[]);}; r.onerror=function(){rej(r.error);}; }); }
function idbPut(item){ return new Promise(function(res,rej){ var r=tx('readwrite').put(item); r.onsuccess=function(){res();}; r.onerror=function(){rej(r.error);}; }); }
function idbDelete(id){ return new Promise(function(res,rej){ var r=tx('readwrite').delete(id); r.onsuccess=function(){res();}; r.onerror=function(){rej(r.error);}; }); }
function idbBulkPut(items){
  return new Promise(function(res,rej){
    var t=DB.transaction('transaksi','readwrite'), st=t.objectStore('transaksi');
    items.forEach(function(it){ st.put(it); });
    t.oncomplete=function(){res();}; t.onerror=function(){rej(t.error);};
  });
}

      r.onerror=function(){ res(); };
    }catch(e){ res(); }
  });

/* ====== MODAL KONFIRMASI (pengganti confirm() bawaan) ====== */
function confirmModal(text, opt){
  opt=opt||{};
  return new Promise(function(res){
    var mask=document.getElementById('cmMask');
    var icon=document.getElementById('cmIcon');
    document.getElementById('cmTitle').textContent=opt.title||(opt.danger?'Hapus data?':'Konfirmasi');
    document.getElementById('cmText').textContent=text;
    icon.className='cmicon '+(opt.danger?'danger':'info');
    icon.innerHTML=opt.danger?'&#128465;':'&#10068;';
    var okBtn=document.getElementById('cmOk'), cancelBtn=document.getElementById('cmCancel');
    okBtn.textContent=opt.okText||(opt.danger?'Hapus':'OK');
    okBtn.className='cmbtn ok'+(opt.danger?' danger':'');
    cancelBtn.textContent=opt.cancelText||'Batal';
    mask.classList.add('show');
    function cleanup(v){ mask.classList.remove('show'); okBtn.onclick=null; cancelBtn.onclick=null; res(v); }
    okBtn.onclick=function(){ cleanup(true); };
    cancelBtn.onclick=function(){ cleanup(false); };
  });
}

function dalamPeriode(tgl){
  var t=new Date(tgl+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  if(periode==='harian') return t.getTime()===now.getTime();
  if(periode==='mingguan'){ var a=new Date(now); a.setDate(now.getDate()-6); return t>=a && t<=now; }
  return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
}
function dalamRentang(tgl){
  var t=new Date(tgl+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  if(syncRange==='hari') return t.getTime()===now.getTime();
  if(syncRange==='minggu'){ var a=new Date(now); a.setDate(now.getDate()-6); return t>=a && t<=now; }
  if(syncRange==='bulan') return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
  if(syncRange==='tahun') return t.getFullYear()===now.getFullYear();
  if(syncRange==='semua') return true;
  if(syncRange==='kustom'){ return tgl>=kustomAwal && tgl<=kustomAkhir; }
  return false;
}
function labelTanggal(tgl){
  var t=new Date(tgl+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  var beda=Math.round((now-t)/86400000);
  if(beda===0) return 'Hari ini'; if(beda===1) return 'Kemarin';
  if(beda>1 && beda<7) return beda+' hari lalu';
  return t.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}

/* ====== KOMUNIKASI DENGAN LAYANAN PENCADANGAN (kebal CORS) ======
   Baca via JSONP (tag script), tulis via fetch mode no-cors,
   agar berfungsi dari GitHub Pages tanpa galat CORS. */
function jsonp(params){
  return new Promise(function(res,rej){
    var url=getGasUrl();
    if(!url){ rej(new Error('Layanan pencadangan belum terhubung. Atur di tab Profil, menu Koneksi Pencadangan.')); return; }
    var cb='kk_cb_'+Date.now().toString(36)+Math.floor(Math.random()*1e4);
    var sep=url.indexOf('?')>=0?'&':'?';
    var s=document.createElement('script');
    var timer=setTimeout(function(){ cleanup(); rej(new Error('Layanan tidak merespons. Periksa kembali pengaturan koneksi lalu coba lagi.')); },20000);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb]=function(data){ cleanup(); res(data); };
    s.onerror=function(){ cleanup(); rej(new Error('Gagal terhubung ke layanan')); };
    s.src=url+sep+params+'&callback='+cb;
    document.body.appendChild(s);
  });
}
function kirimNoCors(action,extra){
  var url=getGasUrl();
  if(!url) return Promise.reject(new Error('Layanan pencadangan belum terhubung. Atur di tab Profil, menu Koneksi Pencadangan.'));
  return fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action:action},extra||{}))});
}

async function claimOrphans(){
  try{
    var all=await idbGetAll();
    var orphans=all.filter(function(t){ return !t.user; });
    if(orphans.length){ orphans.forEach(function(t){ t.user=emailUser(); }); await idbBulkPut(orphans); return await idbGetAll(); }
    return all;
  }catch(e){ return await idbGetAll(); }
}
async function hapusTx(id){
  if(!await confirmModal('Hapus transaksi ini?', {danger:true})) return;
  TX=TX.filter(function(t){return t.id!==id;});
  await idbDelete(id); addDel([id]); updatePip(); render();
  flushDeletes();
}
async function hapusSemua(){
  if(!TX.length){ toast('Tidak ada transaksi milik Anda'); return; }
  if(!await confirmModal('Hapus semua '+TX.length+' transaksi?', {danger:true})) return;
  var ids=TX.map(function(t){return t.id;});
  for(var i=0;i<ids.length;i++){ await idbDelete(ids[i]); }
  addDel(ids); TX=[]; updatePip(); render();
  toast('Menghapus data, mohon tunggu sebentar...'); await flushDeletes();
  toast(getDelQueue().length? 'Dihapus di perangkat. Akan diselesaikan saat online.' : 'Semua transaksi dihapus');
}

/* ====== KIRIM DATA UNTUK DICADANGKAN ====== */
async function kirimRentang(){
  var dalam=TX.filter(function(t){return dalamRentang(t.tanggal);});
  if(!dalam.length){ toast('Tidak ada transaksi pada rentang ini'); return; }
  showProgress('Mencadangkan data');
  try{
    setProgress(10,'Menyiapkan '+dalam.length+' transaksi...');
    var items=dalam.map(function(t){ return {id:t.id,tanggal:t.tanggal,tipe:t.tipe,kategori:t.kategori,nominal:t.nominal,keterangan:t.keterangan,catatan:t.catatan,akunId:t.akunId||'',createdAt:t.createdAt,user:t.user||emailUser()}; });
    setProgress(30,'Mengirim data...');
    await kirimNoCors('sync',{items:items});
    var sukses=dalam;
    setProgress(50,'Memverifikasi data...');
    try{ var d=await jsonp('action=list'); var ada={}; (d.data||[]).forEach(function(r){ ada[String(r.id)]=true; }); var cek=dalam.filter(function(t){return ada[String(t.id)];}); if(cek.length) sukses=cek; }catch(e){}
    sukses.forEach(function(t){ t.terkirim=true; });
    await idbBulkPut(sukses);
    setProgress(68,'Menyelaraskan hutang & piutang...');
    try{
      var utBelum=UT.filter(function(u){ return !u.terkirim; });
      if(utBelum.length){
        var uitems=utBelum.map(function(u){ return {id:u.id,jenis:u.jenis,pihak:u.pihak,pokok:u.pokok,tanggal:u.tanggal,jatuhTempo:u.jatuhTempo||'',catatan:u.catatan||'',pembayaran:JSON.stringify(u.pembayaran||[]),createdAt:u.createdAt||'',akunId:u.akunId||'',user:u.user||emailUser()}; });
        await kirimNoCors('syncUtang',{items:uitems});
        utBelum.forEach(function(u){ u.terkirim=true; }); await uBulkPut(utBelum);
      }
    }catch(e){}
    setProgress(80,'Menyelaraskan penampung saldo...');
    try{
      var akBelum=AK.filter(function(a){ return !a.terkirim; });
      if(akBelum.length){
        var akitems=akBelum.map(function(a){ return {id:a.id,nama:a.nama,jenis:a.jenis,saldoAwal:a.saldoAwal,catatan:a.catatan||'',createdAt:a.createdAt||'',user:a.user||emailUser()}; });
        await kirimNoCors('syncAkun',{items:akitems});
        akBelum.forEach(function(a){ a.terkirim=true; }); await akBulkPut(akBelum);
      }
      var trBelum=TR.filter(function(t){ return !t.terkirim; });
      if(trBelum.length){
        var tritems=trBelum.map(function(t){ return {id:t.id,tanggal:t.tanggal,dariAkunId:t.dariAkunId,keAkunId:t.keAkunId,nominal:t.nominal,catatan:t.catatan||'',createdAt:t.createdAt||'',user:t.user||emailUser()}; });
        await kirimNoCors('syncTransfer',{items:tritems});
        trBelum.forEach(function(t){ t.terkirim=true; }); await trBulkPut(trBelum);
      }
    }catch(e){}
    setProgress(95,'Menyelesaikan...');
    flushDeletes();
    setProgress(100,'Selesai');
    await new Promise(function(r){setTimeout(r,350);});
    hideProgress();
    toast(sukses.length+' transaksi berhasil dicadangkan');
  }catch(e){ hideProgress(); toast('Gagal mencadangkan: '+e.message); }
  updatePip(); render();
}

  showProgress('Memulihkan data');
  try{
    setProgress(12,'Mengambil transaksi...');
    var d=await jsonp('action=list');
    var q=getDelQueue(), qset={}; q.forEach(function(id){ qset[String(id)]=1; });

      var da=await jsonp('action=listAkun');

      await muatAkun();

    setProgress(92,'Mengambil perpindahan saldo...');
    try{
      var dt=await jsonp('action=listTransfer');
      var dariT=(dt.data||[]).filter(function(r){ return r.user===emailUser(); }).map(function(r){ r.terkirim=true; return r; });
      if(dariT.length) await trBulkPut(dariT);
      await muatTransfer();
    }catch(e){}
    setProgress(100,'Selesai');
    await new Promise(function(r){setTimeout(r,350);});
    hideProgress();
    toast(dari.length+' transaksi milik Anda tersedia di perangkat');

  updatePip(); render();

function wireSaldoCarousel(){
  var car=document.getElementById('saldoCarousel');
  if(!car) return;
  car.scrollLeft=0;
  car.addEventListener('scroll', function(){
    var slide=car.firstElementChild; if(!slide) return;
    var w=slide.getBoundingClientRect().width+12;
    var idx=Math.round(car.scrollLeft/w);
    document.querySelectorAll('.saldo-dot').forEach(function(d,i){ d.classList.toggle('on', i===idx); });
  }, {passive:true});

  function keSlide(i, mulus){
    var s=car.children[i]; if(!s) return;
    car.scrollTo({ left:Math.max(0, s.offsetLeft-18), behavior:mulus?'smooth':'auto' });
  }

  /* Titik indikator bisa diklik */
  document.querySelectorAll('#saldoDots .saldo-dot').forEach(function(d,i){
    d.onclick=function(){ keSlide(i, true); };
  });

  /* Geser kartu dengan mouse di komputer */
  window._caroDrag={ car:car, turun:false, geser:false, x0:0, s0:0 };
  car.addEventListener('mousedown', function(e){
    var st=window._caroDrag;
    st.turun=true; st.geser=false; st.x0=e.pageX; st.s0=car.scrollLeft;
    car.classList.add('men-drag');
    e.preventDefault();
  });
  car.addEventListener('click', function(e){
    var st=window._caroDrag;
    if(st && st.geser){ e.stopPropagation(); e.preventDefault(); st.geser=false; }
  }, true);
  if(!window._caroDragGlobal){
    window._caroDragGlobal=true;
    window.addEventListener('mousemove', function(e){
      var st=window._caroDrag;
      if(!st || !st.turun || !document.body.contains(st.car)) return;
      var dx=e.pageX-st.x0;
      if(Math.abs(dx)>5) st.geser=true;
      st.car.scrollLeft=st.s0-dx;
    });
    window.addEventListener('mouseup', function(){
      var st=window._caroDrag;
      if(!st || !st.turun) return;
      st.turun=false;
      st.car.classList.remove('men-drag');
      if(st.geser && st.car.firstElementChild && document.body.contains(st.car)){
        var w=st.car.firstElementChild.getBoundingClientRect().width+12;
        var idx=Math.max(0, Math.min(st.car.children.length-1, Math.round(st.car.scrollLeft/w)));
        var s=st.car.children[idx];
        if(s) st.car.scrollTo({ left:Math.max(0, s.offsetLeft-18), behavior:'smooth' });
      }
    });
  }
}

  var items=[];
  (txArr||[]).forEach(function(t){ items.push({k:'tx', t:t.tanggal, c:t.createdAt||'', d:t}); });
  (trArr||[]).forEach(function(t){ items.push({k:'tr', t:t.tanggal, c:t.createdAt||'', d:t}); });
  items.sort(function(a,b){ return (b.t+(b.c||'')).localeCompare(a.t+(a.c||'')); });
  return items;
}

/* Perkecil & kompres foto sebelum disimpan, supaya ringan di localStorage. */
function simpanAvatarDariFoto(dataUrl){
  var img=new Image();
  img.onload=function(){
    var maxSisi=360;
    var skala=Math.min(1, maxSisi/Math.max(img.naturalWidth,img.naturalHeight));
    var w=Math.max(1,Math.round(img.naturalWidth*skala)), h=Math.max(1,Math.round(img.naturalHeight*skala));
    var c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    var hasil; try{ hasil=c.toDataURL('image/jpeg',0.82); }catch(e){ hasil=dataUrl; }
    simpanAvatar(hasil);
  };
  img.onerror=function(){ simpanAvatar(dataUrl); };
  img.src=dataUrl;
}
async function simpanAvatar(dataUrl){

/* ====== PEMINDAI STRUK: KETUK PER KATA, BANYAK TRANSAKSI ======
   Seluruh struk dibaca OCR sekali. Tiap kata (pisah spasi) jadi satu
   kotak yang tinggal diketuk. Nama barang banyak kata: ketuk tiap katanya. */
function mulaiStrukDariDataURL(dataUrl){
  var img=new Image();
  img.onload=function(){
    strukState=blankStruk();
    strukState.fotoData=dataUrl; strukState.img=img;
    strukState.ch=Math.round(strukState.cw*img.naturalHeight/img.naturalWidth);
    goView('struk');
    startScanOCR();
  };
  img.onerror=function(){ toast('Gambar tidak terbaca'); };
  img.src=dataUrl;
}
function onFoto(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){ mulaiStrukDariDataURL(reader.result); };
  reader.readAsDataURL(file);
}
/* Jembatan untuk APK: setelah kamera native (mis. Kodular) mengambil foto,
   panggil window.terimaFotoLuar('data:image/jpeg;base64,....') lewat RunJavaScript.
   _fotoTarget menandai foto berikutnya untuk apa: 'struk' (default), 'avatar', atau 'akunLogo'. */
var _fotoTarget='struk';
window.terimaFotoLuar=function(dataUrl){
  try{
    if(!dataUrl){ toast('Foto kosong'); return; }
    if(String(dataUrl).indexOf('data:')!==0) dataUrl='data:image/jpeg;base64,'+dataUrl;
    if(_fotoTarget==='avatar'){ _fotoTarget='struk'; simpanAvatarDariFoto(dataUrl); return; }
    if(_fotoTarget==='akunLogo'){ _fotoTarget='struk'; simpanAkunLogoDariFoto(dataUrl); return; }
    if(!USER){ toast('Masuk dulu sebelum memindai struk'); return; }
    mulaiStrukDariDataURL(dataUrl);
  }catch(e){ toast('Gagal memproses foto'); }
};
/* ====== PEMANTAU WebViewString dari WebViewer bawaan Kodular ======
   WebViewer bawaan tidak punya RunJavaScript, jadi kita polling
   WebViewString secara berkala untuk mendeteksi foto baru dari Kodular. */
var _lastWVS = '';
setInterval(function(){
  try{

function angkaDariTeks(s){
  var nums=String(s).match(/[\d][\d.,]*[\d]|\d/g)||[];
  if(!nums.length) return '';

  nums.forEach(function(n){ var d=n.replace(/\D/g,''); if(d.length>bestLen){ bestLen=d.length; best=n; } });

  if(/[.,]\d{2}$/.test(best) && digits.length>2) digits=digits.slice(0,-2);

}

function ambilKata(data, scale){
  var out=[];
  var inflX=strukState.cw*0.004, inflY=0;
  function pushWord(w){
    if(!w||!w.bbox) return;
    var t=(w.text||'').replace(/\s+/g,'').trim(); if(!t) return;
    var b=w.bbox;
    var x=b.x0*scale-inflX, y=b.y0*scale-inflY, ww=(b.x1-b.x0)*scale+inflX*2, hh=(b.y1-b.y0)*scale+inflY*2;
    if(ww<3||hh<3) return;
    out.push({text:t,x:Math.max(0,x),y:Math.max(0,y),w:ww,h:hh});
  }
  if(data&&data.blocks&&data.blocks.length){
    data.blocks.forEach(function(bl){ (bl.paragraphs||[]).forEach(function(pp){ (pp.lines||[]).forEach(function(ln){ (ln.words||[]).forEach(pushWord); }); }); });
  } else if(data&&data.words&&data.words.length){
    data.words.forEach(pushWord);
  } else if(data&&data.lines&&data.lines.length){
    data.lines.forEach(function(ln){ if(!ln.bbox) return; var toks=(ln.text||'').trim().split(/\s+/).filter(Boolean); if(!toks.length) return; var b=ln.bbox; var chars=ln.text.replace(/\s+/g,'').length||1; var x=b.x0; toks.forEach(function(tok){ var wpx=(b.x1-b.x0)*(tok.length/chars); out.push({text:tok,x:x*scale,y:b.y0*scale,w:wpx*scale,h:(b.y1-b.y0)*scale}); x+=wpx+(b.x1-b.x0)*0.015; }); });
  }
  var lineNo=0;
  for(var i=0;i<out.length;i++){
    if(i>0){ var prev=out[i-1]; if(out[i].y > prev.y + prev.h*0.6) lineNo++; }
    out[i].line=lineNo;
  }

}

function cariAkun(id){ var s=String(id); for(var i=0;i<AK.length;i++){ if(String(AK[i].id)===s) return AK[i]; } return null; }

  catch(e){ TR=[]; }
}
/* Saldo akun saat ini (sepanjang waktu): saldo awal + pemasukan - pengeluaran + transfer masuk - transfer keluar. */
function saldoAkunSaatIni(akunId){
  var a=cariAkun(akunId); if(!a) return 0;
  var aid=String(akunId);
  var masuk=TX.filter(function(t){return String(t.akunId)===aid && t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
  var keluar=TX.filter(function(t){return String(t.akunId)===aid && t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);
  var trMasuk=TR.filter(function(t){return String(t.keAkunId)===aid;}).reduce(function(s,t){return s+(+t.nominal);},0);
  var trKeluar=TR.filter(function(t){return String(t.dariAkunId)===aid;}).reduce(function(s,t){return s+(+t.nominal);},0);
  return (+a.saldoAwal||0)+masuk-keluar+trMasuk-trKeluar;
}
/* Cek apakah pengeluaran/perpindahan keluar sebesar `nominal` boleh dilakukan dari
   penampung ini. Untuk kartu kredit, selalu boleh (saldo minus = tagihan berjalan).
   Untuk penampung lain, tidak boleh melebihi saldo tersedia. */
function bolehKeluar(akunId, nominal){
  var a=cariAkun(akunId);
  if(!a) return {ok:false, alasan:'Penampung saldo tidak ditemukan'};
  if(a.jenis==='kartu') return {ok:true};
  var sisa=saldoAkunSaatIni(akunId);
  if((+nominal) > sisa){
    return {ok:false, alasan:'Saldo '+esc(a.nama)+' tidak cukup. Tersedia '+rp(sisa)+'.'};
  }
  return {ok:true};
}
function akunPeriode(akunId){
  var aid=String(akunId);
  var px=TX.filter(function(t){return String(t.akunId)===aid && dalamPeriode(t.tanggal);});
  var pM=px.filter(function(t){return t.tipe==='pemasukan';}).reduce(function(s,t){return s+(+t.nominal);},0);
  var pK=px.filter(function(t){return t.tipe==='pengeluaran';}).reduce(function(s,t){return s+(+t.nominal);},0);
  return {masuk:pM, keluar:pK};
}
/* Perpindahan saldo pada periode berjalan untuk satu penampung:
   masuk = transfer yang diterima, keluar = transfer yang dikirim. */
function akunTransferPeriode(akunId){
  var aid=String(akunId);
  var masuk=TR.filter(function(t){return String(t.keAkunId)===aid && dalamPeriode(t.tanggal);}).reduce(function(s,t){return s+(+t.nominal);},0);
  var keluar=TR.filter(function(t){return String(t.dariAkunId)===aid && dalamPeriode(t.tanggal);}).reduce(function(s,t){return s+(+t.nominal);},0);
  return {masuk:masuk, keluar:keluar};
}
/* Untuk kartu per-penampung: pemasukan & pengeluaran termasuk perpindahan saldo,
   karena dari sudut pandang satu penampung, transfer masuk = uang datang, transfer keluar = uang pergi. */
function akunPeriodeGabung(akunId){
  var p=akunPeriode(akunId), tp=akunTransferPeriode(akunId);
  return {masuk:p.masuk+tp.masuk, keluar:p.keluar+tp.keluar};
}

function onAkunLogoFileInput(input){
  var file=input.files[0]; if(!file) return;

/* Perkecil logo sebelum disimpan, disimpan lokal saja (tidak ikut dicadangkan ke Drive). */
function simpanAkunLogoDariFoto(dataUrl){
  var img=new Image();
  img.onload=function(){
    var maxSisi=200;
    var skala=Math.min(1, maxSisi/Math.max(img.naturalWidth,img.naturalHeight));
    var w=Math.max(1,Math.round(img.naturalWidth*skala)), h=Math.max(1,Math.round(img.naturalHeight*skala));
    var c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    var hasil; try{ hasil=c.toDataURL('image/png'); }catch(e){ hasil=dataUrl; }
    if(!akunState) akunState=blankAkun();
    akunState.logo=hasil; renderAkunAdd();
  };
  img.onerror=function(){ if(!akunState) akunState=blankAkun(); akunState.logo=dataUrl; renderAkunAdd(); };
  img.src=dataUrl;
}

function blankTransfer(){ return {dariAkunId:(AK[0]?AK[0].id:''), keAkunId:(AK[1]?AK[1].id:(AK[0]?AK[0].id:'')), nominal:'', tanggal:todayISO(), catatan:''}; }

async function simpanTransfer(){
  var t=transferState;
  /* Baca langsung dari elemen select supaya nilai tetap benar walau pengguna
     tidak mengubah pilihan (event onchange tidak terpicu untuk pilihan default). */
  var elDari=document.getElementById('trDari'), elKe=document.getElementById('trKe');
  if(elDari) t.dariAkunId=elDari.value;
  if(elKe) t.keAkunId=elKe.value;
  if(!t.dariAkunId||!t.keAkunId){ toast('Pilih akun asal dan tujuan'); return; }
  if(t.dariAkunId===t.keAkunId){ toast('Akun asal dan tujuan tidak boleh sama'); return; }
  if(!t.nominal||+t.nominal<=0){ toast('Nominal belum diisi'); return; }
  var cek=bolehKeluar(t.dariAkunId, +t.nominal);
  if(!cek.ok){ toast(cek.alasan); return; }
  var item={ id:uid(), tanggal:t.tanggal, dariAkunId:t.dariAkunId, keAkunId:t.keAkunId, nominal:+t.nominal, catatan:(t.catatan||'').trim(), createdAt:new Date().toISOString(), terkirim:false, user:emailUser() };
  TR.unshift(item); await trPut(item);
  /* Jika tujuan transfer adalah kartu kredit, transfer ini dianggap pembayaran tagihan:
     hutang berjalan kartu tersebut dikurangi (bertahap dari yang paling lama, atau lunas). */
  var pesanTambahan='';
  var keAkun=cariAkun(t.keAkunId);
  if(keAkun && keAkun.jenis==='kartu'){
    var dariAkun=cariAkun(t.dariAkunId);
    var berkurang=await terapkanPembayaranKartu(keAkun, +t.nominal, t.tanggal, dariAkun?dariAkun.nama:'penampung lain');
    if(berkurang>0) pesanTambahan=' Hutang tagihan '+keAkun.nama+' berkurang '+rp(berkurang)+'.';
  }
  transferState=null; toast('Perpindahan saldo tersimpan.'+pesanTambahan); goView('home');
}
/* Terapkan pembayaran ke hutang berjalan sebuah kartu kredit, dari yang paling lama.
   Bisa sebagian atau sekaligus, tergantung nominal yang dibayar. Kembalikan total yang berkurang. */
async function terapkanPembayaranKartu(kartu, nominal, tanggal, dariNama){
  var kid=String(kartu.id);
  var nama='Tagihan '+kartu.nama;
  var daftar=UT.filter(function(u){
    if(u.jenis!=='hutang' || utSisa(u)<=0) return false;
    return (u.akunId && String(u.akunId)===kid) || (!u.akunId && u.pihak===nama);
  });
  daftar.sort(function(a,b){ return (a.tanggal+(a.createdAt||'')).localeCompare(b.tanggal+(b.createdAt||'')); });
  var sisa=nominal, berkurang=0;
  for(var i=0;i<daftar.length && sisa>0;i++){
    var u=daftar[i];
    var perlu=utSisa(u);
    var bayar=Math.min(perlu, sisa);
    if(bayar<=0) continue;
    u.pembayaran=u.pembayaran||[];
    u.pembayaran.push({ tanggal:tanggal, nominal:bayar, catatan:'Pembayaran dari '+dariNama });
    if(!u.akunId) u.akunId=kid;
    u.terkirim=false;
    await uPut(u);
    sisa-=bayar; berkurang+=bayar;
  }
  return berkurang;
}

  if(getGasUrl()){ try{ kirimNoCors('deleteTransfer',{ids:[id], user:emailUser()}); }catch(e){} }
  render();
}

function setExpRange(r){ expRange=r; render(); }
function inRange(tgl, mode, awal, akhir){
  var t=new Date(tgl+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  if(mode==='hari') return t.getTime()===now.getTime();
  if(mode==='minggu'){ var a=new Date(now); a.setDate(now.getDate()-6); return t>=a && t<=now; }
  if(mode==='bulan') return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
  if(mode==='kustom') return tgl>=awal && tgl<=akhir;
  return true;
}
function labelRentang(){
  if(expRange==='hari') return new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  if(expRange==='minggu') return '7 hari terakhir';
  if(expRange==='bulan') return new Date().toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  if(expRange==='kustom') return expAwal+' s/d '+expAkhir;

function totalExport(rows){

}

<script>
/* PATCH KAMERA v3: mode pemindai struk.
   Ganti seluruh patch kamera v2 dengan blok ini (tempel sebelum </body>).

   Fitur baru dibanding v2:
   - Bingkai panduan struk + area luar digelapkan (mode struk).
   - Hasil jepretan otomatis dipotong sesuai bingkai (mode struk).
   - Indikator kualitas: terlalu gelap, terlalu terang, kurang tajam, pas.
   - Tombol senter (torch), tampil hanya bila perangkat mendukung.
   - Resolusi diminta lebih tinggi supaya teks struk terbaca jelas.
   Tidak ada perubahan blok Kodular yang diperlukan. */
(function(){
  /* Ambang penilaian kualitas, silakan setel bila perlu */
  var HAMBANG_GELAP  = 55;   /* rata-rata terang 0-255, di bawah ini dianggap gelap */
  var HAMBANG_TERANG = 215;  /* di atas ini dianggap terlalu terang / silau */
  var HAMBANG_TAJAM  = 5;    /* rata-rata gradien, di bawah ini dianggap buram */

  function adaAPK(){ return !!(window.AppInventor && window.AppInventor.setWebViewString); }
  function perangkatSentuh(){
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent));
  }

  var _stream=null, _cb=null, _gagalCb=null, _facing='environment';
  var _mode='struk', _senterNyala=false, _analisaTimer=null;

  function hentikanStream(){
    if(_analisaTimer){ clearInterval(_analisaTimer); _analisaTimer=null; }
    _senterNyala=false;
    if(_stream){ _stream.getTracks().forEach(function(t){ t.stop(); }); _stream=null; }
  }

  function pastikanUI(){
    if(document.getElementById('kamMask')) return;
    var div=document.createElement('div');
    div.id='kamMask';
    div.style.cssText='position:fixed;inset:0;z-index:80;display:none;flex-direction:column;background:#000';
    div.innerHTML=
      '<div style="position:relative;flex:1;overflow:hidden">'+
        '<video id="kamVideo" autoplay playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000"></video>'+
        '<div id="kamGelap" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">'+
          '<div id="kamBingkai" style="width:72%;max-width:340px;aspect-ratio:3/4.6;border:2.5px solid rgba(255,255,255,.95);border-radius:14px;box-shadow:0 0 0 4000px rgba(0,0,0,.55)"></div>'+
        '</div>'+
        '<div id="kamStatus" style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#fff;font-size:13px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;transition:background .3s">Arahkan kamera ke struk</div>'+
      '</div>'+
      '<div style="display:flex;gap:10px;align-items:center;justify-content:center;padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 16px);background:#000">'+
        '<button class="cmbtn cancel" style="flex:0 0 auto;padding:12px 16px" onclick="tutupKameraWeb()">Batal</button>'+
        '<button id="kamSenter" class="cmbtn cancel" style="flex:0 0 auto;padding:12px 16px;display:none" onclick="senterKameraWeb()">Senter</button>'+
        '<button class="cmbtn cancel" style="flex:0 0 auto;padding:12px 16px" onclick="balikKameraWeb()">Balik</button>'+
        '<button id="kamAmbil" class="cmbtn ok" style="flex:1;max-width:180px" onclick="jepretKameraWeb()">Ambil foto</button>'+
      '</div>';
    document.body.appendChild(div);
  }

  function sembunyikanUI(){
    var m=document.getElementById('kamMask'); if(m) m.style.display='none';
  }

  function setStatus(teks, warna){
    var s=document.getElementById('kamStatus'); if(!s) return;
    s.textContent=teks;
    s.style.background = warna==='hijau' ? 'rgba(28,140,90,.9)'
                       : warna==='merah' ? 'rgba(180,60,50,.9)'
                       : 'rgba(0,0,0,.65)';
    var b=document.getElementById('kamAmbil');
    if(b) b.style.opacity = warna==='hijau' ? '1' : '.75';
  }

  /* ===== Senter (torch) ===== */
  function cekSenter(){
    var btn=document.getElementById('kamSenter'); if(!btn) return;
    btn.style.display='none'; _senterNyala=false; btn.textContent='Senter';
    if(!_stream) return;
    var track=_stream.getVideoTracks()[0]; if(!track || !track.getCapabilities) return;
    try{
      var caps=track.getCapabilities();
      if(caps && caps.torch) btn.style.display='block';
    }catch(e){}
  }
  window.senterKameraWeb=function(){
    if(!_stream) return;
    var track=_stream.getVideoTracks()[0]; if(!track) return;
    _senterNyala=!_senterNyala;
    track.applyConstraints({ advanced:[{ torch:_senterNyala }] })
      .then(function(){
        var btn=document.getElementById('kamSenter');
        if(btn) btn.textContent=_senterNyala ? 'Senter mati' : 'Senter';
      })
      .catch(function(){ _senterNyala=false; toast('Senter tidak didukung perangkat ini'); });
  };

  /* ===== Analisis kualitas gambar ===== */
  var _cvA=document.createElement('canvas'); _cvA.width=160; _cvA.height=120;
  function analisa(){
    var v=document.getElementById('kamVideo');
    if(!v || !v.videoWidth || !_stream) return;
    var ctx=_cvA.getContext('2d');
    try{ ctx.drawImage(v,0,0,160,120); }catch(e){ return; }
    var d;
    try{ d=ctx.getImageData(0,0,160,120).data; }catch(e){ return; }
    var jml=0, grad=0, n=0, i, y0=0;
    for(i=0;i<d.length;i+=4){
      var y=(d[i]*3 + d[i+1]*6 + d[i+2])/10;
      jml+=y;
      if(i%640!==0){ grad+=Math.abs(y-y0); }
      y0=y; n++;
    }
    var terang=jml/n, tajam=grad/n;
    if(terang<HAMBANG_GELAP){
      var adaSenter=document.getElementById('kamSenter');
      setStatus(adaSenter && adaSenter.style.display!=='none'
        ? 'Terlalu gelap, nyalakan senter' : 'Terlalu gelap, cari cahaya', 'merah');
    }
    else if(terang>HAMBANG_TERANG){ setStatus('Terlalu terang, kurangi cahaya','merah'); }
    else if(tajam<HAMBANG_TAJAM){ setStatus('Tahan HP, gambar kurang tajam','merah'); }
    else{ setStatus('Pas, silakan ambil foto','hijau'); }
  }

  async function mulaiStream(facing, pertamaKali){
    _facing=facing;
    hentikanStream();
    try{
      _stream=await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ ideal:facing }, width:{ ideal:1920 }, height:{ ideal:1080 } },
        audio:false
      });
    }catch(e){
      try{ _stream=await navigator.mediaDevices.getUserMedia({ video:true, audio:false }); }
      catch(e2){
        hentikanStream(); sembunyikanUI();
        if(pertamaKali && _gagalCb){ var g=_gagalCb; _gagalCb=null; _cb=null; g(); }
        else{ toast('Kamera tidak tersedia atau izin ditolak'); }
        return;
      }
    }
    var v=document.getElementById('kamVideo');
    if(v) v.srcObject=_stream;
    document.getElementById('kamMask').style.display='flex';
    setTimeout(cekSenter, 600);
    if(_analisaTimer) clearInterval(_analisaTimer);
    _analisaTimer=setInterval(analisa, 500);
  }

  function fallbackInput(cb){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    if(perangkatSentuh()) inp.setAttribute('capture','environment');
    inp.onchange=function(){
      var f=inp.files[0]; if(!f) return;
      var r=new FileReader();
      r.onload=function(){ cb(r.result); };
      r.readAsDataURL(f);
    };
    inp.click();
  }

  /* mode: 'struk' (bingkai + potong otomatis) atau 'polos' (tanpa bingkai) */
  window.bukaKameraWeb=function(cb, onGagal, mode){
    _cb=cb; _gagalCb=onGagal||null; _mode=mode||'struk';
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
      var g=_gagalCb; _gagalCb=null; _cb=null;
      if(g) g(); else fallbackInput(cb);
      return;
    }
    pastikanUI();
    var bingkaiWrap=document.getElementById('kamGelap');
    if(bingkaiWrap) bingkaiWrap.style.display = _mode==='struk' ? 'flex' : 'none';
    setStatus(_mode==='struk' ? 'Arahkan kamera ke struk' : 'Posisikan wajah di tengah','');
    mulaiStream(perangkatSentuh() ? 'environment' : 'user', true);
  };
  window.tutupKameraWeb=function(){
    hentikanStream(); sembunyikanUI();
    _cb=null; _gagalCb=null;
  };
  window.balikKameraWeb=function(){
    mulaiStream(_facing==='environment' ? 'user' : 'environment', false);
  };

  window.jepretKameraWeb=function(){
    var v=document.getElementById('kamVideo');
    if(!v || !v.videoWidth){ toast('Kamera belum siap'); return; }
    var c=document.createElement('canvas'), ctx;
    if(_mode==='struk'){
      /* Potong sesuai bingkai. Video memakai object-fit:cover, jadi hitung
         dulu bagian video mana yang benar-benar tampil di layar. */
      var f=document.getElementById('kamBingkai').getBoundingClientRect();
      var r=v.getBoundingClientRect();
      var skala=Math.max(r.width/v.videoWidth, r.height/v.videoHeight);
      var sx=(v.videoWidth - r.width/skala)/2;
      var sy=(v.videoHeight - r.height/skala)/2;
      var cx=sx + (f.left-r.left)/skala;
      var cy=sy + (f.top-r.top)/skala;
      var cw=f.width/skala, ch=f.height/skala;
      /* beri sedikit margin 2% supaya tepi struk tidak terpotong */
      var mg=cw*0.02;
      cx=Math.max(0,cx-mg); cy=Math.max(0,cy-mg);
      cw=Math.min(v.videoWidth-cx, cw+mg*2); ch=Math.min(v.videoHeight-cy, ch+mg*2);
      c.width=Math.round(cw); c.height=Math.round(ch);
      ctx=c.getContext('2d');
      ctx.drawImage(v, cx, cy, cw, ch, 0, 0, c.width, c.height);
    } else {
      c.width=v.videoWidth; c.height=v.videoHeight;
      ctx=c.getContext('2d');
      ctx.drawImage(v,0,0);
    }
    var data;
    try{ data=c.toDataURL('image/jpeg',0.92); }
    catch(e){ toast('Gagal mengambil foto'); return; }
    var cb=_cb; _cb=null; _gagalCb=null;
    hentikanStream(); sembunyikanUI();
    if(cb) cb(data);
  };

  /* ====== Sambungkan ke alur yang sudah ada ====== */
  var _mintaFotoLama=window.mintaFoto;
  window.mintaFoto=function(sumber){
    if(sumber==='galeri'){
      if(adaAPK()){ _mintaFotoLama(sumber); }
      else{ fallbackGaleri(function(d){ mulaiStrukDariDataURL(d); }); }
      return;
    }
    bukaKameraWeb(
      function(d){ mulaiStrukDariDataURL(d); },
      function(){
        if(adaAPK()){ _mintaFotoLama('kamera'); }
        else{ fallbackInput(function(d){ mulaiStrukDariDataURL(d); }); }
      },
      'struk'
    );
  };

  var _pilihAvatarLama=window.pilihAvatar;
  window.pilihAvatar=function(sumber){
    closeAvatarSheet();
    if(sumber==='galeri'){
      if(adaAPK()){ _pilihAvatarLama(sumber); }
      else{ document.getElementById('avatarFileInput').click(); }
      return;
    }
    bukaKameraWeb(
      function(d){ simpanAvatarDariFoto(d); },
      function(){
        if(adaAPK()){ _pilihAvatarLama('kamera'); }
        else{ document.getElementById('avatarFileInput').click(); }
      },
      'polos'
    );
  };

  function fallbackGaleri(cb){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.onchange=function(){
      var f=inp.files[0]; if(!f) return;
      var r=new FileReader();
      r.onload=function(){ cb(r.result); };
      r.readAsDataURL(f);
    };
    inp.click();
  }
})();
</script>

<script>
/* PATCH: sinkron warna status bar & navigation bar Android dengan tema aplikasi.
   Mengirim pesan "TEMA|gelap" atau "TEMA|terang" ke Kodular setiap kali
   tema berubah, dan sekali saat aplikasi dibuka.
   Tempel sebelum </body>. Perlu blok tambahan di Kodular (lihat panduan). */
(function(){
  if(!(window.AppInventor && window.AppInventor.setWebViewString)) return;

  var terakhir='';
  function temaSekarang(){
    var t=(document.documentElement.getAttribute('data-theme')||'')
        +(document.body ? (document.body.getAttribute('data-theme')||'') : '');
    return t.indexOf('dark')>-1 ? 'gelap' : 'terang';
  }
  function kirimTema(){
    var t=temaSekarang();
    if(t===terakhir) return;
    terakhir=t;
    try{ window.AppInventor.setWebViewString('TEMA|'+t); }catch(e){}
  }

  var obs=new MutationObserver(kirimTema);
  obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  if(document.body){
    obs.observe(document.body,{attributes:true,attributeFilter:['data-theme']});
  }
  /* kirim kondisi awal setelah halaman siap */
  setTimeout(kirimTema, 800);
})();
</script>

<script>
/* PATCH: penanganan keyboard.
   - Nav bawah disembunyikan saat keyboard terbuka, muncul lagi saat ditutup.
   - Input yang sedang diketik otomatis digulirkan ke tengah layar.
   Tempel sebelum </body>. Tidak ada perubahan blok Kodular. */
(function(){
  var st=document.createElement('style');
  st.textContent='body.kb-buka .nav{display:none !important;}';
  document.head.appendChild(st);

  function setKb(buka){ document.body.classList.toggle('kb-buka', !!buka); }

  var vv=window.visualViewport;
  if(vv){
    var dasar=vv.height;
    vv.addEventListener('resize', function(){
      if(vv.height>dasar) dasar=vv.height;   /* ikuti rotasi layar */
      setKb(dasar - vv.height > 150);
    });
  }else{
    var dasar2=window.innerHeight;
    window.addEventListener('resize', function(){
      if(window.innerHeight>dasar2) dasar2=window.innerHeight;
      setKb(dasar2 - window.innerHeight > 150);
    });
  }

  /* Gulirkan kolom yang difokus supaya terlihat di atas keyboard */
  document.addEventListener('focusin', function(e){
    var t=e.target;
    if(t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)){
      setTimeout(function(){
        try{ t.scrollIntoView({block:'center', behavior:'smooth'}); }catch(err){}
      }, 300);
    }
  });

  /* Jaring pengaman: bila fokus hilang dan keyboard tertutup, pastikan nav kembali */
  document.addEventListener('focusout', function(){
    setTimeout(function(){
      var a=document.activeElement;
      if(!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName))) setKb(false);
    }, 150);
  });
})();
</script>
