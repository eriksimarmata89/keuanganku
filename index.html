    _senterNyala=false; _ic=null; _fokusManual=false;
    if(_stream){ _stream.getTracks().forEach(function(t){ t.stop(); }); _stream=null; }
  }
  function trackAktif(){ return _stream ? _stream.getVideoTracks()[0] : null; }

  /* ================= UI GAYA STORIES ================= */
  var IKON={
    x:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
    kilat:'<svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M13 2L4.5 13.5H11L9.5 22 19 10h-6.5L13 2z"/></svg>',
    balik:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 8a8 8 0 0 0-14.9-2M4 16a8 8 0 0 0 14.9 2"/><path d="M20 3v5h-5M4 21v-5h5"/></svg>',
    fokus:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M4 8V5a1 1 0 0 1 1-1h3M20 8V5a1 1 0 0 0-1-1h-3M4 16v3a1 1 0 0 0 1 1h3M20 16v3a1 1 0 0 1-1 1h-3"/></svg>'
  };
  function tombolBulat(id, ikon, onclick){
    return '<button id="'+id+'" onclick="'+onclick+'" style="width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent">'+ikon+'</button>';
  }
  function nyalakanIkon(id, nyala){
    var b=document.getElementById(id); if(!b) return;
    b.style.background = nyala ? 'rgba(255,213,74,.95)' : 'rgba(0,0,0,.45)';
    var svg=b.querySelector('svg'); if(!svg) return;
    svg.querySelectorAll('[stroke]').forEach(function(el){ el.setAttribute('stroke', nyala?'#111':'#fff'); });
    svg.querySelectorAll('[fill]').forEach(function(el){ if(el.getAttribute('fill')!=='none') el.setAttribute('fill', nyala?'#111':'#fff'); });
  }

  function pastikanUI(){
    var lama=document.getElementById('kamMask');
    if(lama){ if(lama.dataset.versi==='6') return; lama.remove(); }
    var div=document.createElement('div');
    div.id='kamMask'; div.dataset.versi='6';
    div.style.cssText='position:fixed;inset:0;z-index:80;display:none;background:#000';
    div.innerHTML=
      '<div id="kamWrap" style="position:absolute;inset:0;overflow:hidden;touch-action:none">'+
        '<video id="kamVideo" autoplay playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transform-origin:center center"></video>'+
        '<div id="kamGelap" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:calc(env(safe-area-inset-top,0px) + 70px) 0 calc(env(safe-area-inset-bottom,0px) + 215px);box-sizing:border-box">'+
          '<div id="kamBingkai" style="width:72%;max-width:340px;aspect-ratio:3/4.6;max-height:100%;border:2.5px solid rgba(255,255,255,.95);border-radius:14px;box-shadow:0 0 0 4000px rgba(0,0,0,.45)"></div>'+
        '</div>'+
        '<div id="kamRing" style="position:absolute;width:64px;height:64px;border:2px solid #ffd54a;border-radius:50%;pointer-events:none;display:none;transform:translate(-50%,-50%);transition:opacity .3s"></div>'+
      '</div>'+

      /* lapisan kontrol di atas pratinjau */
      '<div style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);left:12px;z-index:2">'+
        tombolBulat('kamTutup', IKON.x, 'tutupKameraWeb()')+
      '</div>'+
      '<div id="kamStatus" style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 18px);left:50%;transform:translateX(-50%);z-index:1;background:rgba(0,0,0,.55);color:#fff;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:18px;white-space:nowrap;max-width:62%;overflow:hidden;text-overflow:ellipsis;transition:background .3s">Arahkan kamera</div>'+
      '<div style="position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:12px;z-index:2;display:flex;flex-direction:column;gap:12px">'+
        tombolBulat('kamSenter', IKON.kilat, 'senterKameraWeb()')+
        tombolBulat('kamBalik', IKON.balik, 'balikKameraWeb()')+
        tombolBulat('kamFokusBtn', IKON.fokus, 'fokusManualKameraWeb()')+
      '</div>'+

      /* panel bawah: slider fokus, slider zoom, tombol jepret */
      '<div style="position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none">'+
        '<div id="kamFokusRow" style="display:none;align-items:center;gap:8px;width:70%;max-width:320px;background:rgba(0,0,0,.45);border-radius:16px;padding:7px 12px;pointer-events:auto">'+
          '<span style="color:#eee;font-size:10.5px;flex:0 0 auto">Dekat</span>'+
          '<input id="kamFokusSlider" type="range" style="flex:1;accent-color:#ffd54a;height:18px">'+
          '<span style="color:#eee;font-size:10.5px;flex:0 0 auto">Jauh</span>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px;width:70%;max-width:320px;background:rgba(0,0,0,.45);border-radius:16px;padding:7px 12px;pointer-events:auto">'+
          '<input id="kamZoomSlider" type="range" style="flex:1;accent-color:#fff;height:18px">'+
          '<span id="kamZoomLbl" style="color:#fff;font-size:11px;font-weight:700;flex:0 0 32px;text-align:right">1.0x</span>'+
        '</div>'+
        '<button id="kamAmbil" onclick="jepretKameraWeb()" style="pointer-events:auto;width:74px;height:74px;border-radius:50%;border:4px solid rgba(255,255,255,.95);background:transparent;display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent">'+
          '<span id="kamAmbilInti" style="width:56px;height:56px;border-radius:50%;background:#fff;transition:transform .12s, background .2s"></span>'+
        '</button>'+
      '</div>';
    document.body.appendChild(div);

    var v=document.getElementById('kamVideo');
    if(v) v.addEventListener('click', fokusTitik);

    var zs=document.getElementById('kamZoomSlider');
    if(zs) zs.addEventListener('input', function(){ setZoom(parseFloat(zs.value)); });

    var fs=document.getElementById('kamFokusSlider');
    if(fs) fs.addEventListener('input', function(){ setFokusManual(parseFloat(fs.value)); });

    var wrap=document.getElementById('kamWrap');
    var jarakAwal=0, zoomAwal=1;
    function jarak(e){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      return Math.sqrt(dx*dx+dy*dy);
    }
    wrap.addEventListener('touchstart', function(e){
      if(e.touches.length===2){ jarakAwal=jarak(e); zoomAwal=_zoomVal; }
    }, {passive:true});
    wrap.addEventListener('touchmove', function(e){
      if(e.touches.length===2 && jarakAwal>0){
        e.preventDefault();
        setZoom(zoomAwal * (jarak(e)/jarakAwal));
      }
    }, {passive:false});
    wrap.addEventListener('touchend', function(e){
      if(e.touches.length<2) jarakAwal=0;
    }, {passive:true});
  }

  function sembunyikanUI(){ var m=document.getElementById('kamMask'); if(m) m.style.display='none'; }
  function pulihkanTombol(){
    var b=document.getElementById('kamAmbil');
    var inti=document.getElementById('kamAmbilInti');
    if(b) b.disabled=false;
    if(inti){ inti.style.background='#fff'; inti.style.transform='scale(1)'; }
  }
  function tombolMemproses(){
    var b=document.getElementById('kamAmbil');
    var inti=document.getElementById('kamAmbilInti');
    if(b) b.disabled=true;
    if(inti){ inti.style.background='#999'; inti.style.transform='scale(.82)'; }
  }
  function setStatus(teks, warna){
    var s=document.getElementById('kamStatus'); if(!s) return;
    s.textContent=teks;
    s.style.background = warna==='hijau' ? 'rgba(28,140,90,.9)'
                       : warna==='merah' ? 'rgba(180,60,50,.9)'
                       : 'rgba(0,0,0,.55)';
  }

  /* ================= ZOOM (logika sama dengan v5) ================= */
  function siapkanZoom(){
    var track=trackAktif();
    var caps=null;
    if(track && track.getCapabilities){ try{ caps=track.getCapabilities(); }catch(e){} }
    if(caps && caps.zoom && typeof caps.zoom.max==='number' && caps.zoom.max>caps.zoom.min){
      _zoomInfo={ min:caps.zoom.min||1, max:caps.zoom.max, step:caps.zoom.step||0.1, native:true };
    } else {
      _zoomInfo={ min:1, max:3, step:0.05, native:false };
    }
    _zoomVal=_zoomInfo.min<1?1:_zoomInfo.min;
    var zs=document.getElementById('kamZoomSlider');
    if(zs){ zs.min=_zoomInfo.min; zs.max=_zoomInfo.max; zs.step=_zoomInfo.step; zs.value=_zoomVal; }
    terapkanZoom();
  }
  function setZoom(v){
    if(v<_zoomInfo.min) v=_zoomInfo.min;
    if(v>_zoomInfo.max) v=_zoomInfo.max;
    _zoomVal=v;
    var zs=document.getElementById('kamZoomSlider');
    if(zs && Math.abs(parseFloat(zs.value)-v)>0.001) zs.value=v;
    terapkanZoom();
  }
  function terapkanZoom(){
    var lbl=document.getElementById('kamZoomLbl');
    if(lbl) lbl.textContent=_zoomVal.toFixed(1)+'x';
    var v=document.getElementById('kamVideo');
    if(_zoomInfo.native){
      var track=trackAktif();
      if(track) track.applyConstraints({advanced:[{zoom:_zoomVal}]}).catch(function(){});
      if(v) v.style.transform='none';
    } else {
      if(v) v.style.transform = _zoomVal>1.001 ? 'scale('+_zoomVal+')' : 'none';
    }
  }

  /* ================= FOKUS (logika sama dengan v5) ================= */
  function fokusTitik(ev){
    var track=trackAktif();
    if(!track || _fokusManual) return;
    var ring=document.getElementById('kamRing');
    if(ring){
      ring.style.left=ev.clientX+'px'; ring.style.top=ev.clientY+'px';
      ring.style.display='block'; ring.style.opacity='1';
      setTimeout(function(){ ring.style.opacity='0'; }, 900);
      setTimeout(function(){ ring.style.display='none'; }, 1200);
    }
    if(!track.getCapabilities) return;
    var caps; try{ caps=track.getCapabilities(); }catch(e){ return; }
    var r=ev.currentTarget.getBoundingClientRect();
    var x=Math.min(1,Math.max(0,(ev.clientX-r.left)/r.width));
    var y=Math.min(1,Math.max(0,(ev.clientY-r.top)/r.height));
    var adv=[];
    if(caps.focusMode && caps.focusMode.indexOf('single-shot')>-1) adv.push({focusMode:'single-shot'});
    if(caps.pointsOfInterest) adv.push({pointsOfInterest:[{x:x,y:y}]});
    if(!adv.length) return;
    track.applyConstraints({advanced:adv}).then(function(){
      setStatus('Menyesuaikan fokus...','');
      setTimeout(function(){
        try{ if(!_fokusManual) track.applyConstraints({advanced:[{focusMode:'continuous'}]}); }catch(e){}
      },1500);
    }).catch(function(){});
  }

  function siapkanFokusManual(){
    var btn=document.getElementById('kamFokusBtn');
    var row=document.getElementById('kamFokusRow');
    _fokusManual=false;
    if(row) row.style.display='none';
    if(btn){ btn.style.display='none'; nyalakanIkon('kamFokusBtn', false); }
    var track=trackAktif();
    if(!track || !track.getCapabilities) return;
    var caps; try{ caps=track.getCapabilities(); }catch(e){ return; }
    if(caps.focusDistance && caps.focusMode && caps.focusMode.indexOf('manual')>-1){
      var fs=document.getElementById('kamFokusSlider');
      if(fs){
        fs.min=caps.focusDistance.min;
        fs.max=caps.focusDistance.max;
        fs.step=caps.focusDistance.step||0.01;
        fs.value=caps.focusDistance.min;
      }
      if(btn) btn.style.display='flex';
    }
  }
  window.fokusManualKameraWeb=function(){
    var row=document.getElementById('kamFokusRow');
    var track=trackAktif(); if(!track) return;
    _fokusManual=!_fokusManual;
    nyalakanIkon('kamFokusBtn', _fokusManual);
    if(_fokusManual){
      if(row) row.style.display='flex';
      var fs=document.getElementById('kamFokusSlider');
      if(fs) setFokusManual(parseFloat(fs.value));
      setStatus('Fokus manual: geser slider Dekat-Jauh','');
    } else {
      if(row) row.style.display='none';
      try{ track.applyConstraints({advanced:[{focusMode:'continuous'}]}).catch(function(){}); }catch(e){}
      setStatus('Fokus otomatis aktif','');
    }
  };
  function setFokusManual(nilai){
    var track=trackAktif(); if(!track) return;
    track.applyConstraints({advanced:[{focusMode:'manual', focusDistance:nilai}]}).catch(function(){});
  }

  /* ================= SENTER ================= */
  function cekSenter(){
    var btn=document.getElementById('kamSenter'); if(!btn) return;
    btn.style.display='none'; _senterNyala=false; nyalakanIkon('kamSenter', false);
    var track=trackAktif(); if(!track || !track.getCapabilities) return;
    try{
      var caps=track.getCapabilities();
      if(caps && caps.torch) btn.style.display='flex';
    }catch(e){}
  }
  window.senterKameraWeb=function(){
    var track=trackAktif(); if(!track) return;
    _senterNyala=!_senterNyala;
    track.applyConstraints({ advanced:[{ torch:_senterNyala }] })
      .then(function(){ nyalakanIkon('kamSenter', _senterNyala); })
      .catch(function(){ _senterNyala=false; nyalakanIkon('kamSenter', false); toast('Senter tidak didukung perangkat ini'); });
  };

  /* ================= ANALISIS INDIKATOR ================= */
  var _cvA=document.createElement('canvas'); _cvA.width=160; _cvA.height=120;
  function analisa(){
    var v=document.getElementById('kamVideo');
    if(!v || !v.videoWidth || !_stream) return;
    var ctx=_cvA.getContext('2d');
    try{ ctx.drawImage(v,0,0,160,120); }catch(e){ return; }
    var d;
    try{ d=ctx.getImageData(0,0,160,120).data; }catch(e){ return; }
    var jml=0, grad=0, n=0, i, y0=0;
    for(i=0;i<d.length;i+=4){
      var y=(d[i]*3 + d[i+1]*6 + d[i+2])/10;
      jml+=y;
      if(i%640!==0){ grad+=Math.abs(y-y0); }
      y0=y; n++;
    }
    var terang=jml/n, tajam=grad/n;
    if(terang<HAMBANG_GELAP){
      var adaSenter=document.getElementById('kamSenter');
      setStatus(adaSenter && adaSenter.style.display!=='none'
        ? 'Terlalu gelap, nyalakan senter' : 'Terlalu gelap, cari cahaya', 'merah');
    }
    else if(terang>HAMBANG_TERANG){ setStatus('Terlalu terang, kurangi cahaya','merah'); }
    else if(tajam<HAMBANG_TAJAM){ setStatus('Ketuk layar untuk fokus, tahan HP','merah'); }
    else{ setStatus('Pas, silakan ambil foto','hijau'); }
  }

  /* ================= STREAM ================= */
  async function mulaiStream(facing, pertamaKali){
    _facing=facing;
    hentikanStream();
    try{
      _stream=await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ ideal:facing }, width:{ ideal:4096 }, height:{ ideal:2304 } },
        audio:false
      });
    }catch(e){
      try{
        _stream=await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:{ ideal:facing }, width:{ ideal:1920 }, height:{ ideal:1080 } },
          audio:false
        });
      }catch(e1){
        try{ _stream=await navigator.mediaDevices.getUserMedia({ video:true, audio:false }); }
        catch(e2){
          hentikanStream(); sembunyikanUI();
          if(pertamaKali && _gagalCb){ var g=_gagalCb; _gagalCb=null; _cb=null; g(); }
          else{ toast('Kamera tidak tersedia atau izin ditolak'); }
          return;
        }
      }
    }
    var track=trackAktif();
    if(track && track.getCapabilities){
      try{
        var caps=track.getCapabilities(), adv=[];
        if(caps.focusMode && caps.focusMode.indexOf('continuous')>-1) adv.push({focusMode:'continuous'});
        if(caps.exposureMode && caps.exposureMode.indexOf('continuous')>-1) adv.push({exposureMode:'continuous'});
        if(caps.whiteBalanceMode && caps.whiteBalanceMode.indexOf('continuous')>-1) adv.push({whiteBalanceMode:'continuous'});
        if(adv.length) track.applyConstraints({advanced:adv}).catch(function(){});
      }catch(e){}
    }
    _ic=null;
    if(window.ImageCapture && track){ try{ _ic=new ImageCapture(track); }catch(e){ _ic=null; } }
    var v=document.getElementById('kamVideo');
    if(v){ v.srcObject=_stream; v.style.transform='none'; }
    document.getElementById('kamMask').style.display='block';
    pulihkanTombol();
    setTimeout(function(){ cekSenter(); siapkanZoom(); siapkanFokusManual(); }, 600);
    if(_analisaTimer) clearInterval(_analisaTimer);
    _analisaTimer=setInterval(analisa, 500);
  }

  function fallbackInput(cb){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    if(perangkatSentuh()) inp.setAttribute('capture','environment');
    inp.onchange=function(){
      var f=inp.files[0]; if(!f) return;
      var r=new FileReader();
      r.onload=function(){ cb(r.result); };
      r.readAsDataURL(f);
    };
    inp.click();
  }

  window.bukaKameraWeb=function(cb, onGagal, mode){
    _cb=cb; _gagalCb=onGagal||null; _mode=mode||'struk';
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
      var g=_gagalCb; _gagalCb=null; _cb=null;
      if(g) g(); else fallbackInput(cb);
      return;
    }
    pastikanUI();
    var bingkaiWrap=document.getElementById('kamGelap');
    if(bingkaiWrap) bingkaiWrap.style.display = _mode==='struk' ? 'flex' : 'none';
    setStatus(_mode==='struk' ? 'Arahkan ke struk, cubit untuk zoom' : 'Posisikan wajah di tengah','');
    mulaiStream(perangkatSentuh() ? 'environment' : 'user', true);
  };
  window.tutupKameraWeb=function(){
    hentikanStream(); sembunyikanUI();
    _cb=null; _gagalCb=null;
  };
  window.balikKameraWeb=function(){
    mulaiStream(_facing==='environment' ? 'user' : 'environment', false);
  };

  function bacaBitmap(blob){
    if(window.createImageBitmap) return createImageBitmap(blob);
    return new Promise(function(res,rej){
      var u=URL.createObjectURL(blob);
      var im=new Image();
      im.onload=function(){ URL.revokeObjectURL(u); res(im); };
      im.onerror=function(){ URL.revokeObjectURL(u); rej(new Error('foto tidak terbaca')); };
      im.src=u;
    });
  }

  /* ===== Auto-level + gamma (sama seperti v5) ===== */
  function perbaikiFoto(c, mode){
    var ctx=c.getContext('2d');
    var d=ctx.getImageData(0,0,c.width,c.height), p=d.data;
    var hist=new Uint32Array(256);
    for(var i=0;i<p.length;i+=4){ hist[(p[i]*77 + p[i+1]*150 + p[i+2]*29)>>8]++; }
    var total=c.width*c.height;
    var potong = mode==='struk' ? 0.02 : 0.005;
    var lo=0, hi=255, acc=0, j;
    for(j=0;j<256;j++){ acc+=hist[j]; if(acc>=total*potong){ lo=j; break; } }
    acc=0;
    for(j=255;j>=0;j--){ acc+=hist[j]; if(acc>=total*potong){ hi=j; break; } }
    if(hi-lo<20){ lo=Math.max(0,lo-10); hi=Math.min(255,hi+10); }
    var rentang=(hi-lo)||1;
    var sum=0; for(j=0;j<256;j++) sum+=hist[j]*j;
    var rataStretch=Math.max(1, Math.min(254, ((sum/total)-lo)/rentang*255));
    var target = mode==='struk' ? 170 : 140;
    var gamma=1;
    if(rataStretch<target){
      gamma=Math.log(target/255)/Math.log(rataStretch/255);
      if(gamma<0.55) gamma=0.55;
      if(gamma>1) gamma=1;
    }
    var lut=new Uint8Array(256);
    for(j=0;j<256;j++){
      var v=(j-lo)/rentang; if(v<0)v=0; if(v>1)v=1;
      lut[j]=(Math.pow(v,gamma)*255+0.5)|0;
    }
    for(i=0;i<p.length;i+=4){ p[i]=lut[p[i]]; p[i+1]=lut[p[i+1]]; p[i+2]=lut[p[i+2]]; }
    ctx.putImageData(d,0,0);
  }

  /* ===== Penajaman unsharp mask (sama seperti v5) ===== */
  function penajaman(c, jumlah){
    if(!jumlah) return;
    var w=c.width, h=c.height;
    var tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
    var tctx=tmp.getContext('2d');
    if(typeof tctx.filter==='undefined') return;
    tctx.filter='blur(1.6px)';
    tctx.drawImage(c,0,0);
    var ctx=c.getContext('2d');
    var od=ctx.getImageData(0,0,w,h), bd=tctx.getImageData(0,0,w,h);
    var p=od.data, b=bd.data;
    for(var i=0;i<p.length;i+=4){
      var r=p[i]+(p[i]-b[i])*jumlah;
      var g=p[i+1]+(p[i+1]-b[i+1])*jumlah;
      var bl=p[i+2]+(p[i+2]-b[i+2])*jumlah;
      p[i]  = r<0?0:r>255?255:r;
      p[i+1]= g<0?0:g>255?255:g;
      p[i+2]= bl<0?0:bl>255?255:bl;
    }
    ctx.putImageData(od,0,0);
  }

  window.jepretKameraWeb=async function(){
    var v=document.getElementById('kamVideo');
    if(!v || !v.videoWidth){ toast('Kamera belum siap'); return; }
    var b=document.getElementById('kamAmbil');
    if(b && b.disabled) return;
    tombolMemproses();
    setStatus('Mengambil foto...','');

    var sumber=null, sw=0, sh=0;
    if(_ic && _ic.takePhoto){
      try{
        var blob;
        try{
          var opsi={};
          if(_ic.getPhotoCapabilities){
            var pc=await _ic.getPhotoCapabilities();
            if(pc && pc.imageWidth && pc.imageWidth.max) opsi.imageWidth=Math.min(pc.imageWidth.max, 3264);
          }
          blob=await _ic.takePhoto(opsi);
        }catch(e0){ blob=await _ic.takePhoto(); }
        sumber=await bacaBitmap(blob);
        sw=sumber.width||sumber.naturalWidth; sh=sumber.height||sumber.naturalHeight;
      }catch(e){ sumber=null; }
    }
    if(!sumber || !sw){ sumber=v; sw=v.videoWidth; sh=v.videoHeight; }

    var c=document.createElement('canvas'), ctx;
    if(_mode==='struk'){
      var f=document.getElementById('kamBingkai').getBoundingClientRect();
      var r=v.getBoundingClientRect();
      var skala=Math.max(r.width/v.videoWidth, r.height/v.videoHeight);
      var sx=(v.videoWidth - r.width/skala)/2;
      var sy=(v.videoHeight - r.height/skala)/2;
      var cx=sx + (f.left-r.left)/skala;
      var cy=sy + (f.top-r.top)/skala;
      var cw=f.width/skala, ch=f.height/skala;
      var mg=cw*0.03;
      cx-=mg; cy-=mg; cw+=mg*2; ch+=mg*2;
      var k=sw/v.videoWidth;
      var offY=(sh - v.videoHeight*k)/2;
      cx*=k; cw*=k; ch*=k; cy=cy*k + offY;
      cx=Math.max(0,cx); cy=Math.max(0,cy);
      cw=Math.min(sw-cx,cw); ch=Math.min(sh-cy,ch);
      var sk=Math.min(1, SISI_MAKS_STRUK/Math.max(cw,ch));
      c.width=Math.max(1,Math.round(cw*sk)); c.height=Math.max(1,Math.round(ch*sk));
      ctx=c.getContext('2d');
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(sumber, cx, cy, cw, ch, 0, 0, c.width, c.height);
    } else {
      var zx=0, zy=0, zw=sw, zh=sh;
      if(!_zoomInfo.native && _zoomVal>1.01){
        zw=sw/_zoomVal; zh=sh/_zoomVal;
        zx=(sw-zw)/2; zy=(sh-zh)/2;
      }
      var sk2=Math.min(1, SISI_MAKS_POLOS/Math.max(zw,zh));
      c.width=Math.max(1,Math.round(zw*sk2)); c.height=Math.max(1,Math.round(zh*sk2));
      ctx=c.getContext('2d');
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(sumber, zx, zy, zw, zh, 0, 0, c.width, c.height);
    }
    try{ perbaikiFoto(c, _mode); }catch(e){}
    try{ penajaman(c, _mode==='struk' ? TAJAM_STRUK : TAJAM_POLOS); }catch(e){}
    if(sumber && sumber.close){ try{ sumber.close(); }catch(e){} }

    var data;
    try{ data=c.toDataURL('image/jpeg',0.93); }
    catch(e){ pulihkanTombol(); toast('Gagal mengambil foto'); return; }
    var cb=_cb; _cb=null; _gagalCb=null;
    hentikanStream(); sembunyikanUI(); pulihkanTombol();
    if(cb) cb(data);
  };

  /* ====== Sambungan ke alur yang ada (sama seperti v5) ====== */
  var _mintaFotoLama=window.mintaFoto;
  window.mintaFoto=function(sumber){
    if(sumber==='galeri'){
      if(adaAPK()){ _mintaFotoLama(sumber); }
      else{ fallbackGaleri(function(d){ mulaiStrukDariDataURL(d); }); }
      return;
    }
    bukaKameraWeb(
      function(d){ mulaiStrukDariDataURL(d); },
      function(){
        if(adaAPK()){ _mintaFotoLama('kamera'); }
        else{ fallbackInput(function(d){ mulaiStrukDariDataURL(d); }); }
      },
      'struk'
    );
  };

  var _pilihAvatarLama=window.pilihAvatar;
  window.pilihAvatar=function(sumber){
    closeAvatarSheet();
    if(sumber==='galeri'){
      if(adaAPK()){ _pilihAvatarLama(sumber); }
      else{ document.getElementById('avatarFileInput').click(); }
      return;
    }
    bukaKameraWeb(
      function(d){ simpanAvatarDariFoto(d); },
      function(){
        if(adaAPK()){ _pilihAvatarLama('kamera'); }
        else{ document.getElementById('avatarFileInput').click(); }
      },
      'polos'
    );
  };

  function fallbackGaleri(cb){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.onchange=function(){
      var f=inp.files[0]; if(!f) return;
      var r=new FileReader();
      r.onload=function(){ cb(r.result); };
      r.readAsDataURL(f);
    };
    inp.click();
  }
})();
</script>

<script>
/* PATCH SCAN OTOMATIS v6. Menggantikan seluruh v5.
   Tempel sebelum </body>, setelah PATCH KAMERA v6.

   Perbaikan inti dari v5: koreksi qty x satuan kini dipagari total
   struk. Tidak ada nominal item (baik dari kolom total maupun dari
   qty x satuan) yang boleh melebihi total struk; kandidat yang
   melebihi langsung gugur. Bila kedua kandidat gugur (semua angka
   di baris itu rusak), item ditaksir dari selisih HARGA JUAL
   dikurangi item lain. Ini mencegah kasus v5 di mana qty dan satuan
   yang sama-sama salah baca menghasilkan nominal jutaan. */
(function(){

  var KUNCI_GEMINI='';
  var MODEL_GEMINI='gemini-2.0-flash';
  var BATAS_TUNGGU_AI=20000;

  /* ============ util ============ */
  function angkaDari(s){
    s=String(s).replace(/[^\d.,]/g,'');
    if(!s) return NaN;
    var des=Math.max(s.lastIndexOf(','), s.lastIndexOf('.'));
    if(des>-1 && s.length-des-1===3) return parseInt(s.replace(/[.,]/g,''),10);
    if(des>-1 && s.length-des-1<=2)
      return Math.round(parseFloat(s.replace(/[.,](?=\d{3})/g,'').replace(',','.')));
    return parseInt(s.replace(/[.,]/g,''),10);
  }
  function digitSetelah(b, kata){
    var i=b.toUpperCase().indexOf(kata);
    if(i<0) return 0;
    var d=b.slice(i+kata.length).replace(/\D/g,'');
    return d?parseInt(d,10):0;
  }
  function cariTanggal(baris){
    for(var i=0;i<baris.length;i++){
      var m=baris[i].match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
      if(m) return m[1]+'-'+String(+m[2]).padStart(2,'0')+'-'+String(+m[3]).padStart(2,'0');
      m=baris[i].match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/);
      if(m){
        var th=+m[3]; if(th<100) th+=2000;
        var bl=+m[2], tg=+m[1];
        if(bl>=1&&bl<=12&&tg>=1&&tg<=31&&th>=2000&&th<=2100)
          return th+'-'+String(bl).padStart(2,'0')+'-'+String(tg).padStart(2,'0');
      }
    }
    return '';
  }
  function rapikan(s){
    return String(s||'').replace(/\s{2,}/g,' ').replace(/^[.\-*:| ]+|[.\-*:| ]+$/g,'').trim();
  }
  function bersihkanNama(nama){
    nama=rapikan(String(nama).replace(/\s[\d.,]{4,}$/,''));
    nama=rapikan(nama.replace(/\s\d[.,]?$/,''));
    return nama;
  }

  /* ============ ekstraksi item ============ */
  function ekstrakItem(b, items){
    var m4=b.match(/^(.{3,}?)\s+(\d{1,3})[.,]?\s+([\d.,]{2,})\s+([\d.,]{3,})$/);
    if(m4){
      var tot=angkaDari(m4[4]);
      if(tot>=50){
        items.push({keterangan:bersihkanNama(m4[1]).slice(0,80), nominal:tot,
                    kategori:'Belanja', _qty:+m4[2], _unit:angkaDari(m4[3])||0});
        return true;
      }
    }
    var m3=b.match(/^(.{3,}?)\s+(\d{1,3})[.,]?\s+([\d.,]{3,})$/);
    if(m3){
      var tot3=angkaDari(m3[3]);
      if(tot3>=100){
        items.push({keterangan:bersihkanNama(m3[1]).slice(0,80), nominal:tot3,
                    kategori:'Belanja', _qty:+m3[2], _unit:0});
        return true;
      }
    }
    var m2=b.match(/^([A-Za-z|].{2,}?)\s+([\d.,]{4,})$/);
    if(m2){
      var tot2=angkaDari(m2[2]);
      if(tot2>=100 && tot2<100000000){
        items.push({keterangan:bersihkanNama(m2[1]).slice(0,80), nominal:tot2,
                    kategori:'Belanja', _qty:1, _unit:0});
        return true;
      }
    }
    return false;
  }

  var BUKAN_ITEM=/TOTAL|TUNAI|CASH|KEMBALI|CHANGE|PPN|DPP|PAJAK|TAX|HARGA JUAL|ANDA HEMAT|DISKON|DISC|VOUCHER|DEBIT|KREDIT|QRIS|NPWP|TELP|TLP|SMS|WA |LAYANAN|KONSUMEN|KASIR|TERIMA|KASIH|SELAMAT|GRATIS|ONGKIR|MEMBER|POIN|SALDO|NOMOR|KARTU|PEMBAYARAN|DESKRIPSI|JL\.|JLN|JALAN|KEL\.|KEC\.|KAB\.|KOTA/i;

  /* ============ total struk tangguh ============ */
  function cariTotalTangguh(baris){
    var dariTotal=0, tunai=0, kembali=0, hargaJual=0;
    baris.forEach(function(b){
      var u=b.toUpperCase();
      if(/HARGA\s*JUAL/.test(u)){ var h=digitSetelah(b,'JUAL'); if(h>1000) hargaJual=h; return; }
      if(/SUB\s*TOTAL/.test(u) || (/TOTAL/.test(u) && !/DISKON|HEMAT/.test(u))){
        var t=digitSetelah(b,'TOTAL');
        if(t>1000 && t<100000000 && !dariTotal) dariTotal=t;
      }
      if(/TUNAI|CASH/.test(u)){ var tn=digitSetelah(b, /TUNAI/.test(u)?'TUNAI':'CASH'); if(tn>1000) tunai=tn; }
      if(/KEMBALI|CHANGE/.test(u)){ var k=digitSetelah(b, /KEMBALI/.test(u)?'KEMBALI':'CHANGE'); if(k>0) kembali=k; }
    });
    var dariTunai=(tunai>0 && tunai>kembali)?(tunai-kembali):0;
    var total=0;
    if(dariTotal && dariTunai){
      total=Math.abs(dariTotal-dariTunai)/dariTunai<0.02 ? dariTotal : dariTunai;
    } else total=dariTotal||dariTunai||0;
    return { total:total, hargaJual:hargaJual||total };
  }

  /* ============ koreksi berpagar total struk ============ */
  function koreksi(items, hargaJual, totalStruk){
    var batas=Math.max(hargaJual||0, totalStruk||0) || 10000000;
    var dikoreksi=0, curiga=[];
    items.forEach(function(it){
      var kol=it.nominal;
      var hit=(it._qty>=1 && it._unit>=50) ? it._qty*it._unit : 0;
      var kolOk = kol>0 && kol<=batas;
      var hitOk = hit>0 && hit<=batas && it._qty<=50;
      if(kolOk && hitOk){
        var beda=Math.abs(kol-hit)/Math.max(kol,hit);
        /* beda jauh: saat qty>=2 kolom total paling sering yang salah baca */
        if(beda>0.1 && it._qty>=2){ it.nominal=hit; dikoreksi++; }
        /* qty=1: hit==unit, kolom total (berpemisah ribuan) lebih dipercaya */
      } else if(kolOk && !hitOk){
        /* kolom total dipertahankan */
      } else if(!kolOk && hitOk){
        it.nominal=hit; dikoreksi++;
      } else {
        it._rusak=true; curiga.push(it);
      }
    });
    /* taksiran sisa: hanya bila tepat 1 item rusak dan harga jual diketahui */
    if(curiga.length===1 && hargaJual>0){
      var lain=0;
      items.forEach(function(it){ if(!it._rusak) lain+=it.nominal; });
      var sisa=hargaJual-lain;
      if(sisa>0 && sisa<=batas){ curiga[0].nominal=sisa; curiga[0]._taksir=true; }
    }
    return {
      dikoreksi:dikoreksi,
      ditaksir:curiga.filter(function(c){return c._taksir;}).length,
      gagal:curiga.filter(function(c){return !c._taksir;}).length
    };
  }

  function cariToko(baris){
    var toko='';
    for(var i=0;i<Math.min(6,baris.length);i++){
      var b=baris[i];
      if(BUKAN_ITEM.test(b)) continue;
      if(/PT\.|CV\.|TOKO|MART|MARET|SWALAYAN|MINIMARKET|INDOMAR|ALFAMAR/i.test(b)){ toko=b; break; }
      if(!toko && /^[A-Za-z .,'&-]{4,}$/.test(b)) toko=b;
    }
    return rapikan(toko).slice(0,60);
  }

  function urai(baris){
    var items=[];
    baris.forEach(function(b){ if(!BUKAN_ITEM.test(b)) ekstrakItem(b, items); });
    var tt=cariTotalTangguh(baris);
    if(tt.total>0 && items.length>2){
      items=items.filter(function(it){ return Math.abs(it.nominal-tt.total)/tt.total>0.03; });
    }
    var hk=koreksi(items, tt.hargaJual, tt.total);
    /* item rusak yang gagal ditaksir dibuang daripada menyimpan angka liar */
    items=items.filter(function(it){ return !(it._rusak && !it._taksir); });
    items=items.filter(function(it){ return it.keterangan && it.keterangan.length>=2 && it.nominal>0; });
    return { toko:cariToko(baris), tanggal:cariTanggal(baris), total:tt.total,
             items:items, dikoreksi:hk.dikoreksi, ditaksir:hk.ditaksir, dibuang:hk.gagal };
  }

  function barisDariKata(kata){
    var peta={};
    (kata||[]).forEach(function(w){ (peta[w.line]=peta[w.line]||[]).push(w); });
    return Object.keys(peta).sort(function(a,b){ return a-b; }).map(function(l){
      return peta[l].sort(function(a,b){ return a.x-b.x; })
        .map(function(w){ return w.text; }).join(' ');
    });
  }

  /* ============ GEMINI opsional ============ */
  function janjiGemini(dataUrl){
    if(!KUNCI_GEMINI || !dataUrl) return Promise.resolve(null);
    var b64=String(dataUrl).split(',')[1]||'';
    if(!b64) return Promise.resolve(null);
    var prompt='Baca struk belanja Indonesia pada gambar. Balas HANYA JSON valid tanpa teks lain, format: '+
      '{"toko":"...","tanggal":"YYYY-MM-DD","total":angka,"items":[{"nama":"...","harga":angka}]} . '+
      'harga = total rupiah per baris item (bulat). Jangan masukkan pajak, subtotal, pembayaran, '+
      'tunai, kembalian, atau nomor kartu sebagai item.';
    var panggil=fetch('https://generativelanguage.googleapis.com/v1beta/models/'+MODEL_GEMINI+':generateContent?key='+KUNCI_GEMINI,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt},{inline_data:{mime_type:'image/jpeg',data:b64}}]}],
        generationConfig:{temperature:0.1, response_mime_type:'application/json'}
      })
    }).then(function(r){ if(!r.ok) throw new Error('AI status '+r.status); return r.json(); })
    .then(function(j){
      var t=j&&j.candidates&&j.candidates[0]&&j.candidates[0].content&&
            j.candidates[0].content.parts&&j.candidates[0].content.parts[0]&&
            j.candidates[0].content.parts[0].text;
      if(!t) return null;
      var o=JSON.parse(String(t).replace(/```json|```/g,'').trim());
      var items=(o.items||[]).map(function(it){
        return { keterangan:rapikan(it.nama).slice(0,80),
                 nominal:Math.round(+it.harga||0), kategori:'Belanja' };
      }).filter(function(it){ return it.keterangan && it.nominal>0; });
      if(!items.length) return null;
      return { toko:rapikan(o.toko||'').slice(0,60),
               tanggal:/^\d{4}-\d{2}-\d{2}$/.test(o.tanggal||'')?o.tanggal:'',
               total:Math.round(+o.total||0), items:items, dikoreksi:0, ditaksir:0, dibuang:0 };
    });
    var timeout=new Promise(function(res){ setTimeout(function(){ res(null); }, BATAS_TUNGGU_AI); });
    return Promise.race([panggil, timeout]).catch(function(){ return null; });
  }

  /* ============ tombol debug teks OCR ============ */
  var _barisTerakhir=[];
  function tampilkanTombolDebug(){
    var b=document.getElementById('ocrDbgBtn');
    if(!b){
      b=document.createElement('button');
      b.id='ocrDbgBtn';
      b.textContent='Teks OCR';
      b.style.cssText='position:fixed;left:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 84px);z-index:95;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;border:none;border-radius:14px;padding:8px 12px';
      b.onclick=function(){
        var p=document.getElementById('ocrDbgPanel');
        if(p){ p.remove(); return; }
        p=document.createElement('div');
        p.id='ocrDbgPanel';
        p.style.cssText='position:fixed;inset:8% 5%;z-index:96;background:#fff;color:#111;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden';
        p.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #ddd"><b style="font-size:13px">Teks hasil OCR ('+_barisTerakhir.length+' baris)</b><button onclick="document.getElementById(\'ocrDbgPanel\').remove()" style="border:none;background:#eee;border-radius:8px;padding:6px 12px;font-weight:700">Tutup</button></div>'+
          '<pre style="flex:1;overflow:auto;margin:0;padding:12px 14px;font-size:11px;line-height:1.6;white-space:pre-wrap;-webkit-user-select:text;user-select:text">'+
          _barisTerakhir.map(function(x){ return x.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }).join('\n')+'</pre>';
        document.body.appendChild(p);
      };
      document.body.appendChild(b);
    }
    b.style.display='block';
    clearTimeout(b._t);
    b._t=setTimeout(sembunyikanTombolDebug, 60000);
  }
  function sembunyikanTombolDebug(){
    var b=document.getElementById('ocrDbgBtn');
    if(b){ b.style.display='none'; clearTimeout(b._t); }
    var p=document.getElementById('ocrDbgPanel');
    if(p) p.remove();
  }
  /* sembunyikan tombol debug begitu keluar dari tampilan pindai struk */
  var _goViewLamaDbg=window.goView;
  window.goView=function(v){
    var hasil=_goViewLamaDbg.apply(this, arguments);
    if(v!=='struk') sembunyikanTombolDebug();
    return hasil;
  };

  /* ============ penerapan ============ */
  function terapkan(hasil, sumber){
    var st=strukState;
    if(!hasil || !hasil.items || !hasil.items.length){
      toast('Tidak ada item terdeteksi otomatis. Silakan pilih dengan mengetuk kata.');
      return;
    }
    if(st.pending.length) return;
    hasil.items.forEach(function(it){
      st.pending.push({keterangan:it.keterangan, nominal:it.nominal, kategori:it.kategori});
    });
    if(!st.toko && hasil.toko) st.toko=hasil.toko;
    if(hasil.tanggal) st.tanggal=hasil.tanggal;
    var jumlah=st.pending.reduce(function(s,p){ return s+(+p.nominal); },0);
    var pesan=st.pending.length+' item terisi otomatis ('+sumber+')';
    if(hasil.dikoreksi) pesan+=', '+hasil.dikoreksi+' nominal dikoreksi';
    if(hasil.ditaksir) pesan+=', '+hasil.ditaksir+' item DITAKSIR, mohon periksa';
    if(hasil.dibuang) pesan+=', '+hasil.dibuang+' baris tak terbaca DILEWATI';
    if(hasil.total>0){
      var selisih=Math.abs(hasil.total-jumlah)/hasil.total;
      pesan += selisih<0.05 ? '. Jumlah sesuai total struk'
        : '. PERHATIAN: daftar '+rp(jumlah)+' vs total struk '+rp(hasil.total);
    }
    toast(pesan);
    renderStruk();
  }

  var _startLama=window.startScanOCR;
  window.startScanOCR=async function(){
    var st=strukState;
    var pAI=janjiGemini(st.fotoData);
    await _startLama();
    _barisTerakhir = st.kata && st.kata.length ? barisDariKata(st.kata) : [];
    //if(_barisTerakhir.length) tampilkanTombolDebug();
    var hasilAI=null;
    try{ hasilAI=await pAI; }catch(e){}
    if(hasilAI){ terapkan(hasilAI,'AI'); return; }
    if(_barisTerakhir.length){
      terapkan(urai(_barisTerakhir),'OCR lokal');
    }
  };

})();
</script>

<script>
/* PATCH DAFTAR & NAV v1. Tempel sebelum </body>, setelah patch lain.
   1. Riwayat transaksi dan riwayat perpindahan saldo di detail
      penampung kini punya filter jumlah 10/25/50/100/Semua
      (memakai komponen limitChips yang sama dengan Beranda).
   2. Nama tab "Kirim" di footer diganti "Cadangan" (mencakup kirim
      pencadangan dan tarik pencadangan). Ubah teksnya di NAMA_TAB
      bila ingin nama lain.
   3. Daftar Hutang & Piutang juga diberi filter jumlah yang sama. */
(function(){

  var NAMA_TAB='Pencadangan';   /* <-- nama tab pengganti "Kirim" */

  /* ============ 2) GANTI NAMA TAB FOOTER ============ */
  function gantiNamaTab(){
    var btn=document.querySelector('.nav [data-nav="sinkron"]');
    if(!btn) return;
    for(var i=0;i<btn.childNodes.length;i++){
      var n=btn.childNodes[i];
      if(n.nodeType===3 && n.nodeValue.trim()){ n.nodeValue=NAMA_TAB; return; }
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', gantiNamaTab);
  } else gantiNamaTab();

  /* ============ 1) DETAIL PENAMPUNG: FILTER JUMLAH ============ */
  var akunTxLimit=10, akunTrLimit=10;
  window.setAkunTxLimit=function(n){ akunTxLimit=n; render(); };
  window.setAkunTrLimit=function(n){ akunTrLimit=n; render(); };

  /* reset ke 10 setiap kali membuka penampung lain */
  var _bukaAkunLama=window.bukaAkun;
  window.bukaAkun=function(id){ akunTxLimit=10; akunTrLimit=10; _bukaAkunLama(id); };

  window.renderAkunDetail=function(){
    var a=cariAkun(akunDetail);
    if(!a){ goView('akunList'); return; }
    var saldo=saldoAkunSaatIni(a.id);
    var aid=String(a.id);
    var riwayat=TX.filter(function(t){return String(t.akunId)===aid;})
      .slice().sort(function(x,y){return (y.tanggal+(y.createdAt||'')).localeCompare(x.tanggal+(x.createdAt||''));});
    var trGab=TR.filter(function(t){return String(t.keAkunId)===aid;})
        .map(function(t){return {t:t, masuk:true};})
      .concat(TR.filter(function(t){return String(t.dariAkunId)===aid;})
        .map(function(t){return {t:t, masuk:false};}))
      .sort(function(x,y){return String(y.t.tanggal).localeCompare(String(x.t.tanggal));});

    S().innerHTML=
      '<div class="fhead"><button class="bk" onclick="goView(\'akunList\')">&#8592;</button><div class="ti">'+esc(a.nama)+'</div></div>'+
      '<div class="set">'+
      '<div class="udetail p"><div class="udlbl">'+akunIconHTML(a,15)+' '+akunLabelJenis(a.jenis)+'</div><div class="udname">'+esc(a.nama)+'</div>'+
      '<div class="udsisa">'+fmtRp(saldo)+'</div><div class="udcap">saldo saat ini</div></div>'+
      (a.catatan?('<div class="panel" style="margin:12px 0 0"><div style="font-size:13px;color:var(--tx2);line-height:1.5">'+esc(a.catatan)+'</div></div>'):'')+

      '<div class="sec-head" style="padding:18px 0 4px"><div class="t">Riwayat transaksi</div>'+
        (riwayat.length?('<div style="font-size:11px;color:var(--tx3)">'+riwayat.length+' catatan</div>'):'')+'</div>'+
      (riwayat.length? limitChips(akunTxLimit,'setAkunTxLimit') : '')+
      '<div class="list">'+(riwayat.length
        ? riwayat.slice(0, akunTxLimit||riwayat.length).map(txRow).join('')
        : '<div class="empty" style="padding:20px 0">Belum ada transaksi di penampung ini.</div>')+'</div>'+

      (trGab.length?('<div class="sec-head" style="padding:14px 0 4px"><div class="t">Riwayat perpindahan saldo</div>'+
        '<div style="font-size:11px;color:var(--tx3)">'+trGab.length+' catatan</div></div>'+
        limitChips(akunTrLimit,'setAkunTrLimit')+
        '<div class="list">'+trGab.slice(0, akunTrLimit||trGab.length)
          .map(function(x){return transferRow(x.t, x.masuk);}).join('')+'</div>'):'')+

      '<button class="btn-danger" onclick="hapusAkun(\''+a.id+'\')">Hapus penampung saldo</button>'+
      '</div>';
  };

  /* ============ 3) HUTANG & PIUTANG: FILTER JUMLAH ============ */
  var utLimit=10;
  window.setUtLimit=function(n){ utLimit=n; render(); };

  window.renderUtang=function(){
    var piut=UT.filter(function(u){return u.jenis==='piutang';});
    var hut=UT.filter(function(u){return u.jenis==='hutang';});
    var piutSisa=piut.reduce(function(s,u){return s+utSisa(u);},0);
    var hutSisa=hut.reduce(function(s,u){return s+utSisa(u);},0);
    var telat=UT.filter(utTelatKah).length;
    var list = utFilter==='piutang'?piut : utFilter==='hutang'?hut : UT;
    var tersambung=!!getGasUrl();
    var belumCadang=UT.filter(function(u){return !u.terkirim;}).length;
    S().innerHTML=
      appBar()+
      '<div class="fhead"><div class="ti">Hutang &amp; Piutang</div></div>'+
      '<div class="rep-cards">'+
        '<div class="rep-card"><div class="l">Piutang berjalan</div><div class="v" style="color:var(--hijau-tx)">'+fmtRp(piutSisa)+'</div></div>'+
        '<div class="rep-card"><div class="l">Hutang berjalan</div><div class="v" style="color:var(--merah-tx)">'+fmtRp(hutSisa)+'</div></div>'+
      '</div>'+
      (telat?'<div class="panel" style="margin-top:10px;background:var(--kuning-bg)"><div style="font-size:13px;color:var(--kuning-tx);line-height:1.5">'+telat+' catatan telah melewati jatuh tempo.</div></div>':'')+
      '<div class="chips" style="padding-top:12px">'+[['semua','Semua'],['piutang','Piutang'],['hutang','Hutang']].map(function(c){return '<button class="chip '+(utFilter===c[0]?'on':'')+'" onclick="setUtFilter(\''+c[0]+'\')">'+c[1]+'</button>';}).join('')+'</div>'+
      (tersambung&&belumCadang?'<div class="set" style="padding-top:4px;padding-bottom:0"><button class="btn-line" style="margin-top:6px" onclick="cadangkanUtang()">Cadangkan '+belumCadang+' catatan</button></div>':'')+
      '<div class="sec-head" style="padding:12px 0 0"><div class="t"></div><div style="font-size:11px;color:var(--tx3)">'+list.length+' catatan</div></div>'+
      limitChips(utLimit,'setUtLimit')+
      '<div class="list" style="padding-top:8px;padding-bottom:14px">'+
        (list.length? list.slice(0, utLimit||list.length).map(utRow).join('') : '<div class="empty">Belum ada transaksi.<br>Ketuk tombol + untuk menambahkan.</div>')+
      '</div>';
  };

})();
</script>

<script>
/* PATCH TAMBAH TRANSAKSI v1. Tempel sebelum </body>, setelah patch lain.
   1. Ketik manual (pengeluaran): kolom dipisah menjadi Nama barang,
      Nama toko (opsional), Harga, Diskon/potongan (opsional), Catatan
      (opsional). Nominal yang disimpan = harga - diskon, dan diskon
      dicatat pada catatan ("Diskon Rp X") mengikuti format alur struk.
      Form pemasukan tidak berubah.
   2. Layar pindai struk: formulir kecil "Tambah item manual" untuk
      barang yang tidak terbaca OCR, muncul di atas tombol simpan. */
(function(){

  /* ============ 1) KETIK MANUAL ============ */
  var _blankAddLama=window.blankAdd;
  window.blankAdd=function(){
    var a=_blankAddLama();
    a.toko=''; a.diskon='';
    return a;
  };
  /* pastikan state yang sedang aktif ikut punya kolom baru */
  if(window.addState){ if(addState.toko===undefined) addState.toko=''; if(addState.diskon===undefined) addState.diskon=''; }

  window.onNominalV2=function(el){
    var d=el.value.replace(/\D/g,'');
    addState.nominal=d;
    el.value=d?(+d).toLocaleString('id-ID'):'';
    perbaruiNetInfo();
  };
  window.onDiskonAdd=function(el){
    var d=el.value.replace(/\D/g,'');
    addState.diskon=d;
    el.value=d?(+d).toLocaleString('id-ID'):'';
    perbaruiNetInfo();
  };
  function perbaruiNetInfo(){
    var el=document.getElementById('netInfo'); if(!el) return;
    var n=+(addState.nominal||0), d=+(addState.diskon||0);
    if(d>0 && n>0){
      el.style.display='block';
      el.style.color = d>=n ? 'var(--merah-tx)' : 'var(--tx2)';
      el.textContent = d>=n ? 'Diskon melebihi atau menyamai harga, periksa kembali'
                            : 'Dibayar setelah diskon: '+rp(n-d);
    } else el.style.display='none';
  }

  window.renderAdd=function(){
    if(!AK.length){
      S().innerHTML=
        '<div class="fhead"><button class="bk" onclick="goView(\'home\')">&#8592;</button><div class="ti">Tambah transaksi</div></div>'+
        '<div class="form"><div class="empty">Anda belum memiliki penampung saldo (bank, dompet digital, atau kartu kredit). Tambahkan dahulu supaya transaksi dapat dicatatkan ke penampung yang tepat.</div>'+
        '<button class="save pem" onclick="akunState=blankAkun();goView(\'akunAdd\')">+ Tambah penampung saldo</button></div>';
      return;
    }
    var a=addState, peng=a.tipe==='pengeluaran';
    if(a.toko===undefined) a.toko='';
    if(a.diskon===undefined) a.diskon='';
    if(!a.akunId) a.akunId=AK[0].id;
    var akunTerpilih=cariAkun(a.akunId);
    var isKK=peng && akunTerpilih && akunTerpilih.jenis==='kartu';
    S().innerHTML=
      '<div class="fhead"><button class="bk" onclick="goView(\'home\')">&#8592;</button><div class="ti">Tambah transaksi</div></div>'+
      '<div class="form"><div class="tipe2">'+
        '<button class="peng '+(peng?'on':'')+'" onclick="setTipe(\'pengeluaran\')">Pengeluaran</button>'+
        '<button class="pem '+(!peng?'on':'')+'" onclick="setTipe(\'pemasukan\')">Pemasukan</button></div>'+
      '<label class="fl">Asal Dana</label><select class="field" onchange="addState.akunId=this.value;renderAdd()">'+akunOptionsHTML(a.akunId)+'</select>'+
      (akunTerpilih?('<div style="font-size:11px;margin:-8px 2px 14px;color:'+(akunTerpilih.jenis==='kartu'?'var(--kuning-tx)':(saldoAkunSaatIni(akunTerpilih.id)>0?'var(--tx2)':'var(--merah-tx)'))+'">'+
        (akunTerpilih.jenis==='kartu'
          ? 'Kartu kredit: pengeluaran boleh melebihi saldo dan akan menjadi tagihan berjalan.'
          : 'Saldo tersedia: '+rp(saldoAkunSaatIni(akunTerpilih.id)))+'</div>'):'')+
      (isKK?('<label class="cklabel"><input type="checkbox" '+(a.jadiHutang?'checked':'')+' onchange="addState.jadiHutang=this.checked"> Catat juga sebagai hutang (tagihan '+esc(akunTerpilih.nama)+' yang perlu dibayar nanti)</label>'):'')+
      (peng?'<div class="metode"><button class="'+(a.metode==='manual'?'on':'')+'" onclick="setMetode(\'manual\')">&#9998; Ketik manual</button>'+
        '<button class="'+(a.metode==='struk'?'on':'')+'" onclick="setMetode(\'struk\')">&#128247; Foto struk</button></div>':'')+
      (peng&&a.metode==='struk'?strukPicker():'')+
      (peng&&a.metode==='struk'?'':(
        (peng
          ? '<label class="fl">Nama barang / keterangan</label>'+
            '<input class="field" id="inKet" placeholder="mis. Pop Mie Ayam 75g" value="'+esc(a.keterangan)+'" oninput="addState.keterangan=this.value">'+
            '<label class="fl">Nama toko (opsional)</label>'+
            '<input class="field" placeholder="mis. Indomaret" value="'+esc(a.toko)+'" oninput="addState.toko=this.value">'
          : '<label class="fl">Sumber / keterangan</label>'+
            '<input class="field" id="inKet" placeholder="mis. Gaji bulanan" value="'+esc(a.keterangan)+'" oninput="addState.keterangan=this.value">')+
        '<label class="fl">'+(peng?'Harga':'Nominal')+'</label><div class="nominal-wrap"><span class="rp">Rp</span>'+
          '<input id="inNominal" inputmode="numeric" placeholder="0" value="'+(a.nominal?(+a.nominal).toLocaleString('id-ID'):'')+'" oninput="onNominalV2(this)"></div>'+
        (peng
          ? '<label class="fl">Diskon / potongan (opsional)</label><div class="nominal-wrap"><span class="rp">Rp</span>'+
            '<input inputmode="numeric" placeholder="0" value="'+(a.diskon?(+a.diskon).toLocaleString('id-ID'):'')+'" oninput="onDiskonAdd(this)"></div>'+
            '<div id="netInfo" style="display:none;font-size:11.5px;margin:-8px 2px 14px"></div>'
          : '')+
        '<div class="duo"><div><label class="fl">Kategori</label><select class="field" onchange="addState.kategori=this.value">'+
          (peng?KAT_PENGELUARAN:KAT_PEMASUKAN).map(function(k){return '<option '+(a.kategori===k?'selected':'')+'>'+k+'</option>';}).join('')+'</select></div>'+
          '<div><label class="fl">Tanggal</label><input class="field" type="date" value="'+a.tanggal+'" onchange="addState.tanggal=this.value"></div></div>'+
        '<label class="fl">Catatan (opsional)</label><input class="field" placeholder="Tambah catatan" value="'+esc(a.catatan)+'" oninput="addState.catatan=this.value">'+
        '<button class="save '+(peng?'':'pem')+'" onclick="onSimpan()">Simpan '+(peng?'pengeluaran':'pemasukan')+'</button>'))+
      '</div>';
    perbaruiNetInfo();
  };

  window.onSimpan=function(){
    var a=addState;
    if(!a.akunId){ toast('Pilih penampung saldo terlebih dahulu'); return; }
    if(!a.nominal||+a.nominal<=0){ toast('Nominal belum diisi'); return; }
    var peng=a.tipe==='pengeluaran';
    var diskon=peng?+(a.diskon||0):0;
    if(diskon>0 && diskon>=+a.nominal){ toast('Diskon melebihi atau menyamai harga, periksa kembali'); return; }
    var net=+a.nominal-diskon;
    if(peng){
      var cek=bolehKeluar(a.akunId, net);
      if(!cek.ok){ toast(cek.alasan); return; }
    }
    var akunTerpilih=cariAkun(a.akunId);
    var buatHutang=peng && a.jadiHutang && akunTerpilih && akunTerpilih.jenis==='kartu';
    /* format catatan mengikuti alur struk: "Toko: X | catatan | Diskon Rp Y" */
    var cat=[ (peng&&a.toko.trim())?('Toko: '+a.toko.trim()):'',
              a.catatan.trim(),
              diskon>0?('Diskon '+rp(diskon)):'' ].filter(Boolean).join(' | ');
    simpanTx({tanggal:a.tanggal,tipe:a.tipe,kategori:a.kategori,nominal:net,keterangan:a.keterangan.trim(),catatan:cat,akunId:a.akunId,createdAt:new Date().toISOString()});
    if(buatHutang) catatHutangKartuKredit(net, a.keterangan.trim(), a.tanggal, akunTerpilih.nama, akunTerpilih.id);
    addState=blankAdd();
  };

  /* ============ 2) TAMBAH ITEM MANUAL DI LAYAR STRUK (MODAL) ============ */
  function pastikanModalItem(){
    if(document.getElementById('miMask')) return;
    var div=document.createElement('div');
    div.id='miMask';
    div.className='cmask';
    div.innerHTML=
      '<div class="cmcard">'+
        '<div class="cmtitle">Tambah item manual</div>'+
        '<div class="cmtext" style="margin-bottom:12px">Untuk barang yang tidak terbaca saat pemindaian.</div>'+
        '<label class="fl">Nama barang</label>'+
        '<input class="field" id="miKet" placeholder="mis. Pop Mie Ayam 75g">'+
        '<label class="fl">Harga</label>'+
        '<div class="nominal-wrap"><span class="rp">Rp</span>'+
          '<input id="miNom" inputmode="numeric" placeholder="0" '+
            'oninput="this.value=this.value.replace(/\\D/g,\'\')?(+this.value.replace(/\\D/g,\'\')).toLocaleString(\'id-ID\'):\'\'" '+
            'onkeydown="if(event.key===\'Enter\')simpanItemManual()"></div>'+
        '<label class="fl">Kategori</label>'+
        '<select class="field" id="miKat">'+KAT_PENGELUARAN.map(function(k){return '<option'+(k==='Belanja'?' selected':'')+'>'+k+'</option>';}).join('')+'</select>'+
        '<div class="cmbtns" style="margin-top:6px">'+
          '<button class="cmbtn cancel" onclick="tutupItemManual()">Batal</button>'+
          '<button class="cmbtn ok" onclick="simpanItemManual()">Tambah</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(div);
    div.addEventListener('click', function(e){ if(e.target===div) tutupItemManual(); });
  }
  window.bukaItemManual=function(){
    pastikanModalItem();
    document.getElementById('miKet').value='';
    document.getElementById('miNom').value='';
    document.getElementById('miKat').value='Belanja';
    document.getElementById('miMask').classList.add('show');
    setTimeout(function(){ var k=document.getElementById('miKet'); if(k) k.focus(); }, 80);
  };
  window.tutupItemManual=function(){
    var m=document.getElementById('miMask');
    if(m) m.classList.remove('show');
  };
  window.simpanItemManual=function(){
    var ket=(document.getElementById('miKet').value||'').trim();
    var nom=+((document.getElementById('miNom').value||'').replace(/\D/g,''))||0;
    var kat=document.getElementById('miKat').value||'Belanja';
    if(!ket){ toast('Isi nama barangnya dahulu'); return; }
    if(nom<=0){ toast('Isi harga barangnya'); return; }
    strukState.pending.push({keterangan:ket.slice(0,80), nominal:nom, kategori:kat});
    tutupItemManual();
    toast('Item ditambahkan: '+ket);
    renderStruk();
  };

  function suntikTombolManual(){
    if(!strukState || !strukState.img) return;
    var wadah=S(); if(!wadah) return;
    if(document.getElementById('miBtn')) return;
    var btnSimpan=wadah.querySelector('button.save');
    if(!btnSimpan) return;
    var b=document.createElement('button');
    b.id='miBtn';
    b.className='btn-line';
    b.style.cssText='margin-top:8px;width:100%';
    b.innerHTML='+ Tambah item manual (bila ada yang tidak terbaca)';
    b.onclick=bukaItemManual;
    btnSimpan.parentNode.insertBefore(b, btnSimpan);
  }

  var _renderStrukLama=window.renderStruk;
  window.renderStruk=function(){
    _renderStrukLama.apply(this, arguments);
    try{ suntikTombolManual(); }catch(e){}
  };

})();
</script>

<script>
/* PATCH KATEGORI KUSTOM v1. Tempel sebelum </body>, setelah patch lain.
   Menambah pengelolaan kategori lewat Profil -> Kategori Transaksi:
   - Kategori tambahan disimpan di localStorage dan disisipkan ke
     KAT_PENGELUARAN / KAT_PEMASUKAN sebelum "Lainnya", sehingga
     otomatis muncul di semua form (ketik manual, struk, modal item).
   - Kategori bawaan terkunci; kategori tambahan bisa dihapus.
   - Menghapus kategori tidak mengubah transaksi lama (label tetap). */
(function(){

  var KUNCI='kk_kat_custom_v1';
  var BASE_K=KAT_PENGELUARAN.slice();
  var BASE_M=KAT_PEMASUKAN.slice();

  function bacaKustom(){
    try{
      var o=JSON.parse(localStorage.getItem(KUNCI)||'{}');
      return { keluar:Array.isArray(o.keluar)?o.keluar:[], masuk:Array.isArray(o.masuk)?o.masuk:[] };
    }catch(e){ return {keluar:[],masuk:[]}; }
  }
  function tulisKustom(k){ try{ localStorage.setItem(KUNCI, JSON.stringify(k)); }catch(e){} }

  function bangunUlang(arr, base, tambahan){
    arr.length=0;
    var adaLain=base[base.length-1]==='Lainnya';
    (adaLain?base.slice(0,-1):base).forEach(function(x){ arr.push(x); });
    tambahan.forEach(function(x){ arr.push(x); });
    if(adaLain) arr.push('Lainnya');
  }
  function terapkanKustom(){
    var k=bacaKustom();
    bangunUlang(KAT_PENGELUARAN, BASE_K, k.keluar);
    bangunUlang(KAT_PEMASUKAN,  BASE_M, k.masuk);
  }
  terapkanKustom();

  /* ============ HALAMAN KELOLA KATEGORI ============ */
  function chipKat(nama, tipe, kustom){
    return '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--card);border:.5px solid var(--line);border-radius:16px;padding:7px 12px;font-size:12.5px;margin:0 6px 8px 0">'+
      esc(nama)+
      (kustom?('<button onclick="hapusKategori(\''+tipe+'\',\''+esc(nama).replace(/'/g,"\\'")+'\')" style="border:none;background:none;color:var(--merah-tx);font-size:15px;line-height:1;padding:0 0 0 2px">&times;</button>'):'')+
      '</span>';
  }
  window.renderProfKategori=function(){
    var k=bacaKustom();
    function bagian(judul, base, tambahan, tipe){
      var adaLain=base[base.length-1]==='Lainnya';
      var bawaan=adaLain?base.slice(0,-1):base.slice();
      return '<div class="grp-label">'+judul+'</div>'+
        '<div class="panel" style="margin:0 0 6px">'+
          '<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">Kategori bawaan (tetap)</div>'+
          '<div>'+bawaan.map(function(n){return chipKat(n,tipe,false);}).join('')+(adaLain?chipKat('Lainnya',tipe,false):'')+'</div>'+
          '<div style="font-size:11px;color:var(--tx3);margin:10px 0">Kategori tambahan Anda'+(tambahan.length?'':' (belum ada)')+'</div>'+
          (tambahan.length?('<div>'+tambahan.map(function(n){return chipKat(n,tipe,true);}).join('')+'</div>'):'')+
          '<button class="btn-line" style="margin-top:8px;width:100%" onclick="bukaTambahKategori(\''+tipe+'\')">+ Tambah kategori '+(tipe==='keluar'?'pengeluaran':'pemasukan')+'</button>'+
        '</div>';
    }
    S().innerHTML=
      '<div class="fhead"><button class="bk" onclick="backProf()">&#8592;</button><div class="ti">Kategori Transaksi</div></div>'+
      '<div class="set">'+
        '<p class="hint">Kategori tambahan otomatis muncul di semua form pencatatan. Menghapus kategori tidak mengubah transaksi yang sudah tercatat dengan kategori tersebut.</p>'+
        bagian('Pengeluaran', BASE_K, k.keluar, 'keluar')+
        bagian('Pemasukan',  BASE_M, k.masuk,  'masuk')+
      '</div>';
  };

  /* ============ MODAL TAMBAH ============ */
  var _tipeModal='keluar';
  function pastikanModalKat(){
    if(document.getElementById('kaMask')) return;
    var div=document.createElement('div');
    div.id='kaMask'; div.className='cmask';
    div.innerHTML=
      '<div class="cmcard">'+
        '<div class="cmtitle" id="kaTitle">Tambah kategori</div>'+
        '<label class="fl">Nama kategori</label>'+
        '<input class="field" id="kaNama" maxlength="24" placeholder="mis. Zakat &amp; Sedekah" '+
          'onkeydown="if(event.key===\'Enter\')simpanKategori()">'+
        '<div class="cmbtns" style="margin-top:6px">'+
          '<button class="cmbtn cancel" onclick="document.getElementById(\'kaMask\').classList.remove(\'show\')">Batal</button>'+
          '<button class="cmbtn ok" onclick="simpanKategori()">Tambah</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(div);
    div.addEventListener('click', function(e){ if(e.target===div) div.classList.remove('show'); });
  }
  window.bukaTambahKategori=function(tipe){
    _tipeModal=tipe;
    pastikanModalKat();
    document.getElementById('kaTitle').textContent='Tambah kategori '+(tipe==='keluar'?'pengeluaran':'pemasukan');
    document.getElementById('kaNama').value='';
    document.getElementById('kaMask').classList.add('show');
    setTimeout(function(){ var el=document.getElementById('kaNama'); if(el) el.focus(); }, 80);
  };
  window.simpanKategori=function(){
    var nama=(document.getElementById('kaNama').value||'').replace(/\s{2,}/g,' ').trim();
    if(!nama){ toast('Isi nama kategorinya dahulu'); return; }
    if(nama.length<2){ toast('Nama kategori terlalu pendek'); return; }
    var k=bacaKustom();
    var semua=(_tipeModal==='keluar'?KAT_PENGELUARAN:KAT_PEMASUKAN);
    var ada=semua.some(function(x){ return x.toLowerCase()===nama.toLowerCase(); });
    if(ada){ toast('Kategori "'+nama+'" sudah ada'); return; }
    (_tipeModal==='keluar'?k.keluar:k.masuk).push(nama);
    tulisKustom(k); terapkanKustom();
    document.getElementById('kaMask').classList.remove('show');
    toast('Kategori "'+nama+'" ditambahkan');
    renderProfKategori();
  };
  window.hapusKategori=async function(tipe, nama){
    var dipakai=TX.filter(function(t){ return t.kategori===nama; }).length;
    var pesan='Hapus kategori "'+nama+'"?'+
      (dipakai?(' '+dipakai+' transaksi lama memakai kategori ini; catatannya tidak berubah dan tetap tampil di laporan.'):'');
    if(!await confirmModal(pesan, {danger:true, okText:'Hapus'})) return;
    var k=bacaKustom();
    var arr=(tipe==='keluar'?k.keluar:k.masuk);
    var i=arr.indexOf(nama);
    if(i>-1) arr.splice(i,1);
    tulisKustom(k); terapkanKustom();
    if(addState && addState.kategori===nama){
      addState.kategori=(addState.tipe==='pengeluaran'?KAT_PENGELUARAN:KAT_PEMASUKAN)[0];
    }
    toast('Kategori dihapus');
    renderProfKategori();
  };

  /* ============ SAMBUNGAN KE TAB PROFIL ============ */
  var _renderSettingsLama=window.renderSettings;
  window.renderSettings=function(){
    if(profSub==='kategori'){ renderProfKategori(); return; }
    _renderSettingsLama.apply(this, arguments);
    if(profSub) return;
    /* sisipkan baris menu ke grup Data & Pencadangan */
    var menus=S().querySelectorAll('.menu');
    if(menus.length && !document.getElementById('mrKat')){
      var k=bacaKustom(), n=k.keluar.length+k.masuk.length;
      var html=menuRow('&#127991;','Kategori Transaksi', n?(n+' kategori tambahan'):'Kelola kategori', "openProf('kategori')");
      menus[0].insertAdjacentHTML('beforeend', html.replace('<','<div id="mrKat" style="display:contents">$&').replace(/$/,'</div>').replace('<div id="mrKat" style="display:contents"><','<div id="mrKat" style="display:contents"><'));
      /* penanda sederhana agar tidak dobel */
      if(!document.getElementById('mrKat')) menus[0].insertAdjacentHTML('beforeend','<span id="mrKat" style="display:none"></span>');
    }
  };

  /* modal item manual struk: segarkan pilihan kategori tiap dibuka */
  if(window.bukaItemManual){
    var _bukaItemLama=window.bukaItemManual;
    window.bukaItemManual=function(){
      _bukaItemLama.apply(this, arguments);
      var sel=document.getElementById('miKat');
      if(sel){
        var v=sel.value;
        sel.innerHTML=KAT_PENGELUARAN.map(function(x){return '<option'+(x===v?' selected':'')+'>'+x+'</option>';}).join('');
      }
    };
  }

})();
</script>

<script>
/* PATCH DISKON MANDIRI v1. Tempel sebelum </body>, setelah patch lain.
   Mengubah perilaku peran "Diskon" di pemindai struk: potongan tidak
   lagi dikurangkan dari item terakhir, melainkan menjadi BARIS
   TERSENDIRI pada daftar (nama + nominal minus), bisa diganti nama
   (ketuk dua kali), diganti kategori, dan dihapus seperti item lain.
   Saat disimpan, diskon menjadi transaksi pengeluaran bernilai negatif
   (pengurang), sehingga total, saldo, dan laporan tetap akurat.
   Tampilan transaksi bernilai negatif dirapikan menjadi "+ Rp X"
   hijau di seluruh daftar riwayat. */
(function(){

  /* 1) Peran diskon: buat baris tersendiri, jangan sentuh item lain */
  var _terapkanLama=window.terapkanPeran;
  window.terapkanPeran=function(role, txt, idx){
    if(role!=='diskon') return _terapkanLama.apply(this, arguments);
    var st=strukState;
    var dd=angkaDariTeks(txt);
    if(!dd){ toast('Teks yang dipilih bukan nominal'); return; }
    var disk=+dd;
    st.pending.push({keterangan:'Diskon / potongan', nominal:-disk, kategori:'Belanja', isDiskon:true});
    if(idx!=null) st.kataRole[idx]='diskon';
    toast('Diskon '+rp(disk)+' ditambahkan sebagai baris tersendiri');
    renderStruk();
  };

  /* 2) Teks petunjuk peran diskon disesuaikan */
  var _infoLama=window.infoPeran;
  window.infoPeran=function(r){
    if(r==='diskon') return 'Ketuk angka potongan pada foto. Potongan menjadi baris tersendiri pada daftar (bisa diganti nama dengan ketuk dua kali).';
    return _infoLama.apply(this, arguments);
  };

  /* 3) Edit nominal baris diskon: pertahankan tanda minus */
  window.savePendNom=function(i,val){
    var p=strukState.pending[i]; if(!p){ strukState.editPend=null; renderStruk(); return; }
    var d=String(val).replace(/\D/g,'');
    var n=d?+d:0;
    p.nominal=(p.isDiskon || p.nominal<0) ? -n : n;
    strukState.editPend=null; renderStruk();
  };

  /* 4) Tampilan transaksi bernilai negatif: "+ Rp X" hijau (pengurang) */
  window.txRow=function(t){
    var minus=(+t.nominal)<0;
    var pos=t.tipe==='pemasukan' || minus;
    var bg=t.tipe==='pemasukan'?'var(--hijau-bg)':'var(--merah-bg)';
    var status=t.terkirim?'<span class="sdot kirim" title="Tercadang"></span>':'<span class="sdot belum" title="Belum tercadang"></span>';
    return '<div class="item"><div class="ic" style="background:'+bg+'">'+(IKON[t.kategori]||'\uD83D\uDCB3')+'</div>'+
      '<div class="mid"><div class="nm">'+esc(t.keterangan||t.kategori)+'</div>'+
      '<div class="dt">'+status+labelTanggal(t.tanggal)+' &middot; '+t.kategori+(minus?' &middot; pengurang':'')+'</div></div>'+
      '<div class="amt '+(pos?'pos':'neg')+'">'+(pos?'+ ':'- ')+fmtRp(Math.abs(+t.nominal))+'</div>'+
      '<button class="delbtn" onclick="hapusTx(\''+t.id+'\')">&times;</button></div>';
  };

})();
</script>
