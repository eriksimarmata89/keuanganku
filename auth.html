<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KeuanganKu — Login</title>
<style>
body{font-family:sans-serif;background:#F4F4F2;display:flex;align-items:center;justify-content:center;min-height:92vh;margin:0}
.c{background:#fff;border-radius:16px;padding:30px 24px;max-width:340px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.08)}
h2{margin:0 0 8px;font-size:19px}p{color:#6B6B66;font-size:14px;line-height:1.55;margin:0}
</style></head><body>
<div class="c"><h2 id="j">Memproses login...</h2><p id="p">Mohon tunggu sebentar.</p></div>
<script>
var URL_AUTH='https://script.google.com/macros/s/AKfycbzOussSdotfWY4VKPKCZOZImxUyyfXc5SvYgQZCXnLSb4VL_Pk-n2sRF11L1CTwUBeoLQ/exec';   /* URL /exec yang sama dengan di aplikasi */
(function(){
  var q=new URLSearchParams(location.search);
  var code=q.get('code'), state=q.get('state');
  var j=document.getElementById('j'), p=document.getElementById('p');
  if(!code || !state){ j.textContent='Tautan tidak lengkap'; p.textContent='Silakan ulangi login dari aplikasi.'; return; }
  fetch(URL_AUTH+'?selesaikan='+encodeURIComponent(state)+'&code='+encodeURIComponent(code))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.status==='ok'){
        var PAKET='com.eriksimarmata.keuanganku';   /* <-- samakan dengan package name Kodular */
        var intentUrl='intent:#Intent;component='+PAKET+'/'+PAKET+'.Screen1;end';
          'category=android.intent.category.LAUNCHER;package='+PAKET+';end';
        j.textContent='Berhasil masuk';
        p.innerHTML='Akun <b>'+(d.email||'')+'</b> terverifikasi.'+
          '<br><br><a href="'+intentUrl+'" style="display:inline-block;background:#1D9E75;color:#fff;'+
          'text-decoration:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:700">'+
          'Kembali ke Aplikasi</a>'+
          '<br><br><span style="font-size:12px;color:#9A9A94">Bila tombol tidak berfungsi, tekan tombol Kembali di HP Anda.</span>';
      } else {
        j.textContent='Login gagal';
        p.textContent='Silakan tutup halaman ini dan ulangi dari aplikasi.';
      }
    })
    .catch(function(){ j.textContent='Jaringan bermasalah'; p.textContent='Periksa koneksi lalu ulangi dari aplikasi.'; });
})();
</script></body></html>
