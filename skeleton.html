<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<title>KeuanganKu</title>
<style>
  :root{
    --biru:#185FA5;
    --page:#F4F4F2; --card:#FFFFFF; --line:#E7E7E2;
    --bone:#E4E4DF; --bone2:#EFEFEA;
    --tx:#2C2C2A; --tx2:#6B6B66;
    --maxw:520px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --page:#14161A; --card:#1E2127; --line:#2C2F36;
      --bone:#262A31; --bone2:#2E333B;
      --tx:#ECECEA; --tx2:#A6A6A0;
    }
  }
  *{box-sizing:border-box;}
  html, body{ height:100%; overflow:hidden; overscroll-behavior:none; }
  #app{ height:100%; overflow:hidden; }
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--page); color:var(--tx);}
  #app{max-width:var(--maxw); margin:0 auto; min-height:100vh; padding-bottom:70px;}

  /* Tulang skeleton + animasi shimmer */
  .b{position:relative; overflow:hidden; background:var(--bone); border-radius:8px;}
  .b::after{content:''; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
    transform:translateX(-100%); animation:shim 1.4s infinite;}
  @media (prefers-color-scheme: dark){
    .b::after{background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);}
  }
  @keyframes shim{100%{transform:translateX(100%);}}

  /* Appbar: logo & nama asli supaya merek langsung terlihat */
  .appbar{display:flex; align-items:center; gap:9px; padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 10px;}
  .appbar .bt{font-size:16px; font-weight:700; letter-spacing:-.2px;}
  .appbar .ava{width:38px; height:38px; border-radius:50%; margin-left:auto;}

  .topbar{padding:14px 18px 0;}
  .l-hi{width:52px; height:11px; margin-bottom:7px;}
  .l-nm{width:140px; height:14px;}

  /* Kartu saldo biru */
  .saldo{background:var(--biru); border-radius:16px; padding:18px 20px; margin:16px 18px 0;}
  .saldo .s{background:rgba(255,255,255,.28);}
  .saldo .s::after{background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);}
  .s-lbl{width:70px; height:10px; margin-bottom:9px;}
  .s-amt{width:170px; height:24px; margin-bottom:16px;}
  .s-row{display:flex; gap:16px;}
  .s-col{flex:1;}
  .s-mini{width:76px; height:9px; margin-bottom:6px;}
  .s-val{width:100px; height:13px;}
  .s-foot{border-top:1px solid rgba(255,255,255,.22); margin-top:14px; padding-top:11px; display:flex; justify-content:space-between; align-items:center;}
  .s-f1{width:120px; height:10px;}
  .s-f2{width:90px; height:14px;}

  .dots{display:flex; justify-content:center; gap:6px; margin:10px 0 2px;}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--line);}
  .dot:first-child{width:16px; border-radius:4px; background:var(--bone);}

  /* Kartu hutang/piutang */
  .uring{display:flex; align-items:center; background:var(--card); border-radius:14px; margin:12px 18px 0; padding:14px 16px;}
  .ur{flex:1;}
  .ur-l{width:82px; height:10px; margin-bottom:7px;}
  .ur-v{width:110px; height:14px;}
  .ursep{width:1px; align-self:stretch; background:var(--line); margin:0 14px;}

  /* Segmented control */
  .seg{display:flex; gap:6px; background:var(--bone2); border-radius:10px; padding:3px; margin:14px 18px;}
  .seg .b{flex:1; height:30px; border-radius:8px;}
  .seg .b:first-child{background:var(--card);}
  .seg .b:first-child::after{display:none;}
  .seg .b:not(:first-child){background:transparent;}
  .seg .b:not(:first-child)::after{display:none;}

  .sec{display:flex; justify-content:space-between; align-items:center; padding:6px 18px 10px;}
  .sec-t{width:130px; height:12px;}
  .sec-n{width:56px; height:10px;}

  /* Baris daftar transaksi */
  .list{padding:0 18px;}
  .item{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:.5px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .ic{width:38px; height:38px; border-radius:10px; flex-shrink:0;}
  .mid{flex:1;}
  .m1{height:12px; margin-bottom:7px;}
  .m2{height:9px; width:60%;}
  .amt{width:74px; height:12px;}
  .item:nth-child(1) .m1{width:75%;} .item:nth-child(2) .m1{width:55%;}
  .item:nth-child(3) .m1{width:68%;} .item:nth-child(4) .m1{width:48%;}
  .item:nth-child(5) .m1{width:62%;} .item:nth-child(6) .m1{width:70%;}

  /* Nav bawah */
  .nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:var(--maxw); background:var(--card); border-top:.5px solid var(--line); display:flex; justify-content:space-around; align-items:center; padding:10px 0 16px;}
  .nv{width:34px; height:26px; border-radius:8px;}
  .fab{width:50px; height:50px; border-radius:50%; background:var(--biru); margin-top:-24px; opacity:.55;}

  /* Kartu tanpa koneksi */
  .off{display:none; margin:20vh 24px 0; background:var(--card); border-radius:16px; padding:24px 20px; text-align:center;}
  .off .oi{font-size:34px; margin-bottom:10px;}
  .off .ot{font-size:15px; font-weight:700; margin-bottom:6px;}
  .off .od{font-size:13px; color:var(--tx2); line-height:1.5; margin-bottom:16px;}
  .off button{font-family:inherit; border:none; border-radius:10px; padding:12px 26px; font-size:14px; font-weight:600; color:#fff; background:var(--biru); cursor:pointer;}
  body.offline #skel{display:none;}
  body.offline .off{display:block;}
</style>
</head>
<body>
<div id="app">

      <div class="item"><div class="ic b"></div><div class="mid"><div class="m1 b"></div><div class="m2 b"></div></div><div class="amt b"></div></div>
      <div class="item"><div class="ic b"></div><div class="mid"><div class="m1 b"></div><div class="m2 b"></div></div><div class="amt b"></div></div>
      <div class="item"><div class="ic b"></div><div class="mid"><div class="m1 b"></div><div class="m2 b"></div></div><div class="amt b"></div></div>
      <div class="item"><div class="ic b"></div><div class="mid"><div class="m1 b"></div><div class="m2 b"></div></div><div class="amt b"></div></div>

<script>
/* Alamat aplikasi asli. Ubah di sini bila alamatnya berganti. */
var URL_APLIKASI = 'https://eriksimarmata89.github.io/keuanganku/?v=5';

function pergi(){
  /* location.replace supaya skeleton tidak masuk riwayat "kembali".
     Selama halaman asli diunduh, skeleton tetap tampil di layar. */
  location.replace(URL_APLIKASI);
}
function cobaLagi(){
  if(navigator.onLine === false){ return; }
  document.body.classList.remove('offline');
  setTimeout(pergi, 250);
}
window.addEventListener('online', function(){ cobaLagi(); });

if(navigator.onLine === false){
  document.body.classList.add('offline');
} else {
  /* Jeda singkat supaya shimmer sempat tergambar sebelum navigasi dimulai. */
  setTimeout(pergi, 350);
}
</script>

<script>
/* PATCH: penanganan keyboard.
   - Nav bawah disembunyikan saat keyboard terbuka, muncul lagi saat ditutup.
   - Input yang sedang diketik otomatis digulirkan ke tengah layar.
   Tempel sebelum </body>. Tidak ada perubahan blok Kodular. */
(function(){
  var st=document.createElement('style');
  st.textContent='body.kb-buka .nav{display:none !important;}';
  document.head.appendChild(st);

  function setKb(buka){ document.body.classList.toggle('kb-buka', !!buka); }

  var vv=window.visualViewport;
  if(vv){
    var dasar=vv.height;
    vv.addEventListener('resize', function(){
      if(vv.height>dasar) dasar=vv.height;   /* ikuti rotasi layar */
      setKb(dasar - vv.height > 150);
    });
  }else{
    var dasar2=window.innerHeight;
    window.addEventListener('resize', function(){
      if(window.innerHeight>dasar2) dasar2=window.innerHeight;
      setKb(dasar2 - window.innerHeight > 150);
    });
  }

  /* Gulirkan kolom yang difokus supaya terlihat di atas keyboard */
  document.addEventListener('focusin', function(e){
    var t=e.target;
    if(t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)){
      setTimeout(function(){
        try{ t.scrollIntoView({block:'center', behavior:'smooth'}); }catch(err){}
      }, 300);
    }
  });

  /* Jaring pengaman: bila fokus hilang dan keyboard tertutup, pastikan nav kembali */
  document.addEventListener('focusout', function(){
    setTimeout(function(){
      var a=document.activeElement;
      if(!(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName))) setKb(false);
    }, 150);
  });
})();
</script>

<script>
/* PATCH MATA UANG v1 (Opsi A: ganti lambang & format, TANPA konversi).
   Tempel sebelum </body>, paling akhir setelah semua patch lain.

   - Pemilih mata uang layar penuh muncul sekali setelah login bila
     pengguna belum pernah memilih. Bisa dibuka lagi lewat Profil.
   - Mengganti lambang dan pemisah ribuan di SELURUH tampilan (rp()),
     dan label input ("Rp") lewat satu variabel CSS.
   - Angka tersimpan apa adanya (bilangan bulat); tidak ada konversi
     nilai, jadi data lama tetap utuh. */
(function(){

  /* daftar mata uang: symbol, posisi, spasi, locale pemisah ribuan */
  var CUR={
    IDR:{n:'Rupiah Indonesia',        s:'Rp', after:false, sp:true,  loc:'id-ID'},
    USD:{n:'US Dollar',               s:'$',  after:false, sp:false, loc:'en-US'},
    EUR:{n:'Euro',                    s:'\u20AC', after:false, sp:false, loc:'de-DE'},
    GBP:{n:'Pound Sterling',          s:'\u00A3', after:false, sp:false, loc:'en-GB'},
    JPY:{n:'Yen Jepang',              s:'\u00A5', after:false, sp:false, loc:'ja-JP'},
    CNY:{n:'Yuan Tiongkok',           s:'\u00A5', after:false, sp:false, loc:'zh-CN'},
    SGD:{n:'Dollar Singapura',        s:'S$', after:false, sp:false, loc:'en-SG'},
    MYR:{n:'Ringgit Malaysia',        s:'RM', after:false, sp:true,  loc:'ms-MY'},
    AUD:{n:'Dollar Australia',        s:'A$', after:false, sp:false, loc:'en-AU'},
    SAR:{n:'Riyal Saudi',             s:'SAR',after:false, sp:true,  loc:'ar-SA'},
    AED:{n:'Dirham UEA',              s:'AED',after:false, sp:true,  loc:'ar-AE'},
    INR:{n:'Rupee India',             s:'\u20B9', after:false, sp:false, loc:'en-IN'},
    KRW:{n:'Won Korea',               s:'\u20A9', after:false, sp:false, loc:'ko-KR'},
    THB:{n:'Baht Thailand',           s:'\u0E3F', after:false, sp:false, loc:'th-TH'},
    PHP:{n:'Peso Filipina',           s:'\u20B1', after:false, sp:false, loc:'en-PH'},
    VND:{n:'Dong Vietnam',            s:'\u20AB', after:true,  sp:true,  loc:'vi-VN'}
  };
  var LS_CUR='kk_currency';

  function kodeCur(){ var k=localStorage.getItem(LS_CUR); return CUR[k]?k:'IDR'; }
  function curAktif(){ return CUR[kodeCur()]; }
  function formatCur(n){
    var c=curAktif();
    var num=(Number(n)||0).toLocaleString(c.loc);
    return c.after ? (num+(c.sp?' ':'')+c.s) : (c.s+(c.sp?' ':'')+num);
  }

  /* terapkan lambang ke variabel CSS untuk label input .rp */
  function terapkanLambangCSS(){
    document.documentElement.style.setProperty('--cur-sym', "'"+curAktif().s+"'");
  }
  (function suntikCSS(){
    var st=document.createElement('style');
    st.textContent=
      '.nominal-wrap .rp{font-size:0 !important;}'+
      '.nominal-wrap .rp::after{content:var(--cur-sym,'+"'Rp'"+');font-size:18px;color:var(--tx2);}';
    document.head.appendChild(st);
  })();

  /* ====== TIMPA FORMATTER GLOBAL ====== */
  window.rp=function(n){ return formatCur(n); };
  window.fmtRp=function(n, paksa){
    return (window.HIDE_AMT && !paksa) ? (curAktif().s+' \u2022\u2022\u2022\u2022\u2022') : formatCur(n);
  };

  /* ====== PEMILIH LAYAR PENUH ====== */
  var _pilihSementara=null;
  function contohFormat(kode){
    var c=CUR[kode]; var num=(1234567).toLocaleString(c.loc);
    return c.after ? (num+(c.sp?' ':'')+c.s) : (c.s+(c.sp?' ':'')+num);
  }
  function baris(kode){
    var c=CUR[kode], on=(_pilihSementara===kode);
    return '<button data-cur="'+kode+'" onclick="pilihCurSementara(\''+kode+'\')" '+
      'style="display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;'+
      'background:'+(on?'var(--hijau-bg)':'var(--card)')+';border-radius:12px;padding:14px 16px;margin-bottom:8px;'+
      'box-shadow:0 1px 2px rgba(0,0,0,.05);'+(on?'outline:2px solid var(--hijau-tx)':'')+'">'+
      '<span style="width:52px;height:40px;border-radius:8px;background:var(--page);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--tx);flex:0 0 auto">'+c.s+'</span>'+
      '<span style="flex:1;min-width:0"><span style="display:block;font-size:14px;font-weight:600">'+kode+' &middot; '+c.n+'</span>'+
      '<span style="display:block;font-size:11.5px;color:var(--tx3);margin-top:2px">Contoh: '+contohFormat(kode)+'</span></span>'+
      '<span style="flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid '+(on?'var(--hijau-tx)':'var(--line)')+';background:'+(on?'var(--hijau-tx)':'transparent')+'"></span>'+
      '</button>';
  }
  window.pilihCurSementara=function(kode){
    _pilihSementara=kode;
    var ov=document.getElementById('curOverlay'); if(!ov) return;
    ov.querySelectorAll('[data-cur]').forEach(function(b){
      var on=b.dataset.cur===kode;
      b.style.background=on?'var(--hijau-bg)':'var(--card)';
      b.style.outline=on?'2px solid var(--hijau-tx)':'none';
      var dot=b.lastElementChild;
      dot.style.border='2px solid '+(on?'var(--hijau-tx)':'var(--line)');
      dot.style.background=on?'var(--hijau-tx)':'transparent';
    });
    var tb=document.getElementById('curSimpanBtn'); if(tb) tb.disabled=false;
  };
  window.simpanCur=function(){
    if(!_pilihSementara){ toast('Pilih salah satu mata uang'); return; }
    localStorage.setItem(LS_CUR, _pilihSementara);
    terapkanLambangCSS();
    var ov=document.getElementById('curOverlay'); if(ov) ov.remove();
    if(typeof render==='function') render();
    if(typeof toast==='function') toast('Mata uang diatur: '+_pilihSementara);
  };
  function bukaPemilih(wajib){
    if(document.getElementById('curOverlay')) return;
    _pilihSementara = wajib ? null : kodeCur();
    var ov=document.createElement('div');
    ov.id='curOverlay';
    ov.style.cssText='position:fixed;inset:0;z-index:200;background:var(--page);display:flex;flex-direction:column;max-width:var(--maxw,520px);margin:0 auto';
    ov.innerHTML=
      '<div style="padding:calc(env(safe-area-inset-top,0px) + 22px) 20px 14px">'+
        (wajib?'':'<button onclick="document.getElementById(\'curOverlay\').remove()" style="border:none;background:none;color:var(--tx2);font-size:15px;padding:0 0 12px">&#8592; Kembali</button>')+
        '<div style="font-size:20px;font-weight:700">Pilih Mata Uang</div>'+
        '<div style="font-size:12.5px;color:var(--tx2);margin-top:4px;line-height:1.5">Menentukan lambang dan format tampilan di seluruh aplikasi. Nilai transaksi tidak dikonversi.</div>'+
      '</div>'+
      '<div style="flex:1;overflow-y:auto;padding:4px 16px 12px">'+
        Object.keys(CUR).map(baris).join('')+
      '</div>'+
      '<div style="padding:12px 18px calc(env(safe-area-inset-bottom,0px) + 16px);border-top:.5px solid var(--line);background:var(--card)">'+
        '<button id="curSimpanBtn" onclick="simpanCur()" '+(wajib?'disabled':'')+' '+
          'style="width:100%;border:none;border-radius:12px;padding:15px 0;font-size:15px;font-weight:700;color:#fff;background:var(--hijau-tx)">'+
          (wajib?'Lanjutkan':'Simpan')+'</button>'+
      '</div>';
    document.body.appendChild(ov);
    if(!wajib) pilihCurSementara(kodeCur());
  }
  window.bukaPengaturanMataUang=function(){ bukaPemilih(false); };

  /* ====== TAMPILKAN SEKALI SETELAH LOGIN ====== */
  var _renderCurLama=window.render;
  window.render=function(){
    var hasil=_renderCurLama.apply(this, arguments);
    if(USER && !localStorage.getItem(LS_CUR)) bukaPemilih(true);
    return hasil;
  };

  /* ====== BARIS MENU DI PROFIL ====== */
  var _renderSettingsCur=window.renderSettings;
  window.renderSettings=function(){
    _renderSettingsCur.apply(this, arguments);
    if(profSub) return;
    var wadah=S(); if(!wadah || wadah.querySelector('[data-mr-cur]')) return;
    var menus=wadah.querySelectorAll('.menu'); if(!menus.length) return;
    var div=document.createElement('div');
    div.setAttribute('data-mr-cur','1'); div.style.display='contents';
    div.innerHTML=menuRow('&#128176;','Mata Uang', kodeCur()+' &middot; '+curAktif().n, 'bukaPengaturanMataUang()');
    menus[0].appendChild(div);
  };

  /* terapkan lambang saat aplikasi dimuat */
  terapkanLambangCSS();

})();
</script>
